<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
@import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=YouTube+Sans:wght@400;500;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:#000;font-family:'Roboto',sans-serif;}
body{max-width:430px;margin:0 auto;position:relative;color:#fff;}

/* TOP NAV - exactly like YouTube Shorts */
#topnav{
  position:fixed;top:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;z-index:200;
  background:rgba(0,0,0,0.85);
  height:56px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 12px;
}
.yt-logo-area{display:flex;align-items:center;gap:8px;}
.yt-logo-box{width:32px;height:22px;background:#ff0000;border-radius:5px;display:flex;align-items:center;justify-content:center;}
.yt-logo-box svg{width:16px;height:16px;}
.yt-sitename{font-size:18px;font-weight:700;color:#fff;letter-spacing:-0.5px;}
.yt-sitename em{font-style:normal;color:#ff0000;}
.yt-platform-arr{background:none;border:none;cursor:pointer;color:rgba(255,255,255,.7);display:flex;align-items:center;width:20px;}
.yt-platform-arr svg{width:18px;height:18px;}
.topnav-right{display:flex;align-items:center;gap:18px;}
.topnav-icon-btn{background:none;border:none;cursor:pointer;color:rgba(255,255,255,.85);display:flex;align-items:center;}
.topnav-icon-btn svg{width:24px;height:24px;}

/* MAIN SCROLLER - full screen */
#shorts-container{
  position:fixed;inset:0;
  width:100%;max-width:430px;
  left:50%;transform:translateX(-50%);
  overflow:hidden;
  background:#000;
}
#shorts-scroller{
  width:100%;height:100%;
  overflow-y:scroll;
  scroll-snap-type:y mandatory;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior:none;
}
#shorts-scroller::-webkit-scrollbar{display:none;}

/* EACH SLIDE */
.short-slide{
  width:100%;
  height:100vh;
  scroll-snap-align:start;
  scroll-snap-stop:always;
  position:relative;
  background:#000;
  overflow:hidden;
  flex-shrink:0;
}

/* BG BLUR */
.slide-bg{
  position:absolute;inset:0;
  width:100%;height:100%;
  object-fit:cover;
  filter:blur(20px) brightness(.4) saturate(1.2);
  transform:scale(1.15);
  z-index:0;
}

/* THUMBNAIL COVER - shows instantly */
.slide-thumb{
  position:absolute;inset:0;
  z-index:3;
  background-size:cover;
  background-position:center;
  background-color:#111;
  transition:opacity .35s ease;
}
.slide-thumb.fade-out{opacity:0;pointer-events:none;}
.slide-thumb.gone{display:none;}

/* VIDEO IFRAME */
.slide-iframe-wrap{
  position:absolute;inset:0;z-index:1;
}
.slide-iframe{
  width:100%;height:100%;
  border:0;display:block;
  background:#000;
}

/* GRADIENT */
.slide-gradient{
  position:absolute;inset:0;
  background:linear-gradient(
    to bottom,
    rgba(0,0,0,.55) 0%,
    transparent 18%,
    transparent 55%,
    rgba(0,0,0,.75) 100%
  );
  pointer-events:none;z-index:5;
}

/* TOP INFO ROW - like YouTube Shorts */
.slide-top-info{
  position:absolute;top:0;left:0;right:0;
  z-index:10;
  padding:8px 12px 12px;
  display:flex;align-items:flex-start;gap:10px;
}
.slide-ch-av{
  width:36px;height:36px;border-radius:50%;
  flex-shrink:0;overflow:hidden;
  border:2px solid rgba(255,255,255,.8);
  background:#333;
  cursor:pointer;
}
.slide-ch-av img{width:100%;height:100%;object-fit:cover;}
.slide-top-text{flex:1;overflow:hidden;}
.slide-top-title{
  font-size:14px;font-weight:500;color:#fff;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  text-shadow:0 1px 3px rgba(0,0,0,.9);
  max-width:calc(100vw - 180px);
}
.slide-top-ch{
  font-size:12px;color:rgba(255,255,255,.8);
  text-shadow:0 1px 2px rgba(0,0,0,.8);
}

/* PLAY CONTROLS CENTER - like YouTube Shorts */
.slide-center-controls{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  z-index:12;
  display:flex;align-items:center;gap:40px;
  opacity:0;
  transition:opacity .25s;
  pointer-events:none;
}
.slide-center-controls.show{opacity:1;pointer-events:all;}
.ctrl-prev,.ctrl-next{
  width:52px;height:52px;border-radius:50%;
  background:rgba(0,0,0,.45);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;border:none;
}
.ctrl-prev svg,.ctrl-next svg{width:26px;height:26px;fill:#fff;}
.ctrl-pause-play{
  width:68px;height:68px;border-radius:50%;
  background:rgba(0,0,0,.5);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;border:none;
}
.ctrl-pause-play svg{width:34px;height:34px;fill:#fff;}

/* PROGRESS BAR - bottom like YouTube Shorts */
.slide-progress{
  position:absolute;bottom:0;left:0;right:0;
  z-index:12;
  height:3px;
  background:rgba(255,255,255,.25);
}
.slide-progress-bar{
  height:100%;background:#f00;
  width:0%;transition:width .5s linear;
}

/* BOTTOM INFO */
.slide-bottom{
  position:absolute;bottom:8px;left:12px;right:68px;
  z-index:10;
}
.slide-bottom-ch-row{
  display:flex;align-items:center;gap:10px;margin-bottom:8px;
}
.slide-bottom-av{
  width:40px;height:40px;border-radius:50%;
  flex-shrink:0;overflow:hidden;background:#333;cursor:pointer;
}
.slide-bottom-av img{width:100%;height:100%;object-fit:cover;}
.slide-bottom-chname{
  font-size:14px;font-weight:600;color:#fff;
  text-shadow:0 1px 3px rgba(0,0,0,.8);cursor:pointer;
}
.slide-sub-btn{
  padding:4px 14px;border-radius:20px;
  border:1.5px solid rgba(255,255,255,.9);
  background:transparent;color:#fff;
  font-size:12px;font-weight:600;cursor:pointer;
  font-family:'Roboto',sans-serif;margin-left:auto;
  flex-shrink:0;
}
.slide-sub-btn.subscribed{
  background:rgba(255,255,255,.12);
  border-color:rgba(255,255,255,.4);color:rgba(255,255,255,.7);
}
.slide-bottom-time{font-size:11px;color:rgba(255,255,255,.65);margin-bottom:4px;}
.slide-caption{
  font-size:13px;color:rgba(255,255,255,.95);
  line-height:1.4;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}

/* RIGHT ACTIONS - exactly like YouTube Shorts */
.slide-actions{
  position:absolute;right:10px;bottom:12px;
  z-index:10;
  display:flex;flex-direction:column;align-items:center;gap:20px;
}
.s-act{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  cursor:pointer;background:none;border:none;
}
.s-act-icon{
  width:44px;height:44px;
  display:flex;align-items:center;justify-content:center;
}
.s-act-icon svg{width:28px;height:28px;}
.s-act-label{
  font-size:12px;color:#fff;font-weight:500;
  text-shadow:0 1px 2px rgba(0,0,0,.8);
  text-align:center;

/* BOTTOM NAV - exactly like photos */
#botnav{

  background:rgba(10,10,10,.92);

.bn-item{

.bn-item svg{width:24px;height:24px;}
/* Plus button */
.bn-plus{
  width:52px;height:36px;

  border-radius:10px;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;

}
.bn-plus svg{width:22px;height:22px;stroke:#fff;stroke-width:2.5;fill:none;}
/* LIVE button */
.bn-live{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  background:none;border:none;cursor:pointer;
}
.bn-live-pill{
  background:#ff0000;border-radius:16px;
  padding:4px 10px;
  display:flex;align-items:center;gap:5px;
  box-shadow:0 0 12px rgba(255,0,0,.5);
}
.bn-live-dot{width:7px;height:7px;border-radius:50%;background:#fff;animation:liveBlink .8s ease-in-out infinite alternate;}
@keyframes liveBlink{from{opacity:.5;}to{opacity:1;}}
.bn-live-text{font-size:12px;font-weight:700;color:#fff;letter-spacing:.3px;}

/* LOADING */
.slide-loading{
  position:absolute;inset:0;z-index:8;
  display:flex;align-items:center;justify-content:center;
  background:transparent;
  pointer-events:none;
}
.loading-ring{
  width:36px;height:36px;
  border:3px solid rgba(255,255,255,.2);
  border-top-color:#fff;
  border-radius:50%;
  animation:spinR 1s linear infinite;
}
@keyframes spinR{to{transform:rotate(360deg)}}

/* TOAST */
#toast{
  position:fixed;bottom:70px;left:50%;transform:translateX(-50%);
  background:rgba(28,28,28,.95);color:#fff;
  padding:10px 20px;border-radius:24px;
  font-size:13px;font-weight:500;z-index:9999;
  opacity:0;transition:opacity .25s;
  pointer-events:none;white-space:nowrap;
  max-width:300px;text-align:center;
  border:1px solid rgba(255,255,255,.1);
}
#toast.show{opacity:1;}

/* PLATFORM DROPDOWN */
#plat-dd{
  display:none;position:fixed;top:56px;left:8px;z-index:400;
  background:rgba(18,18,18,.98);border:1px solid rgba(255,255,255,.1);

  box-shadow:0 8px 32px rgba(0,0,0,.9);
}
#plat-dd.open{display:block;animation:ddFade .2s ease;}
@keyframes ddFade{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.dd-item{display:flex;align-items:center;gap:10px;padding:13px 16px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.05);}

.dd-logo.yt{background:#ff0000;}
.dd-name{font-size:13px;font-weight:600;color:#fff;}

@keyframes heartPop{
  0%{opacity:1;transform:translate(-50%,-50%) scale(.4)}
  50%{opacity:1;transform:translate(-50%,-50%) scale(1.3)}
  100%{opacity:0;transform:translate(-50%,-50%) scale(1)}
}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
</style>

<script>
// ===== APIs =====
const PEXELS_KEY = 'rVYJFrOlf2ietM2vzzy92WCbVQYQ31hqzYhZYtUGypWk21uJM1uutJoZ';
const COVERR_KEY = '58feaf3f738db8147d2d5fb51147ca9f';
const YT_KEY = 'AIzaSyAXmWdEwssA7_NUJGJCQqR60fzrFpZ-mfI';
const YT_API = 'https://www.googleapis.com/youtube/v3';

// ===== STATE =====
let videos = [];         // array of video objects
let activeIdx = -1;
let loading = false;
let loadMore = false;
let ytPageToken = '';
let obsRef = null;
let progressTimers = {};
let likes = {};
let subs = {};
let chAvatars = {};
const preloaded = {};   // which iframes have src set

// Queries pool
const QUERIES = [
  'viral shorts 2025','funny shorts','trending shorts 2025','comedy shorts',
  'amazing shorts viral','hindi shorts 2025','pakistan shorts new',
  'dance shorts 2025','motivation shorts','gaming shorts 2025',
  'cricket shorts 2025','music short 2025','funny clips 2025',
  'new song short 2025','tech shorts 2025'
];
let qIdx = 0;
function nextQ(){ qIdx = (qIdx+1) % QUERIES.length; return QUERIES[qIdx]; }

const COLORS = ['#e53935','#e91e63','#8e24aa','#1e88e5','#00acc1','#43a047','#fb8c00','#6d4c41'];
function rc(s){ return COLORS[(s||'A').charCodeAt(0)%COLORS.length]; }
function fv(n){ n=Number(n)||0; if(n>=1e9)return(n/1e9).toFixed(1)+'B'; if(n>=1e6)return(n/1e6).toFixed(1)+'M'; if(n>=1e3)return(n/1e3).toFixed(1)+'K'; return n||''; }
function rSubs(){ const n=Math.floor(Math.random()*9900000+1000); return n>=1e6?(n/1e6).toFixed(1)+'M':Math.floor(n/1e3)+'K'; }

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2400);
}

// ===== DROPDOWN =====
let ddTimer;
function toggleDD(){
  const dd=document.getElementById('plat-dd');
  if(dd.classList.contains('open')){dd.classList.remove('open');clearTimeout(ddTimer);}
  else{dd.classList.add('open');clearTimeout(ddTimer);ddTimer=setTimeout(()=>dd.classList.remove('open'),4000);}
}
document.addEventListener('click',e=>{
  const dd=document.getElementById('plat-dd');
  if(dd.classList.contains('open')&&!dd.contains(e.target)&&!e.target.closest('.yt-platform-arr')){
    dd.classList.remove('open');clearTimeout(ddTimer);
  }
});

// ===== FETCH YOUTUBE SHORTS =====
async function fetchYTShorts(query, pageToken=''){
  try{
    let url=`${YT_API}/search?part=snippet&type=video&videoDuration=short&maxResults=15&q=${encodeURIComponent(query)}&key=${YT_KEY}&order=date&publishedAfter=2024-01-01T00:00:00Z`;
    if(pageToken) url+=`&pageToken=${pageToken}`;
    const r=await fetch(url);
    if(!r.ok)return{items:[],next:''};
    const d=await r.json();
    if(!d.items?.length)return{items:[],next:''};

    const ids=d.items.filter(i=>i.id?.videoId).map(i=>i.id.videoId);
    const next=d.nextPageToken||'';

    // Get stats + embeddable status
    let stats={};
    if(ids.length){
      const sr=await fetch(`${YT_API}/videos?part=statistics,status&id=${ids.join(',')}&key=${YT_KEY}`);
      if(sr.ok){
        const sd=await sr.json();
        sd.items?.forEach(v=>{
          stats[v.id]={
            views:parseInt(v.statistics?.viewCount||0),
            likes:parseInt(v.statistics?.likeCount||0),
            comments:parseInt(v.statistics?.commentCount||0),
            embeddable:v.status?.embeddable!==false
          };
        });
      }
    }

    // Get channel avatars
    const chIds=[...new Set(d.items.map(i=>i.snippet?.channelId).filter(Boolean))];
    const toFetch=chIds.filter(id=>!chAvatars[id]);
    if(toFetch.length){
      const cr=await fetch(`${YT_API}/channels?part=snippet&id=${toFetch.join(',')}&key=${YT_KEY}`);
      if(cr.ok){
        const cd=await cr.json();
        cd.items?.forEach(ch=>{
          const thumb=ch.snippet?.thumbnails?.medium?.url||ch.snippet?.thumbnails?.default?.url||'';
          if(thumb) chAvatars[ch.id]=thumb;
        });
      }
    }

    const items=d.items
      .filter(i=>i.id?.videoId&&i.snippet?.thumbnails?.high?.url)
      .filter(i=>{
        const s=stats[i.id.videoId];
        return !s||s.embeddable!==false;
      })
      .map(i=>({
        id: i.id.videoId,
        title: i.snippet.title,
        channel: i.snippet.channelTitle,
        channelId: i.snippet.channelId,
        channelAvatar: chAvatars[i.snippet.channelId]||'',
        thumb: i.snippet.thumbnails?.high?.url||i.snippet.thumbnails?.medium?.url||'',
        views: stats[i.id.videoId]?.views||0,
        likes: stats[i.id.videoId]?.likes||0,
        comments: stats[i.id.videoId]?.comments||0,
        subs: rSubs(),
        source: 'yt'
      }));

    return{items,next};
  }catch(e){ return{items:[],next:''}; }
}

// ===== FETCH PEXELS VIDEOS (fallback/supplement) =====
async function fetchPexels(){
  const queries=['nature','city','people','ocean','sport','dance','food','travel'];
  const q=queries[Math.floor(Math.random()*queries.length)];
  try{
    const r=await fetch(`https://api.pexels.com/videos/search?query=${q}&per_page=15&orientation=portrait`,{
      headers:{'Authorization':PEXELS_KEY}
    });
    if(!r.ok)return[];
    const d=await r.json();
    return (d.videos||[]).map(v=>({
      id:'px_'+v.id,
      title: v.url?.split('/').pop()||q+' video',
      channel: v.user?.name||'Pexels Creator',
      channelId: 'px_'+v.user?.id,
      channelAvatar: v.user?.url||'',
      thumb: v.image||'',
      videoUrl: v.video_files?.find(f=>f.quality==='hd'&&f.width<=720)?.link
        || v.video_files?.find(f=>f.file_type==='video/mp4')?.link||'',
      views: Math.floor(Math.random()*900000+10000),
      likes: Math.floor(Math.random()*50000+500),
      comments: Math.floor(Math.random()*5000+50),
      subs: rSubs(),
      source: 'pexels'
    })).filter(v=>v.videoUrl);
  }catch(e){ return[]; }
}

// ===== BUILD EMBED URL =====
function buildEmbed(videoId, autoplay=true, muted=false){
  return `https://www.youtube-nocookie.com/embed/${videoId}?autoplay=${autoplay?1:0}&mute=${muted?1:0}&loop=1&playlist=${videoId}&playsinline=1&rel=0&modestbranding=1&controls=0&iv_load_policy=3&fs=0&disablekb=1&showinfo=0`;
}

// ===== INIT LOAD =====
async function initLoad(){
  // Load from multiple queries in parallel for speed
  const promises=[
    fetchYTShorts(QUERIES[0]),
    fetchYTShorts(QUERIES[1]),
    fetchYTShorts(QUERIES[2]),
  ];
  const results=await Promise.all(promises);
  const combined=[];
  const seen=new Set();
  results.forEach(r=>{
    r.items.forEach(v=>{
      if(!seen.has(v.id)){seen.add(v.id);combined.push(v);}
    });
  });
  // Shuffle
  for(let i=combined.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [combined[i],combined[j]]=[combined[j],combined[i]];
  }
  if(combined.length){
    ytPageToken=results[0].next||'';
    addVideos(combined);
    buildSlides();
    activateSlide(0);
  } else {
    // Fallback to Pexels
    const pv=await fetchPexels();
    if(pv.length){addVideos(pv);buildSlides();activateSlide(0);}
  }
  setupInfScroll();
}

// ===== ADD VIDEOS =====
function addVideos(newVids){
  newVids.forEach(v=>videos.push(v));
}

// ===== BUILD SLIDES =====
function buildSlides(){
  const scroller=document.getElementById('shorts-scroller');
  // Only build new slides that don't exist
  videos.forEach((v,i)=>{
    if(document.querySelector(`.short-slide[data-idx="${i}"]`))return;
    const slide=buildSlide(v,i);
    scroller.appendChild(slide);
    if(obsRef) obsRef.observe(slide);
  });
}

// ===== ACTIVATE SLIDE (play video) =====
function activateSlide(idx){
  if(idx<0||idx>=videos.length)return;
  if(idx===activeIdx)return;

  const prevIdx=activeIdx;
  activeIdx=idx;

  // Stop previous
  if(prevIdx>=0 && prevIdx!==idx){
    pauseSlide(prevIdx);
  }

  // Stop all iframes that are far
  document.querySelectorAll('.short-slide').forEach((s,si)=>{
    if(Math.abs(si-idx)>2){
      const iframe=s.querySelector('iframe');
      const vid2=s.querySelector('video');
      if(iframe&&iframe.src&&iframe.src!=='about:blank'){
        iframe.src='about:blank';
        delete preloaded[si];
      }
      if(vid2&&!vid2.paused){vid2.pause();vid2.muted=true;}
    }
  });

  const v=videos[idx];
  if(!v)return;

  if(v.source==='pexels'&&v.videoUrl){
    // Pexels video
    const vidEl=document.getElementById('vid-'+idx);
    if(vidEl&&!vidEl.src){
      vidEl.src=v.videoUrl;
      vidEl.muted=false;
      vidEl.play().catch(()=>{vidEl.muted=true;vidEl.play().catch(()=>{});});
      // Fade thumb when playing
      vidEl.addEventListener('canplay',()=>{
        const thumb=document.getElementById('thumb-'+idx);
        if(thumb&&!thumb.classList.contains('gone')){
          thumb.classList.add('fade-out');
          setTimeout(()=>thumb.classList.add('gone'),400);
        }
      },{once:true});
    } else if(vidEl){
      vidEl.muted=false;
      vidEl.play().catch(()=>{});
      const thumb=document.getElementById('thumb-'+idx);
      if(thumb&&!thumb.classList.contains('gone')){
        setTimeout(()=>{thumb.classList.add('fade-out');setTimeout(()=>thumb.classList.add('gone'),400);},300);
      }
    }
  } else {
    // YouTube iframe
    const iframe=document.getElementById('vid-'+idx);
    if(iframe){
      // If preloaded (muted), reload with audio
      if(preloaded[idx]&&iframe.src&&iframe.src.includes('mute=1')){
        iframe.src=buildEmbed(v.id,true,false);
      } else if(!iframe.src||iframe.src==='about:blank'){
        iframe.src=buildEmbed(v.id,true,false);
      }
      preloaded[idx]='active';

      // Fade thumb
      const thumb=document.getElementById('thumb-'+idx);
      if(thumb&&!thumb.classList.contains('gone')){
        iframe.onload=()=>{
          setTimeout(()=>{
            if(thumb&&!thumb.classList.contains('gone')){
              thumb.classList.add('fade-out');
              setTimeout(()=>thumb.classList.add('gone'),400);
            }
          },500);
        };
        // Fallback: fade after 2.5s even if onload doesn't fire
        setTimeout(()=>{
          if(thumb&&!thumb.classList.contains('gone')){
            thumb.classList.add('fade-out');
            setTimeout(()=>thumb.classList.add('gone'),400);
          }
        },2500);
      }
    }
  }

  // Preload next 3 (muted, no autoplay)
  requestAnimationFrame(()=>{
    [idx+1,idx+2,idx+3].forEach(ni=>{
      if(ni>=videos.length||preloaded[ni])return;
      const nv=videos[ni];
      if(!nv||nv.source==='pexels')return;
      const nsl=document.querySelector(`.short-slide[data-idx="${ni}"]`);
      if(!nsl)return;
      const nf=nsl.querySelector('iframe');
      if(nf&&(!nf.src||nf.src==='about:blank')){
        nf.src=buildEmbed(nv.id,false,true);
        preloaded[ni]='preload';
      }
    });

    // Destroy old (free memory)
    [idx-4,idx-3].forEach(pi=>{
      if(pi<0)return;
      const ps=document.querySelector(`.short-slide[data-idx="${pi}"]`);
      if(!ps)return;
      const pf=ps.querySelector('iframe');
      if(pf&&pf.src&&pf.src!=='about:blank'){
        pf.src='about:blank';
        delete preloaded[pi];
      }
    });
  });
}

// ===== PAUSE/PLAY =====
let pausedSlides={};
function pauseSlide(idx){
  if(idx<0||idx>=videos.length)return;
  const v=videos[idx];
  if(!v)return;
  if(v.source==='pexels'){
    const vidEl=document.getElementById('vid-'+idx);
    if(vidEl)vidEl.pause();
  } else {
    const iframe=document.getElementById('vid-'+idx);
    if(iframe&&iframe.src&&iframe.src!=='about:blank'&&!iframe.src.includes('mute=1')){
      iframe.src='about:blank';
      delete preloaded[idx];
    }
  }
  // Reset thumb
  const thumb=document.getElementById('thumb-'+idx);
  if(thumb){thumb.classList.remove('fade-out','gone');}
}

function togglePause(idx){
  const v=videos[idx];if(!v)return;
  pausedSlides[idx]=!pausedSlides[idx];
  const icon=document.getElementById('playbtn-icon-'+idx);
  if(v.source==='pexels'){
    const vidEl=document.getElementById('vid-'+idx);
    if(vidEl){
      if(pausedSlides[idx]){
        vidEl.pause();
        if(icon)icon.innerHTML='<path d="M8 5v14l11-7z"/>';
      } else {
        vidEl.play().catch(()=>{});
        if(icon)icon.innerHTML='<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
      }
    }
  } else {
    if(pausedSlides[idx]){
      // Pause by blanking src
      const iframe=document.getElementById('vid-'+idx);
      if(iframe)iframe.src='about:blank';
      if(icon)icon.innerHTML='<path d="M8 5v14l11-7z"/>';
    } else {
      activateSlide(idx);
      if(icon)icon.innerHTML='<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
    }
  }
  toast(pausedSlides[idx]?'⏸ Paused':'▶ Playing');
}

function prevSlide(idx){
  if(idx<=0)return;
  const scroller=document.getElementById('shorts-scroller');
  scroller.scrollTo({top:(idx-1)*window.innerHeight,behavior:'smooth'});
}
function nextSlide(idx){
  if(idx>=videos.length-1)return;
  const scroller=document.getElementById('shorts-scroller');
  scroller.scrollTo({top:(idx+1)*window.innerHeight,behavior:'smooth'});
}

// ===== INFINITE SCROLL OBSERVER =====
function setupInfScroll(){
  if(obsRef)try{obsRef.disconnect();}catch(e){}

  obsRef=new IntersectionObserver((entries)=>{
    entries.forEach(e=>{
      if(e.intersectionRatio<0.75)return;
      const slide=e.target;
      const idx=parseInt(slide.dataset.idx);
      if(isNaN(idx))return;
      if(idx===activeIdx)return;
      activateSlide(idx);

      // Load more when near end
      if(idx>=videos.length-5&&!loadMore){
        loadMore=true;
        loadMoreVideos().then(()=>{loadMore=false;});
      }
    });
  },{threshold:0.75,rootMargin:'0px'});

  document.querySelectorAll('.short-slide').forEach(s=>obsRef.observe(s));
}

async function loadMoreVideos(){
  const q=nextQ();
  const result=await fetchYTShorts(q,ytPageToken);
  if(result.items.length){
    const seen=new Set(videos.map(v=>v.id));
    const newVids=result.items.filter(v=>!seen.has(v.id));
    if(newVids.length){
      ytPageToken=result.next;
      const prevLen=videos.length;
      addVideos(newVids);
      buildSlides();
      // Observe new slides
      if(obsRef){
        document.querySelectorAll('.short-slide').forEach((s,i)=>{
          if(i>=prevLen)obsRef.observe(s);
        });
      }
    }
  } else {
    // Fallback to pexels
    const pv=await fetchPexels();
    if(pv.length){
      const seen=new Set(videos.map(v=>v.id));
      const newVids=pv.filter(v=>!seen.has(v.id));
      if(newVids.length){
        const prevLen=videos.length;
        addVideos(newVids);
        buildSlides();
        if(obsRef){
          document.querySelectorAll('.short-slide').forEach((s,i)=>{
            if(i>=prevLen)obsRef.observe(s);
          });
        }
      }
    }
  }
}

// ===== ACTIONS =====
function toggleLike(vid,btn,orig){
  likes[vid]=!likes[vid];
  const svg=document.getElementById('like-svg-'+vid);
  const cnt=document.getElementById('like-cnt-'+vid);
  if(svg){
    svg.setAttribute('fill',likes[vid]?'#f44336':'none');
    svg.setAttribute('stroke',likes[vid]?'#f44336':'white');
  }
  if(cnt)cnt.textContent=fv(likes[vid]?orig+1:Math.max(0,orig-1));
  if(likes[vid]){
    const h=document.createElement('div');
    h.style.cssText='position:absolute;font-size:70px;z-index:50;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;animation:heartPop .6s ease forwards;';
    h.textContent='❤️';
    btn.closest('.short-slide')?.appendChild(h);
    setTimeout(()=>h.remove(),700);
  }
  toast(likes[vid]?'❤️ Liked!':'Like removed');
}

function toggleSub(vid,idx){
  subs[vid]=!subs[vid];
  const btn=document.getElementById('subbtn-'+idx);
  if(btn){
    btn.textContent=subs[vid]?'Subscribed':'Subscribe';
    btn.classList.toggle('subscribed',subs[vid]);
  }
  toast(subs[vid]?'✅ Subscribed!':'Unsubscribed');
}

function openComments(idx){
  toast('💬 Comments coming soon');
}

function shareVideo(vid,title){
  const url=`https://youtube.com/shorts/${vid}`;
  if(navigator.share)navigator.share({title,url}).catch(()=>{});
  else if(navigator.clipboard)navigator.clipboard.writeText(url).then(()=>toast('🔗 Link copied!')).catch(()=>toast('🔗 '+url));
}

function saveVideo(idx){
  const icon=document.getElementById('save-icon-'+idx);
  if(icon){
    const svg=icon.querySelector('svg');
    if(svg)svg.setAttribute('fill',svg.getAttribute('fill')==='#fff'?'none':'#fff');
  }
  toast('🔖 Saved!');
}

// ===== INIT =====
window.addEventListener('load',()=>{
  // Show spinner in container while loading
  const scroller=document.getElementById('shorts-scroller');
  scroller.innerHTML=`<div style="height:100vh;display:flex;align-items:center;justify-content:center;">
    <div style="text-align:center;">
      <div class="loading-ring" style="width:48px;height:48px;border-width:4px;margin:0 auto 16px;"></div>
      <div style="color:rgba(255,255,255,.6);font-size:14px;">Loading shorts...</div>
    </div>
  </div>`;
  initLoad();
});
