Here is a complete, unified HTML document that combines YouTube, Instagram, and TikTok styles into a single, functional video feed application.

```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Anskinge — Unified Feed</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

:root {
  --bg: #0f0f0f;
  --bg2: #1a1a1a;
  --bg3: #272727;
  --text: #f1f1f1;
  --text2: #aaa;
  --red: #ff0000;
  --pink: #fe2c55;
  --ig-grad: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
  --border: #2a2a2a;
}

body {
  background: #000;
  font-family: 'Segoe UI', system-ui, 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
  max-width: 430px;
  margin: 0 auto;
  height: 100vh;
  overflow: hidden;
  color: var(--text);
}

/* splash */
#splash {
  position: fixed;
  inset: 0;
  background: #0f0f0f;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 22px;
  transition: opacity 0.5s;
}
#splash.hide { opacity: 0; pointer-events: none; }
.splash-glow {
  width: 260px;
  height: 260px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,0,0,0.2) 0%, transparent 70%);
  animation: glow 2s infinite;
}
@keyframes glow { 0%,100%{transform:scale(1);} 50%{transform:scale(1.1);} }
.splash-logo-row { display: flex; align-items: center; gap: 12px; }
.splash-box {
  width: 52px; height: 36px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
}
.splash-box.yt { background: #ff0000; }
.splash-box.tt { background: #000; border: 1.5px solid #444; }
.splash-box.ig { background: var(--ig-grad); }
.splash-box svg { width: 24px; height: 24px; fill: #fff; }
.splash-name { font-size: 34px; font-weight: 800; letter-spacing: -1px; }
.splash-name em { font-style: normal; color: var(--red); }
.splash-line-wrap {
  width: 200px; height: 3px; background: rgba(255,255,255,0.1); border-radius: 4px;
  overflow: hidden;
}
.splash-line-bar {
  width: 0%; height: 100%; border-radius: 4px;
  animation: lineProgress 2.6s cubic-bezier(0.4,0,0.2,1) forwards;
}
.splash-line-bar.yt { background: #ff0000; }
.splash-line-bar.tt { background: var(--pink); }
.splash-line-bar.ig { background: var(--ig-grad); }
@keyframes lineProgress { 0%{width:0%} 40%{width:45%} 80%{width:85%} 100%{width:100%} }

/* top/bottom nav */
#topnav {
  position: fixed; top: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 430px; background: rgba(15,15,15,0.96);
  backdrop-filter: blur(12px); border-bottom: 1px solid var(--border);
  height: 52px; display: flex; align-items: center; gap: 8px; padding: 0 12px;
  z-index: 500;
}
.logo-wrap { display: flex; align-items: center; gap: 6px; cursor: pointer; }
.logo-box {
  width: 28px; height: 20px; background: var(--red); border-radius: 5px;
  display: flex; align-items: center; justify-content: center;
}
.logo-text { font-weight: 800; font-size: 18px; }
.logo-text em { color: var(--red); font-style: normal; }
#search-bar { flex: 1; display: flex; background: var(--bg3); border-radius: 24px; overflow: hidden; }
#search-bar input { flex: 1; background: transparent; border: none; padding: 8px 12px; color: white; font-size: 13px; outline: none; }
#search-bar button { background: var(--bg4); border: none; padding: 8px 14px; color: var(--text2); cursor: pointer; }

#botnav {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 430px; background: rgba(15,15,15,0.96);
  backdrop-filter: blur(12px); border-top: 1px solid var(--border);
  display: flex; justify-content: space-around; height: 56px;
  align-items: center; z-index: 500;
}
.bnav-btn {
  background: none; border: none; color: #aaa; font-size: 10px;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  cursor: pointer; font-weight: 600;
}
.bnav-btn.active { color: white; }
.bnav-plus { width: 48px; height: 34px; }
.bnav-plus-inner {
  width: 100%; height: 100%; background: linear-gradient(135deg,#00c6ff,#7b2ff7,#ff0080);
  border-radius: 12px; display: flex; align-items: center; justify-content: center;
}

/* main scroll */
#main {
  position: fixed; top: 52px; bottom: 56px; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 430px; overflow-y: auto; padding-bottom: 20px;
}
.cat-strip {
  display: flex; gap: 8px; padding: 10px 12px; overflow-x: auto; position: sticky; top: 0;
  background: var(--bg); border-bottom: 1px solid var(--border);
}
.cat-chip {
  padding: 6px 14px; border-radius: 20px; background: var(--bg2);
  font-size: 12px; font-weight: 600; white-space: nowrap; cursor: pointer;
}
.cat-chip.active { background: white; color: black; }

/* video cards */
.video-card { margin-bottom: 8px; cursor: pointer; }
.thumb-wrap { aspect-ratio: 16/9; background: #111; position: relative; }
.thumb-wrap img { width: 100%; height: 100%; object-fit: cover; }
.thumb-dur { position: absolute; bottom: 6px; right: 8px; background: rgba(0,0,0,0.8); padding: 2px 5px; border-radius: 4px; font-size: 11px; }
.video-row { display: flex; gap: 10px; padding: 8px 12px; }
.ch-av { width: 36px; height: 36px; border-radius: 50%; background: red; display: flex; align-items: center; justify-content: center; font-weight: bold; }
.vid-title { font-size: 13px; font-weight: 600; line-height: 1.3; }

/* shorts grid */
.shorts-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 0 12px;
}
.short-card { aspect-ratio: 9/16; background: #1a1a1a; border-radius: 12px; overflow: hidden; position: relative; cursor: pointer; }
.short-card img { width: 100%; height: 100%; object-fit: cover; }
.short-card-info {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: linear-gradient(transparent, rgba(0,0,0,0.9)); padding: 20px 8px 8px;
}
.short-card-title { font-size: 11px; font-weight: 600; }

/* player */
#player-page { display: none; }
.player-wrap { aspect-ratio: 16/9; background: #000; position: relative; }
.player-wrap iframe { width: 100%; height: 100%; border: 0; }
.fake-play { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.3); cursor: pointer; }
.play-circle {
  width: 64px; height: 64px; background: rgba(255,255,255,0.95); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}
.sub-btn { padding: 6px 16px; border-radius: 20px; background: white; color: black; font-weight: bold; border: none; cursor: pointer; }
.sub-btn.subscribed { background: #2a2a2a; color: #aaa; }

/* panels */
#s-panel-overlay, #ig-panel-overlay, #tt-panel-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 700;
}
.cmt-panel {
  display: none; position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 430px; background: #111; border-radius: 20px 20px 0 0;
  max-height: 70vh; overflow-y: auto; z-index: 710; padding: 12px 16px 24px;
}
.cmt-item { display: flex; gap: 12px; margin-bottom: 16px; }
.cmt-av { width: 32px; height: 32px; border-radius: 50%; background: #333; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }

/* IG / TT pages */
#ig-page, #tt-page {
  display: none; position: fixed; inset: 0; background: black; z-index: 590;
  flex-direction: column;
}
.ig-topnav, .tt-topnav { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: #000; border-bottom: 1px solid #1a1a1a; }
.ig-botnav { height: 56px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #1a1a1a; }
.tt-botnav { position: absolute; bottom: 0; left: 0; right: 0; height: 56px; background: rgba(0,0,0,0.88); display: flex; justify-content: space-around; align-items: center; }
.ig-slide, .tt-slide { width: 100%; height: 100vh; scroll-snap-align: start; position: relative; overflow: hidden; }
#ig-scroller, #tt-scroller { flex: 1; overflow-y: scroll; scroll-snap-type: y mandatory; }

.toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
  background: #333; color: white; padding: 8px 18px; border-radius: 40px;
  font-size: 13px; z-index: 9999; opacity: 0; transition: 0.2s; pointer-events: none;
}
.toast.show { opacity: 1; }
.loading-dots { display: flex; gap: 6px; justify-content: center; padding: 20px; }
</style>
</head>
<body>
<div id="splash">
  <div class="splash-glow"></div>
  <div class="splash-logo-row"><div class="splash-box yt" id="splashIcon"><svg viewBox="0 0 24 24"><path d="M19.6 3H4.4C2.5 3 1 4.5 1 6.4v11.2C1 19.5 2.5 21 4.4 21h15.2c1.9 0 3.4-1.5 3.4-3.4V6.4C23 4.5 21.5 3 19.6 3zM16.5 12.5l-7 4c-.2.1-.4.1-.6 0-.2-.1-.3-.3-.3-.5V8c0-.2.1-.4.3-.5.2-.1.4-.1.6 0l7 4c.2.1.3.3.3.5s-.1.4-.3.5z"/></svg></div><span class="splash-name">Ansk<em>i</em>nge</span></div>
  <div class="splash-line-wrap"><div class="splash-line-bar yt" id="splashBar"></div></div>
</div>

<nav id="topnav" style="display:none">
  <div class="logo-wrap" onclick="showPage('home')"><div class="logo-box"><svg width="14" viewBox="0 0 24 24" fill="white"><path d="M19.6 3H4.4C2.5 3 1 4.5 1 6.4v11.2C1 19.5 2.5 21 4.4 21h15.2c1.9 0 3.4-1.5 3.4-3.4V6.4C23 4.5 21.5 3 19.6 3zM16.5 12.5l-7 4c-.2.1-.4.1-.6 0-.2-.1-.3-.3-.3-.5V8c0-.2.1-.4.3-.5.2-.1.4-.1.6 0l7 4c.2.1.3.3.3.5s-.1.4-.3.5z"/></svg></div><span class="logo-text">Ansk<em>i</em>nge</span></div>
  <div id="search-bar"><input id="searchInput" placeholder="Search..." autocomplete="off"><button onclick="doSearch()">🔍</button></div>
</nav>
<div id="main" style="display:none">
  <div id="home-page"><div class="cat-strip" id="catStrip"></div><div class="shorts-grid" id="homeShortsGrid"></div><div id="homeFeed"></div><div id="loadSentinel" style="height:30px"></div></div>
  <div id="search-page" style="display:none"><div style="padding:12px; display:flex; gap:8px"><input id="searchBig" class="cat-chip" style="flex:1" placeholder="Search..."><button class="cat-chip" onclick="doSearch()">Go</button></div><div id="searchResults"></div></div>
  <div id="player-page"><div class="player-wrap" id="playerWrap"><div class="fake-play" id="fakePlay"><div class="play-circle">▶️</div></div><iframe id="playerIframe" style="display:none"></iframe></div><div id="playerDetails"></div><div id="playerCmts"></div></div>
  <div id="subs-page"><div class="page-title">Subscriptions</div><div id="subsList"></div></div>
  <div id="profile-page"><div style="text-align:center; padding:40px">Profile (waseem7227)</div></div>
</div>
<nav id="botnav" style="display:none">
  <button class="bnav-btn active" onclick="showPage('home')">🏠 Home</button>
  <button class="bnav-btn" onclick="openShortsPage()">📱 Shorts</button>
  <button class="bnav-plus" onclick="toast('Upload soon')"><div class="bnav-plus-inner">+</div></button>
  <button class="bnav-btn" onclick="showPage('subs')">🔔 Subs</button>

</nav>

<!-- Instagram/TikTok overlays -->
<div id="ig-page"><div class="ig-topnav"><span>Anskinge</span><button onclick="closePlatform('ig')">✕</button></div><div id="igScroller"></div><div class="ig-botnav"><span>🏠</span><span>🔍</span><span>➕</span><span>❤️</span><span>👤</span></div></div>
<div id="tt-page"><div class="tt-topnav"><span>TikTok</span><button onclick="closePlatform('tt')">✕</button></div><div id="ttScroller"></div><div class="tt-botnav"><span>🏠</span><span>🔍</span><span>➕</span><span>💬</span><span>👤</span></div></div>

<div id="s-panel-overlay" class="panel-overlay" onclick="closePanel()"></div><div id="s-cmt-panel" class="cmt-panel"><div style="font-weight:bold; margin-bottom:10px">Comments</div><div id="sCmtList"></div><button onclick="closePanel()">Close</button></div>

<script>
// ------------------------------ STATE ---------------------------------
let API_KEY = 'AIzaSyAXmWdEwssA7_NUJGJCQqR60fzrFpZ-mfI';
let currentCat = 'All';
let homeShorts = [], homeVideos = [], nextToken = '', loadingMore = false;
let currentVideo = null;
let subs = JSON.parse(localStorage.getItem('ak_subs') || '{}');
let likes = JSON.parse(localStorage.getItem('ak_likes') || '{}');
let cmtsStore = JSON.parse(localStorage.getItem('ak_cmts') || '{}');
const CATS = ['All','Music','Funny','Gaming','Motivation','Tech','Travel','Food','Animals','Sports'];
const CAT_QUERY = { All:'trending viral', Music:'music video', Funny:'funny compilation', Gaming:'gaming', Motivation:'motivational speech', Tech:'tech review', Travel:'travel vlog', Food:'cooking', Animals:'cute animals', Sports:'sports highlights' };
const SHORT_QUERY = { All:'shorts viral', Music:'music shorts', Funny:'funny shorts', Gaming:'gaming shorts', Motivation:'motivation shorts', Tech:'tech shorts', Travel:'travel shorts', Food:'food shorts', Animals:'animal shorts', Sports:'sports shorts' };

// helpers
function toast(msg) { let t = document.getElementById('toast') || (()=>{let d=document.createElement('div');d.id='toast';d.className='toast';document.body.appendChild(d);return d;})(); t.innerText=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000); }
function fmtNum(n){ if(n>=1e6) return (n/1e6).toFixed(1)+'M'; if(n>=1e3) return (n/1e3).toFixed(0)+'K'; return n; }
function rand(min,max){ return Math.floor(Math.random()*(max-min)+min); }
function rndAgo(){ return ['1h','2h','1d','3d','1w'][rand(0,5)]; }
function rndSubs(){ let n=rand(1000,5000000); return fmtNum(n); }
function rndDur(){ return `${rand(1,15)}:${rand(0,59).toString().padStart(2,'0')}`; }

// API fetch
async function api(url){ try{ let r=await fetch(url); if(!r.ok)return null; return await r.json(); }catch(e){ return null; } }

async function searchVideos(q, isShort=false, pageToken=''){
  let max=12; let duration= isShort ? 'short' : 'medium';
  let url=`${'https://www.googleapis.com/youtube/v3/search'}?part=snippet&type=video&q=${encodeURIComponent(q)}&maxResults=${max}&key=${API_KEY}&videoDuration=${duration}`;
  if(pageToken) url+=`&pageToken=${pageToken}`;
  let data = await api(url);
  if(!data || !data.items) return { items:[], next:'' };
  let items = data.items.map(i=>{
    let vid=i.id.videoId;
    return {
      id:vid, title:i.snippet.title, channel:i.snippet.channelTitle,
      thumb:i.snippet.thumbnails.high?.url || i.snippet.thumbnails.medium?.url || `https://img.youtube.com/vi/${vid}/hqdefault.jpg`,
      views:rand(5000,3000000), likes:rand(300,200000), comments:rand(20,8000),
      subs:rndSubs(), dur:rndDur(), ago:rndAgo()
    };
  });
  return { items, next:data.nextPageToken || '' };
}

// load home feed
async function loadHome(reset=true){
  if(reset){ homeVideos=[]; homeShorts=[]; nextToken=''; }
  let qShort = SHORT_QUERY[currentCat] || SHORT_QUERY.All;
  let qLong = CAT_QUERY[currentCat] || CAT_QUERY.All;
  let [shortRes, longRes] = await Promise.all([ searchVideos(qShort, true, ''), searchVideos(qLong, false, nextToken) ]);
  if(reset){ homeShorts = shortRes.items; homeVideos = longRes.items; nextToken = longRes.next; }
  else { homeVideos = [...homeVideos, ...longRes.items]; nextToken = longRes.next; }
  renderHome();
}
function renderHome(){
  let gridDiv = document.getElementById('homeShortsGrid');
  if(homeShorts.length) gridDiv.innerHTML = homeShorts.map((v,i)=>`<div class="short-card" onclick="openShortsPage(${i})"><img src="${v.thumb}" onerror="this.style.display='none'"><div class="short-card-info"><div class="short-card-title">${escapeHtml(v.title)}</div><div class="short-card-views">👁 ${fmtNum(v.views)}</div></div></div>`).join('');
  else gridDiv.innerHTML='<div style="grid-column:1/-1">No shorts</div>';
  let feedDiv = document.getElementById('homeFeed');
  feedDiv.innerHTML = homeVideos.map(v=>makeVideoCard(v)).join('');
}
function makeVideoCard(v){
  return `<div class="video-card" onclick="openPlayer('${v.id}')"><div class="thumb-wrap"><img src="${v.thumb}" onerror="this.style.display='none'"><div class="thumb-dur">${v.dur}</div></div><div class="video-row"><div class="ch-av" style="background:#ff0000">${(v.channel[0]||'C')}</div><div class="vid-meta"><div class="vid-title">${escapeHtml(v.title)}</div><div class="vid-sub">${escapeHtml(v.channel)} • ${fmtNum(v.views)} views • ${v.ago}</div></div></div></div>`;
}
function escapeHtml(s){ return String(s).replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

// categories
function buildCats(){
  let html = CATS.map(c=>`<div class="cat-chip ${c===currentCat?'active':''}" onclick="setCat('${c}')">${c}</div>`).join('');
  document.getElementById('catStrip').innerHTML = html;
}
async function setCat(c){ currentCat=c; await loadHome(true); buildCats(); }

// player
async function openPlayer(vid){
  let vidObj = homeVideos.find(v=>v.id===vid) || homeShorts.find(v=>v.id===vid);
  if(!vidObj){ toast("loading video"); return; }
  currentVideo = vidObj;
  showPage('player');
  document.getElementById('playerWrap').innerHTML = `<div class="fake-play" id="fakePlay"><div class="play-circle">▶️</div></div><iframe id="playerIframe" style="display:none"></iframe>`;
  document.getElementById('fakePlay').onclick = ()=>{
    let ifr = document.getElementById('playerIframe');
    ifr.style.display='block';
    ifr.src=`https://www.youtube-nocookie.com/embed/${vidObj.id}?autoplay=1&modestbranding=1&playsinline=1`;
    document.getElementById('fakePlay').style.display='none';
  };
  let subbed = !!subs[vidObj.channel];
  let liked = !!likes[vidObj.id];
  document.getElementById('playerDetails').innerHTML = `<div style="padding:12px"><div><strong>${escapeHtml(vidObj.title)}</strong></div><div style="display:flex; justify-content:space-between; margin:12px 0"><div>${escapeHtml(vidObj.channel)} • ${fmtNum(vidObj.subs)} subs</div><button class="sub-btn ${subbed?'subscribed':''}" id="playerSubBtn" onclick="toggleSubChannel('${escapeHtml(vidObj.channel)}')">${subbed?'Subscribed':'Subscribe'}</button></div><div><button id="playerLikeBtn" onclick="toggleLikeVideo('${vidObj.id}')" style="background:${liked?'#ff4444':'#333'}; border:none; color:white; padding:8px 20px; border-radius:40px">${liked?'❤️ Liked':'🤍 Like'} (${fmtNum(vidObj.likes)})</button></div></div>`;
  await loadComments(vidObj.id);
}
async function loadComments(vid){
  let cmtDiv = document.getElementById('playerCmts');
  cmtDiv.innerHTML = '<div class="loading-dots">Loading comments...</div>';
  let apiCmts = [];
  let url = `https://www.googleapis.com/youtube/v3/commentThreads?part=snippet&videoId=${vid}&maxResults=15&key=${API_KEY}`;
  let data = await api(url);
  if(data && data.items) apiCmts = data.items.map(item=>({ name: item.snippet.topLevelComment.snippet.authorDisplayName, text: item.snippet.topLevelComment.snippet.textDisplay, likes: item.snippet.topLevelComment.snippet.likeCount, time: 'recent' }));
  let local = cmtsStore[vid] || [];
  let all = [...local.reverse(), ...apiCmts];
  if(all.length===0) all = [{name:'User', text:'🔥 Great content!', likes:12},{name:'Fan', text:'Amazing', likes:5}];
  cmtDiv.innerHTML = `<div style="margin-top:12px"><strong>Comments (${all.length})</strong></div><div><textarea id="newCmt" placeholder="Add comment..." rows="2" style="width:100%; background:#222; color:white; border-radius:12px; padding:8px"></textarea><button onclick="postComment('${vid}')" style="margin-top:6px">Post</button></div>` + all.map(c=>`<div class="cmt-item"><div class="cmt-av">👤</div><div><b>${escapeHtml(c.name)}</b><div>${escapeHtml(c.text)}</div><div>❤️ ${fmtNum(c.likes)}</div></div></div>`).join('');
}
function postComment(vid){
  let txt = document.getElementById('newCmt')?.value.trim();
  if(!txt) return;
  if(!cmtsStore[vid]) cmtsStore[vid]=[];
  cmtsStore[vid].push({name:'@waseem7227', text:txt, likes:0, time:'now'});
  localStorage.setItem('ak_cmts', JSON.stringify(cmtsStore));
  toast('Comment added');
  loadComments(vid);
}
function toggleLikeVideo(vid){
  if(likes[vid]) delete likes[vid];
  else likes[vid]={ts:Date.now()};
  localStorage.setItem('ak_likes', JSON.stringify(likes));
  let btn = document.getElementById('playerLikeBtn');
  if(btn) btn.innerText = likes[vid] ? '❤️ Liked' : '🤍 Like';
  toast(likes[vid] ? 'Liked' : 'Unliked');
}
function toggleSubChannel(ch){
  if(subs[ch]) delete subs[ch];
  else subs[ch]={ts:Date.now()};
  localStorage.setItem('ak_subs', JSON.stringify(subs));
  let btn = document.getElementById('playerSubBtn');
  if(btn){
    let isSub = !!subs[ch];
    btn.innerText = isSub ? 'Subscribed' : 'Subscribe';
    btn.classList.toggle('subscribed', isSub);
  }
  renderSubsPage();
}
function renderSubsPage(){
  let listDiv = document.getElementById('subsList');
  let keys = Object.keys(subs);
  if(!keys.length){ listDiv.innerHTML='<div style="padding:20px; text-align:center">No subscriptions yet</div>'; return; }
  listDiv.innerHTML = keys.map(ch=>`<div style="display:flex; justify-content:space-between; padding:12px; border-bottom:1px solid #333"><div>📺 ${escapeHtml(ch)}</div><button onclick="unsubChannel('${escapeHtml(ch)}')" style="background:none; border:1px solid #666; padding:4px 12px; border-radius:20px">Unsub</button></div>`).join('');
}
