<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Anskinge</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ===== YOUR FULL CSS ===== */
/* (Keep exactly as you had — I'm including it below for completeness) */
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;outline:none!important;-webkit-appearance:none;}
html,body{overflow:hidden;overscroll-behavior:none;background:#000;height:100%;font-family:'Outfit',sans-serif;}
body{color:#f1f1f1;max-width:430px;margin:0 auto;position:relative;}
*::-webkit-scrollbar{display:none!important;}
:root{
  --bg:#0a0a0a;--bg2:#161616;--bg3:#222;--bg4:#2e2e2e;
  --text:#f1f1f1;--text2:#999;--text3:#555;
  --red:#ff0033;--border:#2a2a2a;--blue:#3ea6ff;--pink:#fe2c55;
  --green:#00e676;
  --ig-grad:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);
}
/* SPLASH */
#splash{position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;background:#000;}
.sp-glow{position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(255,0,51,.12),transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);animation:glowPulse 2s ease-in-out infinite;}
@keyframes glowPulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.5;}50%{transform:translate(-50%,-50%) scale(1.4);opacity:1;}}
.sp-logo{width:72px;height:52px;border-radius:18px;background:var(--red);display:flex;align-items:center;justify-content:center;box-shadow:0 0 40px rgba(255,0,51,.7);position:relative;z-index:2;}
.sp-brand{font-size:44px;font-weight:900;color:#fff;position:relative;z-index:2;}
.sp-brand em{color:var(--red);font-style:normal;}
.sp-tag{font-size:11px;color:rgba(255,255,255,.3);letter-spacing:4px;text-transform:uppercase;position:relative;z-index:2;}
.sp-bar-wrap{width:220px;height:3px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;position:relative;z-index:2;}
.sp-bar{height:100%;width:0%;border-radius:2px;background:linear-gradient(90deg,var(--red),#ff6600);}
/* PLAT SPLASH */
#plat-splash{display:none;position:fixed;inset:0;z-index:9998;flex-direction:column;align-items:center;justify-content:center;gap:22px;}
#plat-splash.ps-yt{background:radial-gradient(ellipse at center,#110000,#000);}
#plat-splash.ps-ig{background:radial-gradient(ellipse at center,#110008,#000);}
#plat-splash.ps-tt{background:radial-gradient(ellipse at center,#000811,#000);}
.ps-icon{width:80px;height:58px;border-radius:18px;display:flex;align-items:center;justify-content:center;}
.ps-icon.yt{background:var(--red);box-shadow:0 0 40px rgba(255,0,51,.6);}
.ps-icon.ig{background:var(--ig-grad);}
.ps-icon.tt{background:#000;border:1.5px solid #333;}
.ps-title{font-size:44px;font-weight:900;color:#fff;}
.ps-title em{font-style:normal;color:var(--red);}
.ps-bar-wrap{width:220px;height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;}
.ps-bar-inner{height:100%;width:0%;border-radius:2px;}
.ps-bar-inner.yt{background:linear-gradient(90deg,var(--red),#ff6600);}
.ps-bar-inner.ig{background:var(--ig-grad);}
.ps-bar-inner.tt{background:linear-gradient(90deg,#69c9d0,var(--pink));}
/* AUTH */
#auth-screen{display:none;position:fixed;inset:0;z-index:8500;background:var(--bg);flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;overflow-y:auto;}
.auth-logo-wrap{display:flex;align-items:center;gap:12px;margin-bottom:36px;}
.auth-logo-box{width:44px;height:32px;background:var(--red);border-radius:10px;display:flex;align-items:center;justify-content:center;}
.auth-brand{font-size:32px;font-weight:900;color:#fff;}
.auth-brand em{color:var(--red);font-style:normal;}
.auth-subtitle{font-size:14px;color:var(--text2);margin-bottom:28px;text-align:center;}
.auth-tabs{display:flex;background:var(--bg2);border-radius:14px;padding:4px;margin-bottom:24px;width:100%;border:1px solid var(--border);}
.auth-tab{flex:1;padding:11px;text-align:center;border-radius:11px;font-size:14px;font-weight:700;cursor:pointer;color:var(--text2);}
.auth-tab.active{background:var(--red);color:#fff;}
.auth-field{width:100%;margin-bottom:16px;}
.auth-label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:7px;}
.auth-input{width:100%;background:var(--bg2);border:1.5px solid var(--border);border-radius:14px;padding:14px 16px;color:var(--text);font-size:14px;font-family:'Outfit',sans-serif;}
.auth-input:focus{border-color:var(--red);}
.auth-btn{width:100%;padding:15px;border-radius:14px;border:none;background:linear-gradient(135deg,var(--red),#ff4400);color:#fff;font-size:15px;font-weight:800;cursor:pointer;font-family:'Outfit',sans-serif;margin-top:4px;box-shadow:0 4px 20px rgba(255,0,51,.4);}
.auth-or{text-align:center;color:var(--text3);font-size:13px;margin:18px 0;}
.auth-guest{width:100%;padding:14px;border-radius:14px;border:1.5px solid var(--border);background:transparent;color:var(--text2);font-size:14px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;}
.auth-err{color:#ff4444;font-size:12px;text-align:center;margin-top:8px;min-height:18px;}
/* DROPDOWNS */
#platform-dropdown{display:none;position:fixed;top:58px;left:8px;z-index:1200;background:rgba(18,18,18,.99);border:1px solid var(--border);border-radius:16px;overflow:hidden;min-width:190px;box-shadow:0 12px 40px rgba(0,0,0,.95);}
#platform-dropdown.open{display:block;}
.pd-item{display:flex;align-items:center;gap:14px;padding:15px 18px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.04);}
.pd-item:last-child{border:none;}
.pd-item.active-p{background:rgba(255,255,255,.07);}
.pd-logo{width:36px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.pd-logo.yt{background:var(--red);}
.pd-logo.ig{background:var(--ig-grad);}
.pd-logo.tt{background:#000;border:1px solid #555;}
.pd-label{font-size:14px;font-weight:700;color:#fff;}
#lang-dropdown{display:none;position:fixed;top:58px;right:4px;z-index:1200;background:rgba(18,18,18,.99);border:1px solid var(--border);border-radius:16px;overflow:hidden;min-width:162px;box-shadow:0 12px 40px rgba(0,0,0,.95);}
#lang-dropdown.open{display:block;}
.ld-item{display:flex;align-items:center;gap:10px;padding:13px 16px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px;font-weight:600;color:var(--text);}
.ld-item:last-child{border:none;}
/* TOP NAV */
#topnav{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;z-index:500;background:rgba(10,10,10,.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 12px;height:54px;display:flex;align-items:center;gap:8px;}
.logo-wrap{display:flex;align-items:center;gap:6px;cursor:pointer;flex-shrink:0;}
.logo-box{width:30px;height:22px;background:var(--red);border-radius:6px;display:flex;align-items:center;justify-content:center;}
.logo-text{font-size:17px;font-weight:900;color:#fff;letter-spacing:-0.5px;}
.logo-text em{color:var(--red);font-style:normal;}
.dd-arrow{width:20px;height:20px;cursor:pointer;color:var(--text2);flex-shrink:0;}
#search-bar{flex:1;display:flex;align-items:center;background:var(--bg3);border:1px solid var(--border);border-radius:24px;overflow:hidden;min-width:0;}
#search-bar input{flex:1;padding:9px 12px;background:transparent;border:none;color:var(--text);font-size:13px;font-family:'Outfit',sans-serif;min-width:0;}
#search-bar input::placeholder{color:var(--text3);}
#search-bar button{padding:9px 12px;background:transparent;border:none;color:var(--text2);cursor:pointer;font-size:14px;}
.lang-btn{display:flex;align-items:center;gap:3px;background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:6px 10px;cursor:pointer;font-size:12px;font-weight:700;color:var(--text2);flex-shrink:0;}
#timer-badge{width:36px;height:36px;border-radius:50%;background:var(--bg2);border:1.5px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;}
.timer-svg{position:absolute;inset:-2px;width:calc(100% + 4px);height:calc(100% + 4px);transform:rotate(-90deg);}
.timer-track{fill:none;stroke:rgba(255,255,255,.08);stroke-width:2;}
.timer-prog{fill:none;stroke:var(--red);stroke-width:2;stroke-linecap:round;}
.timer-num{font-size:10px;font-weight:800;color:var(--text2);position:relative;z-index:1;}
/* BOT NAV */
#botnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;z-index:500;background:rgba(10,10,10,.97);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;justify-content:space-around;align-items:center;height:58px;}
.bnav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--text3);cursor:pointer;font-size:10px;font-weight:600;padding:4px 8px;font-family:'Outfit',sans-serif;min-width:52px;}
.bnav-btn.active{color:#fff;}
.bnav-btn svg{width:22px;height:22px;}
.bnav-plus{width:48px;height:34px;background:none;border:none;cursor:pointer;padding:0;flex-shrink:0;}
.bnav-plus-inner{width:100%;height:100%;border-radius:10px;background:linear-gradient(135deg,#00c6ff,#7b2ff7,#ff0080);display:flex;align-items:center;justify-content:center;}
/* MAIN */
#main{position:fixed;top:54px;bottom:58px;left:50%;transform:translateX(-50%);width:100%;max-width:430px;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;background:var(--bg);overscroll-behavior:none;}
.cat-strip{display:flex;gap:8px;padding:12px 14px;overflow-x:auto;position:sticky;top:0;z-index:10;background:var(--bg);border-bottom:1px solid var(--border);}
.cat-chip{padding:7px 16px;border-radius:22px;background:var(--bg2);color:var(--text2);border:1px solid var(--border);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;font-family:'Outfit',sans-serif;}
.cat-chip.active{background:#fff;color:#000;border-color:#fff;}
#home-page{display:block;padding-bottom:20px;}
.section-hdr{display:flex;align-items:center;gap:8px;padding:16px 14px 10px;font-size:15px;font-weight:800;}
.red-pill{background:var(--red);color:#fff;font-size:10px;font-weight:800;padding:3px 9px;border-radius:10px;}

/* ===FAST SHORT CARDS=== */
.shorts-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:3px;}
.short-card{cursor:pointer;position:relative;aspect-ratio:9/16;overflow:hidden;border-radius:10px;background:var(--bg2);}
.short-card .sc-color{position:absolute;inset:0;z-index:0;transition:opacity .3s;}
.short-card img.sc-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;opacity:0;transition:opacity .25s ease;}
.short-card img.sc-img.shown{opacity:1;}
.short-card-info{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.92));padding:22px 8px 8px;z-index:2;}
.sc-title{font-size:11px;color:#fff;font-weight:700;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.sc-views{font-size:10px;color:rgba(255,255,255,.75);margin-top:3px;}
.sc-badge{position:absolute;top:7px;right:7px;color:#fff;font-size:9px;font-weight:800;padding:2px 7px;border-radius:8px;z-index:3;}
.sc-badge.mine{background:var(--red);}
.sc-badge.new{background:#2196f3;}

/* VIDEO CARD */
.video-card{cursor:pointer;margin-bottom:2px;background:var(--bg);}
.thumb-wrap{width:100%;aspect-ratio:16/9;background:var(--bg2);position:relative;overflow:hidden;}
.thumb-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
.thumb-dur{position:absolute;bottom:6px;right:8px;background:rgba(0,0,0,.9);color:#fff;font-size:11px;font-weight:700;padding:2px 6px;border-radius:5px;}
.video-row{display:flex;gap:10px;padding:10px 14px 14px;}
.ch-av{width:38px;height:38px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#fff;overflow:hidden;}
.ch-av img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.vid-meta{flex:1;}
.vid-title{font-size:13px;font-weight:700;line-height:1.35;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.vid-sub{font-size:11px;color:var(--text2);}
.vid-sub span+span::before{content:'·';margin:0 4px;}
/* SEARCH */
#search-page{display:none;padding-bottom:20px;}
.search-topbar{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--border);}
.search-inp{flex:1;background:var(--bg2);border:1.5px solid var(--border);border-radius:24px;padding:10px 16px;color:var(--text);font-size:14px;outline:none;font-family:'Outfit',sans-serif;}
.back-btn-sm{width:38px;height:38px;border-radius:50%;background:var(--bg2);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;}
.trend-item{display:flex;align-items:center;gap:12px;padding:12px 14px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.03);}
.trend-text{font-size:14px;color:var(--text);flex:1;}
/* PLAYER */
#player-page{display:none;background:var(--bg);}
.player-topbar{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--border);}
.back-btn{width:38px;height:38px;border-radius:50%;background:var(--bg2);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;}
.back-btn svg{width:20px;height:20px;stroke:var(--text);stroke-width:2.5;fill:none;}
.player-title-txt{font-size:13px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.player-wrap{width:100%;aspect-ratio:16/9;background:#000;position:relative;overflow:hidden;}
.player-wrap iframe{width:100%;height:100%;display:block;border:0;position:absolute;inset:0;}
.fake-play{position:absolute;inset:0;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2;}
.fake-play img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.fake-overlay{position:absolute;inset:0;background:rgba(0,0,0,.35);}
.play-circle{position:relative;z-index:2;width:68px;height:68px;background:rgba(255,255,255,.95);border-radius:50%;display:flex;align-items:center;justify-content:center;}
.play-circle svg{width:30px;height:30px;fill:#000;margin-left:6px;}
.ctrl-bar{display:flex;align-items:center;justify-content:center;gap:12px;padding:8px 12px;}
.ctrl-btn{display:flex;flex-direction:column;align-items:center;gap:2px;background:var(--bg2);border:1px solid var(--border);color:var(--text2);cursor:pointer;font-family:'Outfit',sans-serif;font-size:9px;font-weight:700;padding:8px 16px;border-radius:10px;}
.ctrl-btn.on{color:var(--blue);background:rgba(62,166,255,.12);border-color:rgba(62,166,255,.3);}
.ctrl-btn svg{width:20px;height:20px;}
.vid-details{padding:14px;}
.vd-title{font-size:15px;font-weight:800;line-height:1.4;margin-bottom:14px;}
.vd-ch-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.vd-ch-left{display:flex;align-items:center;gap:10px;}
.vd-av{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;color:#fff;flex-shrink:0;overflow:hidden;}
.vd-av img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.vd-ch-name{font-size:14px;font-weight:800;}
.vd-subs{font-size:12px;color:var(--text2);}
.sub-btn{padding:9px 20px;border-radius:22px;border:none;cursor:pointer;font-size:13px;font-weight:800;background:#fff;color:#000;font-family:'Outfit',sans-serif;}
.sub-btn.subscribed{background:var(--bg3);color:var(--text2);}
.vd-stats{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.stat-chip{background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:6px 13px;font-size:12px;color:var(--text2);}
.vd-acts{display:flex;gap:8px;}
.vd-act{flex:1;padding:11px 6px;border-radius:12px;border:none;cursor:pointer;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:6px;font-family:'Outfit',sans-serif;}
.like-act{background:rgba(255,0,51,.12);color:#ff6b6b;border:1px solid rgba(255,0,51,.2);}
.save-act{background:rgba(255,200,0,.1);color:#ffc107;border:1px solid rgba(255,200,0,.2);}
.share-act{background:var(--bg2);color:var(--text2);border:1px solid var(--border);}
.cmt-section{border-top:1px solid var(--border);}
.cmt-toggle-row{display:flex;align-items:center;justify-content:space-between;padding:14px;cursor:pointer;}
.cmt-body{display:none;padding:0 14px 14px;}
.cmt-item{display:flex;gap:10px;margin-bottom:14px;}
.cmt-av{width:34px;height:34px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;}
.cmt-inner{flex:1;}
.cmt-author{font-size:12px;font-weight:800;}
.cmt-time{font-size:11px;color:var(--text2);margin-left:6px;}
.cmt-text{font-size:13px;line-height:1.4;margin-top:3px;}
.more-vids{padding:14px;}
.more-vids-title{font-size:14px;font-weight:800;margin-bottom:12px;}
/* SUBS */
#subs-page{display:none;background:var(--bg);}
.page-title{font-size:22px;font-weight:900;margin-bottom:16px;padding:20px 16px 0;}
.sub-ch-item{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--border);}
.sub-ch-av{width:48px;height:48px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:19px;color:#fff;}
.sub-ch-info{flex:1;}
.sub-ch-name{font-size:14px;font-weight:700;}
.sub-ch-count{font-size:12px;color:var(--text2);}
.unsub-btn{padding:7px 15px;border-radius:18px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:12px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;}
/* PROFILE */
#profile-page{display:none;background:var(--bg);}
.profile-header{background:linear-gradient(180deg,#1e1e1e,var(--bg));padding:28px 20px 0;display:flex;flex-direction:column;align-items:center;}
.profile-av{width:94px;height:94px;border-radius:50%;background:linear-gradient(135deg,var(--red),#cc0000);color:#fff;font-size:38px;font-weight:900;display:flex;align-items:center;justify-content:center;margin-bottom:14px;}
.profile-username{font-size:22px;font-weight:900;color:#fff;margin-bottom:4px;}
.profile-handle{font-size:14px;color:var(--text2);margin-bottom:18px;}
.profile-stats{display:flex;width:100%;border-top:1px solid var(--border);border-bottom:1px solid var(--border);}
.profile-stat{flex:1;text-align:center;padding:16px 0;border-right:1px solid var(--border);}
.profile-stat:last-child{border-right:none;}
.profile-stat-num{font-size:19px;font-weight:900;color:#fff;}
.profile-stat-label{font-size:11px;color:var(--text2);margin-top:3px;}
.profile-act-row{display:flex;gap:10px;padding:16px 20px;}
.profile-act-btn{flex:1;padding:11px;border-radius:12px;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-size:13px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;}
.profile-act-btn.logout{background:rgba(255,0,51,.12);border-color:rgba(255,0,51,.3);color:#ff6b6b;}
.profile-tabs{display:flex;border-bottom:1px solid var(--border);}
.profile-tab{flex:1;text-align:center;padding:13px;font-size:13px;font-weight:700;color:var(--text2);cursor:pointer;border-bottom:2.5px solid transparent;}
.profile-tab.active{color:#fff;border-bottom-color:var(--red);}
.profile-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;}
.profile-vid-card{aspect-ratio:9/16;background:var(--bg2);position:relative;overflow:hidden;cursor:pointer;}
.profile-vid-card img{width:100%;height:100%;object-fit:cover;}
.profile-vid-views{position:absolute;bottom:5px;left:5px;font-size:10px;color:#fff;font-weight:800;text-shadow:0 1px 3px rgba(0,0,0,.9);}
/* SHORTS */
#shorts-page{display:none;position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;height:100dvh;z-index:600;background:#000;overflow:hidden;}
#shorts-scroller{width:100%;height:100%;overflow-y:scroll;scroll-snap-type:y mandatory;-webkit-overflow-scrolling:touch;overscroll-behavior:none;}
.s-slide{width:100%;height:100dvh;scroll-snap-align:start;scroll-snap-stop:always;position:relative;background:#000;overflow:hidden;}

/* ===UPLOAD MODAL=== */
#upload-modal{display:none;position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.8);backdrop-filter:blur(12px);align-items:flex-end;justify-content:center;}
.upload-sheet{background:#111;border-radius:24px 24px 0 0;width:100%;max-width:430px;max-height:92vh;overflow-y:auto;border-top:1px solid #2a2a2a;}
.upload-handle-row{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 0;}
.upload-handle{width:40px;height:4px;background:#333;border-radius:2px;margin:0 auto;}
.upload-close-x{background:none;border:none;color:#666;font-size:24px;cursor:pointer;line-height:1;padding:0;}
.upload-title-h{font-size:19px;font-weight:900;color:#fff;padding:12px 20px 4px;}
.upload-steps{display:flex;align-items:center;padding:14px 20px 16px;gap:0;}
.us-step{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;}
.us-num{width:30px;height:30px;border-radius:50%;border:2px solid #333;background:#1a1a1a;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#555;transition:all .25s;}
.us-num.active{border-color:var(--red);background:var(--red);color:#fff;box-shadow:0 0 14px rgba(255,0,51,.5);}
.us-num.done{border-color:var(--green);background:var(--green);color:#000;}
.us-lbl{font-size:10px;font-weight:700;color:#555;transition:color .25s;}
.us-lbl.active{color:#fff;}
.us-lbl.done{color:var(--green);}
.us-line{height:2px;flex:1;background:#222;margin-bottom:16px;transition:background .25s;}
.us-line.done{background:var(--green);}
.up-panel{display:none;padding:0 20px 20px;}
.up-panel.active{display:block;}
.up-drop{border:2px dashed #333;border-radius:18px;padding:32px 16px;text-align:center;cursor:pointer;background:#1a1a1a;transition:all .2s;margin-bottom:16px;}
.up-drop.has-file{border-color:var(--green);background:rgba(0,230,118,.04);}
.up-drop:active{border-color:var(--red);}
.up-drop-icon{width:52px;height:52px;border-radius:14px;background:#222;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;}
.up-drop-icon svg{width:26px;height:26px;stroke:#666;fill:none;}
.up-drop-title{font-size:15px;font-weight:800;color:#ccc;margin-bottom:5px;}
.up-drop-sub{font-size:12px;color:#555;}
#up-vid-wrap{display:none;border-radius:16px;overflow:hidden;aspect-ratio:9/16;max-height:260px;background:#000;margin-bottom:14px;position:relative;}
#up-vid-el{width:100%;height:100%;object-fit:cover;display:block;}
.up-vid-change{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.75);border:none;border-radius:10px;padding:7px 13px;color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;}
.up-thumb-title{font-size:13px;font-weight:800;color:#ccc;margin-bottom:10px;}
.up-thumb-row{display:flex;gap:10px;margin-bottom:14px;}
.up-thumb-opt{flex:1;border-radius:14px;border:2px solid #2a2a2a;background:#1a1a1a;padding:14px 10px;text-align:center;cursor:pointer;transition:all .15s;}
.up-thumb-opt.active{border-color:var(--red);background:rgba(255,0,51,.08);}
.up-thumb-opt svg{width:22px;height:22px;stroke:#555;fill:none;margin-bottom:5px;display:block;margin-left:auto;margin-right:auto;}
.up-thumb-opt.active svg{stroke:var(--red);}
.up-thumb-opt-lbl{font-size:11px;font-weight:700;color:#555;}

// ---- HELPER: upload with XHR progress ----
function uploadFileWithProgress(file, bucket, path, onProgress){
  return new Promise((resolve, reject)=>{
    const xhr=new XMLHttpRequest();
    const url=`https://wgcvizdeiwmjgebyqewr.supabase.co/storage/v1/object/${bucket}/${path}`;
    xhr.open('POST', url, true);
    xhr.setRequestHeader('Authorization', 'Bearer sb_publishable_8KjRd6Pkw8d4bykc8yPI7A_wFCNysxZ');
    xhr.upload.onprogress=(e)=>{
      if(e.lengthComputable && onProgress) onProgress((e.loaded/e.total)*100);
    };
    xhr.onload=()=>{
      if(xhr.status>=200 && xhr.status<300){
        const publicUrl=`https://wgcvizdeiwmjgebyqewr.supabase.co/storage/v1/object/public/${bucket}/${path}`;
        resolve(publicUrl);
      }else{
        reject(new Error(`Upload failed (${xhr.status}): ${xhr.responseText}`));
      }
    };
    xhr.onerror=()=>reject(new Error('Network error during upload'));
    const fd=new FormData();
    fd.append('file', file);
    xhr.send(fd);
  });
}
