<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Anskinge</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap');
:root{
  --bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#272727;--bg4:#333;
  --text:#f1f1f1;--text2:#aaa;--text3:#666;
  --red:#ff0000;--red2:#cc0000;
  --white:#fff;--border:#2a2a2a;--blue:#3ea6ff;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{color:var(--text);font-family:'Outfit',sans-serif;max-width:430px;margin:0 auto;position:relative;}

/* TOP NAV */
#topnav{
  position:fixed;top:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;z-index:500;
  background:rgba(15,15,15,0.97);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:0 12px;height:52px;
  display:flex;align-items:center;gap:10px;
}
.logo-wrap{display:flex;align-items:center;gap:7px;cursor:pointer;flex-shrink:0;text-decoration:none;}
.logo-box{width:32px;height:22px;background:var(--red);border-radius:6px;display:flex;align-items:center;justify-content:center;}
.logo-box svg{width:14px;height:14px;fill:#fff;}
.logo-text{font-size:18px;font-weight:800;color:#fff;letter-spacing:-0.5px;}
.logo-text em{color:var(--red);font-style:normal;}
#search-bar{
  flex:1;display:flex;align-items:center;
  background:var(--bg3);border:1px solid var(--border);
  border-radius:22px;overflow:hidden;
}
#search-bar input{
  flex:1;padding:8px 14px;background:transparent;border:none;
  color:var(--text);font-size:13px;outline:none;font-family:'Outfit',sans-serif;
}
#search-bar input::placeholder{color:var(--text3);}
#search-bar button{
  padding:8px 14px;background:var(--bg4);border:none;border-left:1px solid var(--border);
  color:var(--text2);cursor:pointer;font-size:15px;line-height:1;
}

/* BOTTOM NAV */
#botnav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;z-index:500;
  background:rgba(15,15,15,0.97);
  backdrop-filter:blur(12px);
  border-top:1px solid var(--border);
  display:flex;justify-content:space-around;align-items:center;
  height:56px;padding-bottom:env(safe-area-inset-bottom,4px);
}
.bnav-btn{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  background:none;border:none;color:var(--text3);cursor:pointer;
  font-size:10px;font-weight:600;padding:4px 10px;
  font-family:'Outfit',sans-serif;transition:color .2s;min-width:56px;
  position:relative;
}
.bnav-btn.active{color:var(--white);}
.bnav-btn svg{width:22px;height:22px;}
.bnav-plus{
  width:50px;height:34px;background:none;border:none;
  cursor:pointer;padding:0;flex-shrink:0;
}
.bnav-plus-inner{
  width:100%;height:100%;border-radius:9px;
  background:linear-gradient(135deg,#00c6ff,#7b2ff7,#ff0080);
  display:flex;align-items:center;justify-content:center;
}
.bnav-plus-inner svg{width:18px;height:18px;stroke:#fff;stroke-width:2.5;}
.bnav-badge{
  position:absolute;top:2px;right:8px;
  background:var(--red);color:#fff;border-radius:50%;
  width:15px;height:15px;font-size:9px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
}
.shorts-dot{width:5px;height:5px;background:var(--red);border-radius:50%;margin-bottom:1px;}

/* MAIN SCROLL */
#main{
  position:fixed;top:52px;bottom:56px;
  left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;
  overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
}
#main::-webkit-scrollbar{width:0;}

/* CATEGORY CHIPS */
.cat-strip{
  display:flex;gap:8px;padding:10px 12px;
  overflow-x:auto;flex-shrink:0;position:sticky;top:0;z-index:10;
  background:var(--bg);border-bottom:1px solid var(--border);
}
.cat-strip::-webkit-scrollbar{display:none;}
.cat-chip{
  padding:6px 14px;border-radius:20px;
  background:var(--bg2);color:var(--text2);
  border:1px solid var(--border);
  font-size:12px;font-weight:600;cursor:pointer;
  white-space:nowrap;flex-shrink:0;
  transition:all .2s;font-family:'Outfit',sans-serif;
}
.cat-chip.active{background:#fff;color:#000;border-color:#fff;}

/* HOME PAGE */
#home-page{display:block;padding-bottom:20px;}

.section-hdr{
  display:flex;align-items:center;gap:8px;
  padding:14px 14px 10px;font-size:15px;font-weight:700;
}
.red-pill{
  background:var(--red);color:#fff;
  font-size:10px;font-weight:700;
  padding:2px 8px;border-radius:10px;
  letter-spacing:.3px;
}

/* Shorts 2-col */
.shorts-grid{
  display:grid;grid-template-columns:1fr 1fr;
  gap:6px;padding:0 10px;
}
.short-card{
  cursor:pointer;border-radius:10px;overflow:hidden;
  background:var(--bg2);position:relative;aspect-ratio:9/16;
}
.short-card img{
  width:100%;height:100%;object-fit:cover;
  display:block;background:var(--bg2);
}
.short-card-info{
  position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(transparent,rgba(0,0,0,0.9));
  padding:22px 8px 8px;
}
.short-card-title{font-size:11px;color:#fff;font-weight:600;line-height:1.3;}
.short-card-views{font-size:10px;color:rgba(255,255,255,.6);margin-top:2px;}

/* Long video cards */
.video-card{cursor:pointer;margin-bottom:2px;}
.thumb-wrap{
  width:100%;aspect-ratio:16/9;
  background:var(--bg2);position:relative;overflow:hidden;
}
.thumb-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
.thumb-dur{
  position:absolute;bottom:6px;right:8px;
  background:rgba(0,0,0,0.9);color:#fff;
  font-size:11px;font-weight:700;padding:2px 5px;border-radius:4px;
}
.video-row{display:flex;gap:10px;padding:10px 14px 12px;}
.ch-av{
  width:36px;height:36px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:14px;color:#fff;
}
.vid-meta{flex:1;}
.vid-title{
  font-size:13px;font-weight:600;line-height:1.35;margin-bottom:3px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.vid-sub{font-size:11px;color:var(--text2);}
.vid-sub span+span::before{content:'·';margin:0 3px;}

/* SEARCH PAGE */
#search-page{display:none;padding-bottom:20px;}
.search-topbar{
  display:flex;align-items:center;gap:10px;
  padding:12px 14px;border-bottom:1px solid var(--border);
}
.search-big-input{
  flex:1;background:var(--bg2);border:1px solid var(--border);
  border-radius:22px;padding:9px 16px;color:var(--text);
  font-size:14px;outline:none;font-family:'Outfit',sans-serif;
}
.back-circle{
  width:36px;height:36px;border-radius:50%;background:var(--bg2);
  border:1px solid var(--border);cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}

#search-suggestions{padding:12px 14px;}
.search-hint{font-size:13px;color:var(--text2);margin-bottom:12px;font-weight:600;}
.trend-list{display:flex;flex-direction:column;gap:2px;}
.trend-item{
  display:flex;align-items:center;gap:12px;
  padding:11px 8px;border-radius:8px;cursor:pointer;
}
.trend-item:active{background:var(--bg2);}
.trend-icon{color:var(--text3);font-size:16px;flex-shrink:0;}
.trend-text{font-size:14px;color:var(--text);flex:1;}

/* SHORTS FULLSCREEN */
#shorts-page{
  display:none;position:fixed;
  top:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;height:100vh;
  z-index:600;background:#000;overflow:hidden;
}
#shorts-scroller{
  width:100%;height:100%;
  overflow-y:scroll;
  scroll-snap-type:y mandatory;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior:none;
}
#shorts-scroller::-webkit-scrollbar{display:none;}

.s-slide{
  width:100%;height:100vh;
  scroll-snap-align:start;
  scroll-snap-stop:always;
  position:relative;background:#000;
  overflow:hidden;flex-shrink:0;
}
.s-bg-img{
  position:absolute;inset:0;
  width:100%;height:100%;object-fit:cover;
  filter:blur(2px) scale(1.05);opacity:.4;
}
.s-video-wrap{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
}
.s-iframe{
  width:100%;height:100%;border:0;
  display:block;
}
.s-gradient{
  position:absolute;inset:0;
  background:linear-gradient(to bottom,rgba(0,0,0,.4) 0%,transparent 20%,transparent 55%,rgba(0,0,0,.85) 100%);
  pointer-events:none;z-index:5;
}

.s-info{
  position:absolute;bottom:76px;left:14px;right:76px;
  z-index:10;
}
.s-ch-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.s-avatar{
  width:40px;height:40px;border-radius:50%;
  background:var(--red);color:#fff;font-weight:700;font-size:16px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;border:2px solid rgba(255,255,255,.85);
  overflow:hidden;
}
.s-ch-name{font-size:14px;font-weight:700;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.6);}
.s-sub-btn{
  padding:5px 14px;border-radius:16px;
  border:1.5px solid rgba(255,255,255,.9);
  background:transparent;color:#fff;
  font-size:12px;font-weight:700;cursor:pointer;
  font-family:'Outfit',sans-serif;white-space:nowrap;
  transition:all .2s;
}
.s-sub-btn.subbed{background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.4);}
.s-title{font-size:13px;color:rgba(255,255,255,.92);line-height:1.45;text-shadow:0 1px 3px rgba(0,0,0,.5);}

.s-actions{
  position:absolute;right:10px;bottom:78px;
  display:flex;flex-direction:column;align-items:center;gap:20px;
  z-index:10;
}
.s-act-btn{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  background:none;border:none;color:#fff;cursor:pointer;
  font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;
  text-shadow:0 1px 3px rgba(0,0,0,.6);
}
.s-act-circle{
  width:46px;height:46px;border-radius:50%;
  background:rgba(0,0,0,.45);
  backdrop-filter:blur(10px);
  display:flex;align-items:center;justify-content:center;
  border:1px solid rgba(255,255,255,.12);
  transition:transform .15s;
}
.s-act-circle:active{transform:scale(.88);}
.s-act-btn.liked .s-act-circle{background:rgba(255,60,60,.4);}

/* SHORTS BOTTOM NAV */
#shorts-botnav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;z-index:650;
  background:rgba(0,0,0,0.75);
  backdrop-filter:blur(16px);
  border-top:1px solid rgba(255,255,255,.08);
  display:none;justify-content:space-around;align-items:center;
  height:56px;padding-bottom:env(safe-area-inset-bottom,4px);
}
.sbn-btn{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  background:none;border:none;color:rgba(255,255,255,.7);cursor:pointer;
  font-size:10px;font-weight:600;padding:4px 10px;
  font-family:'Outfit',sans-serif;transition:color .2s;min-width:56px;
  position:relative;
}
.sbn-btn.active{color:#fff;}
.sbn-btn svg{width:22px;height:22px;}
.sbn-plus{
  width:50px;height:34px;background:none;border:none;
  cursor:pointer;padding:0;flex-shrink:0;
}
.sbn-plus-inner{
  width:100%;height:100%;border-radius:9px;
  background:linear-gradient(135deg,#00c6ff,#7b2ff7,#ff0080);
  display:flex;align-items:center;justify-content:center;
}
.sbn-plus-inner svg{width:18px;height:18px;stroke:#fff;stroke-width:2.5;}
.sbn-badge{
  position:absolute;top:-3px;right:-3px;
  background:var(--red);color:#fff;border-radius:50%;
  width:15px;height:15px;font-size:9px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
}

/* VIDEO PLAYER PAGE */
#player-page{display:none;}
.player-topbar{
  display:flex;align-items:center;gap:12px;
  padding:12px 14px;border-bottom:1px solid var(--border);
}
.back-btn{
  width:36px;height:36px;border-radius:50%;background:var(--bg2);
  border:1px solid var(--border);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.back-btn svg{width:20px;height:20px;stroke:var(--text);stroke-width:2;fill:none;}
.player-title{
  font-size:14px;font-weight:600;flex:1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.player-wrap{width:100%;aspect-ratio:16/9;background:#000;position:relative;}
.player-wrap iframe{width:100%;height:100%;display:block;border:0;}
.fake-play{
  position:absolute;inset:0;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.fake-play img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.fake-overlay{position:absolute;inset:0;background:rgba(0,0,0,.3);}
.play-circle{
  position:relative;z-index:2;
  width:64px;height:64px;background:rgba(255,255,255,.95);
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(0,0,0,.5);
}
.play-circle svg{width:28px;height:28px;fill:#000;margin-left:5px;}

.vid-details{padding:14px;}
.vd-title{font-size:15px;font-weight:700;line-height:1.4;margin-bottom:12px;}
.vd-ch-row{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:12px;
}
.vd-ch-left{display:flex;align-items:center;gap:10px;}
.vd-av{
  width:40px;height:40px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:15px;color:#fff;flex-shrink:0;
}
.vd-ch-name{font-size:14px;font-weight:700;}
.vd-subs{font-size:12px;color:var(--text2);}
.sub-btn{
  padding:8px 18px;border-radius:20px;border:none;cursor:pointer;
  font-size:13px;font-weight:700;background:#fff;color:#000;
  font-family:'Outfit',sans-serif;transition:all .2s;
}
.sub-btn.subscribed{background:var(--bg3);color:var(--text2);}
.vd-stats{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
.stat-chip{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:16px;padding:5px 12px;font-size:12px;color:var(--text2);
}
.vd-actions{display:flex;gap:8px;margin-bottom:0;}
.vd-act{
  flex:1;padding:10px 6px;border-radius:10px;border:none;cursor:pointer;
  font-size:12px;font-weight:700;
  display:flex;align-items:center;justify-content:center;gap:5px;
  font-family:'Outfit',sans-serif;transition:all .2s;
}
.like-act{background:rgba(255,0,0,.15);color:#ff6b6b;border:1px solid rgba(255,0,0,.2);}
.like-act.liked{background:rgba(255,0,0,.3);color:#ff4444;}
.save-act{background:rgba(255,200,0,.1);color:#ffc107;border:1px solid rgba(255,200,0,.2);}
.share-act{background:var(--bg2);color:var(--text2);border:1px solid var(--border);}

.upnext{padding:14px 14px 0;}
.upnext-title{font-size:14px;font-weight:700;margin-bottom:12px;}
.rel-list{display:flex;flex-direction:column;gap:12px;}
.rel-card{display:flex;gap:10px;cursor:pointer;}
.rel-thumb{
  width:120px;flex-shrink:0;aspect-ratio:16/9;
  background:var(--bg2);border-radius:8px;overflow:hidden;position:relative;
}
.rel-thumb img{width:100%;height:100%;object-fit:cover;}
.rel-dur{
  position:absolute;bottom:4px;right:5px;
  background:rgba(0,0,0,.88);color:#fff;
  font-size:10px;font-weight:700;padding:1px 4px;border-radius:3px;
}
.rel-info{flex:1;}
.rel-title{
  font-size:12px;font-weight:600;line-height:1.35;margin-bottom:4px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.rel-meta{font-size:11px;color:var(--text2);}

/* COMMENTS */
.cmt-section{padding:0;border-top:1px solid var(--border);}
.cmt-toggle-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px;cursor:pointer;
}
.cmt-toggle-icon{color:var(--text2);font-size:18px;transition:transform .3s;}
.cmt-body{display:none;padding:0 14px 14px;}
.cmt-input-row{display:flex;gap:10px;align-items:flex-start;margin-bottom:16px;}
.my-av{
  width:32px;height:32px;border-radius:50%;
  background:var(--red);color:#fff;font-weight:700;font-size:12px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.cmt-field{flex:1;}
.cmt-textarea{
  width:100%;background:transparent;border:none;
  border-bottom:1px solid var(--border);
  color:var(--text);font-size:13px;padding:6px 0;
  resize:none;outline:none;font-family:'Outfit',sans-serif;
  min-height:34px;
}
.cmt-textarea::placeholder{color:var(--text3);}
.cmt-textarea:focus{border-bottom-color:var(--blue);}
.cmt-btns{display:none;justify-content:flex-end;gap:8px;margin-top:8px;}
.cmt-cancel{
  background:none;border:none;color:var(--text2);cursor:pointer;
  font-size:13px;padding:6px 12px;border-radius:20px;font-family:'Outfit',sans-serif;
}
.cmt-submit{
  background:var(--bg3);border:none;color:var(--text3);cursor:pointer;
  font-size:13px;font-weight:700;padding:6px 16px;border-radius:20px;
  font-family:'Outfit',sans-serif;transition:all .2s;
}
.cmt-submit.ready{background:var(--blue);color:#000;}
.cmt-item{display:flex;gap:10px;margin-bottom:16px;}
.cmt-av{
  width:32px;height:32px;border-radius:50%;background:var(--bg3);
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:var(--text2);overflow:hidden;
}
.cmt-av img{width:100%;height:100%;object-fit:cover;}
.cmt-body-inner{flex:1;}
.cmt-author{font-size:12px;font-weight:700;}
.cmt-time{font-size:11px;color:var(--text2);margin-left:6px;}
.cmt-text{font-size:13px;line-height:1.4;margin-top:3px;}
.cmt-likes-btn{
  background:none;border:none;color:var(--text2);cursor:pointer;
  font-size:11px;display:flex;align-items:center;gap:3px;
  margin-top:5px;font-family:'Outfit',sans-serif;
}
.cmt-likes-btn.liked{color:var(--blue);}

/* SHORT COMMENTS PANEL */
#s-panel-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:700;
}
#s-cmt-panel{
  display:none;position:fixed;
  bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;
  background:var(--bg2);border-radius:20px 20px 0 0;
  max-height:70vh;overflow-y:auto;
  z-index:710;padding:0 16px 20px;
  box-shadow:0 -4px 30px rgba(0,0,0,.8);
}
#s-cmt-panel::-webkit-scrollbar{display:none;}
.panel-handle{
  width:36px;height:4px;background:var(--bg4);
  border-radius:2px;margin:12px auto 14px;
}
.panel-hdr{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:14px;padding-top:4px;
}

/* SUBS / PROFILE */
#subs-page,#profile-page{display:none;padding:16px;}
.page-title{font-size:20px;font-weight:800;margin-bottom:16px;}
.sub-ch-item{
  display:flex;align-items:center;gap:12px;
  padding:12px 0;border-bottom:1px solid var(--border);
}
.sub-ch-av{
  width:46px;height:46px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:18px;color:#fff;
}
.sub-ch-info{flex:1;}
.sub-ch-name{font-size:14px;font-weight:600;}
.sub-ch-count{font-size:12px;color:var(--text2);}
.unsub-btn{
  padding:6px 14px;border-radius:16px;border:1px solid var(--border);
  background:transparent;color:var(--text2);font-size:12px;font-weight:600;
  cursor:pointer;font-family:'Outfit',sans-serif;
}

/* Loading */
.loading-dots{
  display:flex;gap:6px;justify-content:center;padding:20px;
}
.loading-dots span{
  width:8px;height:8px;background:var(--red);border-radius:50%;
  animation:dotPulse 1.2s ease-in-out infinite;
}
.loading-dots span:nth-child(2){animation-delay:.2s;}

<script>
// ============================================================
// CONFIG
// ============================================================
const API_KEY = 'AIzaSyAXmWdEwssA7_NUJGJCQqR60fzrFpZ-mfI';
const API_BASE = 'https://www.googleapis.com/youtube/v3';
const EMBED_BASE = 'https://www.youtube-nocookie.com/embed/';
const ORIGIN = encodeURIComponent(location.href.split('#')[0]);

// ============================================================
// CATEGORIES
// ============================================================
const CATEGORIES = ['All','Music','Song','Funny','Motivation','Skill','Gaming','News','Tech','Sports','Travel','Food','Animals','Fashion','Education'];

const CAT_QUERIES = {
  All: ['trending pakistan', 'viral videos', 'top videos today', 'best of youtube'],
  Music: ['music video 2024', 'top songs', 'pakistani music video'],
  Song: ['hit songs 2024', 'best song ever', 'new song release', 'popular song'],
  Funny: ['funny videos compilation', 'comedy shorts', 'hilarious moments', 'try not to laugh'],
  Motivation: ['motivational speech', 'success motivation', 'inspiring videos', 'life motivation urdu'],
  Skill: ['skill building tutorial', 'how to learn fast', 'professional skills', 'life skills tutorial'],
  Gaming: ['gaming highlights', 'roblox gameplay', 'minecraft funny moments'],
  News: ['pakistan news today', 'world news latest', 'breaking news'],
  Tech: ['tech review 2024', 'smartphone review', 'AI technology'],
  Sports: ['cricket highlights', 'football goals', 'sports amazing moments'],
  Travel: ['travel vlog', 'pakistan travel', 'beautiful places'],
  Food: ['pakistani food recipes', 'street food', 'cooking tutorial'],
  Animals: ['funny animals', 'cute cats dogs', 'wildlife amazing'],
  Fashion: ['fashion trends', 'outfit ideas', 'style tips'],
  Education: ['learn programming', 'educational videos', 'science facts'],
};

const SHORT_CAT_QUERIES = {
  All: ['shorts viral', 'youtube shorts trending', 'shorts funny 2024', 'shorts pakistan'],
  Music: ['music shorts', 'song video shorts'],
  Song: ['best song shorts', 'hit song shorts'],
  Funny: ['funny shorts', 'comedy shorts', 'try not to laugh shorts'],
  Motivation: ['motivation shorts', 'inspirational shorts'],
  Skill: ['skill shorts', 'tutorial shorts'],
  Gaming: ['gaming shorts', 'roblox shorts'],
  News: ['news shorts', 'pakistan news shorts'],
  Tech: ['tech shorts', 'phone review shorts'],
  Sports: ['sports shorts', 'cricket shorts'],
  Travel: ['travel shorts', 'vlog shorts'],
  Food: ['food shorts', 'recipe shorts'],
  Animals: ['animal shorts', 'cute pet shorts'],
  Fashion: ['fashion shorts', 'style shorts'],
  Education: ['education shorts', 'facts shorts'],
};

const TRENDING = ['Trending Pakistan','Viral Videos','Funny Moments','Music 2024','Cricket Highlights','Tech Review','Motivation Urdu','Street Food'];

// ============================================================
// STATE
// ============================================================
let ST = {
  page: 'home',
  pageHistory: [],
  activeCat: 'All',
  shortsCat: 'All',
  homeLong: [],
  homeShorts: [],
  homeNextPage: '',
  homeLoading: false,
  shortsData: [],
  activeShortIdx: 0,
  shortsObserver: null,
  currentVideo: null,
  subs: [],
  likes: [],
  shortLikes: {},
  likedShorts: [],
  userComments: {},
};

try {
  ST.subs = JSON.parse(localStorage.getItem('subs')||'[]');
  ST.likes = JSON.parse(localStorage.getItem('likes')||'[]');
  ST.shortLikes = JSON.parse(localStorage.getItem('shortLikes')||'{}');
  ST.likedShorts = JSON.parse(localStorage.getItem('likedShorts')||'[]');
  ST.userComments = JSON.parse(localStorage.getItem('userCmts')||'{}');
} catch(e) {}

function save(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {} }

// ============================================================
// UTILS
// ============================================================
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmt(n) {
  n = Number(n||0);
  if(n>=1e9) return (n/1e9).toFixed(1)+'B';
  if(n>=1e6) return (n/1e6).toFixed(1)+'M';
  if(n>=1e3) return (n/1e3).toFixed(1)+'K';
  return String(n);
}
function timeAgo(iso) {
  if(!iso) return '';
  const s = Math.floor((Date.now()-new Date(iso))/1000);
  if(s<60) return 'just now';
  if(s<3600) return Math.floor(s/60)+'m ago';
  if(s<86400) return Math.floor(s/3600)+'h ago';
  if(s<2592000) return Math.floor(s/86400)+'d ago';
  if(s<31536000) return Math.floor(s/2592000)+'mo ago';
  return Math.floor(s/31536000)+'yr ago';
}
const CH_COLORS=['#e74c3c','#2980b9','#27ae60','#8e44ad','#d35400','#16a085','#f39c12','#1abc9c','#c0392b','#2c3e50'];
function chColor(name){let h=0;for(let c of String(name||''))h=(h+c.charCodeAt(0))%CH_COLORS.length;return CH_COLORS[h];}
function ytEmbed(id,opts=''){return `${EMBED_BASE}${id}?autoplay=1&rel=0&playsinline=1&modestbranding=1&origin=${ORIGIN}${opts}`;}
function ytThumb(id,q='mqdefault'){return `https://img.youtube.com/vi/${id}/${q}.jpg`;}

let toastTimer;
function toast(msg){
  clearTimeout(toastTimer);
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  toastTimer=setTimeout(()=>t.classList.remove('show'),2200);
}

function parseDuration(iso){
  if(!iso)return '';
  const m=iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  if(!m)return '';
  const h=parseInt(m[1]||0),mi=parseInt(m[2]||0),s=parseInt(m[3]||0);
  if(h>0)return `${h}:${String(mi).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${mi}:${String(s).padStart(2,'0')}`;
}

function decodeEntities(str){
  return str.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&#39;/g,"'").replace(/<br\s*\/?>/gi,' ').replace(/<[^>]+>/g,'');
}

// ============================================================
// API
// ============================================================
async function apiGet(endpoint, params){
  const url=`${API_BASE}/${endpoint}?`+new URLSearchParams({...params,key:API_KEY});
  const r=await fetch(url);
  if(!r.ok) throw new Error('API '+r.status);
  return r.json();
}

async function getVideoDetails(ids){
  if(!ids.length)return[];
  try{
    const data=await apiGet('videos',{part:'snippet,statistics,contentDetails,status',id:ids.join(','),maxResults:ids.length});
    return(data.items||[]).filter(v=>v.status&&v.status.embeddable!==false);
  }catch(e){return[];}
}

async function fetchVideos(cat, pageToken=''){
  const queries=CAT_QUERIES[cat]||CAT_QUERIES['All'];
  const q=queries[Math.floor(Math.random()*queries.length)];
  try{
    const data=await apiGet('search',{
      part:'snippet',type:'video',q,maxResults:12,
      videoDuration:'medium,long',videoEmbeddable:'true',
      safeSearch:'moderate',...(pageToken?{pageToken}:{}),
      relevanceLanguage:'en',
    });
    const ids=(data.items||[]).map(i=>i.id.videoId).filter(Boolean);
    const details=await getVideoDetails(ids);
    const detMap={};details.forEach(d=>detMap[d.id]=d);
    const videos=[];
    for(const item of(data.items||[])){
      const vid=item.id.videoId;if(!vid)continue;
      const det=detMap[vid];if(!det)continue;
      const sn=item.snippet;
      videos.push({
        id:vid,title:sn.title,channel:sn.channelTitle,channelId:sn.channelId,
        thumb:sn.thumbnails?.high?.url||sn.thumbnails?.medium?.url||ytThumb(vid),
        views:fmt(det.statistics?.viewCount||0),likes:fmt(det.statistics?.likeCount||0),
        time:timeAgo(sn.publishedAt),dur:parseDuration(det.contentDetails?.duration||''),
        description:sn.description,
      });
    }
    return{videos,nextPage:data.nextPageToken||''};
  }catch(e){console.error(e);return{videos:[],nextPage:''};}
}

async function fetchShorts(cat, pageToken=''){
  const queries=SHORT_CAT_QUERIES[cat]||SHORT_CAT_QUERIES['All'];
  const q=queries[Math.floor(Math.random()*queries.length)];
  try{
    const data=await apiGet('search',{
      part:'snippet',type:'video',q,maxResults:20,
      videoDuration:'short',videoEmbeddable:'true',
      safeSearch:'moderate',...(pageToken?{pageToken}:{}),
    });
    const ids=(data.items||[]).map(i=>i.id.videoId).filter(Boolean);
    const details=await getVideoDetails(ids);
    const detMap={};details.forEach(d=>detMap[d.id]=d);
    const shorts=[];
    for(const item of(data.items||[])){
      const vid=item.id.videoId;if(!vid)continue;
      const det=detMap[vid];if(!det)continue;
      const sn=item.snippet;
      shorts.push({
        id:vid,title:sn.title,channel:sn.channelTitle,channelId:sn.channelId,
        thumb:sn.thumbnails?.high?.url||ytThumb(vid),
        views:fmt(det.statistics?.viewCount||0),time:timeAgo(sn.publishedAt),
      });
    }
    return{shorts,nextPage:data.nextPageToken||''};
  }catch(e){console.error(e);return{shorts:[],nextPage:''};}
}

async function fetchComments(videoId){
  try{
    const data=await apiGet('commentThreads',{part:'snippet',videoId,maxResults:20,order:'relevance'});
    return(data.items||[]).map(item=>{
      const c=item.snippet.topLevelComment.snippet;
      return{author:c.authorDisplayName,text:c.textDisplay,likes:c.likeCount,time:timeAgo(c.publishedAt),avatar:c.authorProfileImageUrl};
    });
  }catch(e){return[];}
}

// ============================================================
// NAVIGATION
// ============================================================
function showPage(page, data){
  if(ST.page!==page) ST.pageHistory.push(ST.page);
  ST.page=page;
  stopAllMedia();closeSPanel();

  document.getElementById('topnav').style.display='flex';
  document.getElementById('botnav').style.display='flex';
  document.getElementById('shorts-page').style.display='none';
  document.getElementById('shorts-botnav').style.display='none';
  document.getElementById('main').style.display='block';

  ['home-page','search-page','player-page','subs-page','profile-page']
    .forEach(id=>document.getElementById(id).style.display='none');
  document.querySelectorAll('.bnav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('main').scrollTop=0;

  if(page==='home'){
    document.getElementById('home-page').style.display='block';
    document.getElementById('bn-home').classList.add('active');
    if(!ST.homeLong.length&&!ST.homeLoading) loadHome();
  } else if(page==='video'){
    document.getElementById('player-page').style.display='block';
    openVideo(data);
  } else if(page==='search'){
    document.getElementById('search-page').style.display='block';
  } else if(page==='subs'){
    document.getElementById('subs-page').style.display='block';
    document.getElementById('bn-subs').classList.add('active');
    renderSubs();
  } else if(page==='profile'){
    document.getElementById('profile-page').style.display='block';
    document.getElementById('bn-profile').classList.add('active');
  }
}

    ST.pageHistory.push(ST.page);
    ST.page='search';
  }
  document.getElementById('topnav').style.display='flex';

// ============================================================
// SEARCH
// ============================================================
async function doSearch(){
  const q=(document.getElementById('search-big-input').value||document.getElementById('search-input').value||'').trim();
  if(!q)return;

  // Make sure search page is visible
  if(ST.page!=='search') showSearchPage();

  document.getElementById('search-big-input').value=q;
  document.getElementById('search-input').value=q;
  document.getElementById('search-suggestions').style.display='none';
  const wrap=document.getElementById('search-results-wrap');
  wrap.style.display='block';
  document.getElementById('search-shorts-wrap').style.display='none';
  document.getElementById('search-vids-hdr').style.display='none';
  document.getElementById('search-long-feed').innerHTML='<div class="loading-dots"><span></span><span></span><span></span></div>';
  document.getElementById('search-shorts-grid').innerHTML='';

  // Search shorts
  const sq=`${q} shorts`;
  const [svr,vr]=await Promise.all([
    fetchShorts('All',q),
    fetchVideos('All',q)
  ]);

  // Try direct query for shorts
  let shortsRes=[];
  try{
    const data=await apiGet('search',{
      part:'snippet',type:'video',q:sq,maxResults:10,
      videoDuration:'short',videoEmbeddable:'true',safeSearch:'moderate',
    });
    const ids=(data.items||[]).map(i=>i.id.videoId).filter(Boolean);
    const details=await getVideoDetails(ids);
    const detMap={};details.forEach(d=>detMap[d.id]=d);
    for(const item of(data.items||[])){
      const vid=item.id.videoId;if(!vid)continue;
      const det=detMap[vid];if(!det)continue;
      const sn=item.snippet;
      shortsRes.push({id:vid,title:sn.title,channel:sn.channelTitle,channelId:sn.channelId,
        thumb:sn.thumbnails?.high?.url||ytThumb(vid),views:fmt(det.statistics?.viewCount||0),time:timeAgo(sn.publishedAt)});
    }
  }catch(e){}

  // Long videos
  let longRes=[];
  try{
    const data=await apiGet('search',{
      part:'snippet',type:'video',q,maxResults:15,
      videoEmbeddable:'true',safeSearch:'moderate',
    });
    const ids=(data.items||[]).map(i=>i.id.videoId).filter(Boolean);
    const details=await getVideoDetails(ids);
    const detMap={};details.forEach(d=>detMap[d.id]=d);
    for(const item of(data.items||[])){
      const vid=item.id.videoId;if(!vid)continue;
      const det=detMap[vid];if(!det)continue;
      const sn=item.snippet;
      longRes.push({id:vid,title:sn.title,channel:sn.channelTitle,channelId:sn.channelId,
        thumb:sn.thumbnails?.high?.url||sn.thumbnails?.medium?.url||ytThumb(vid),
        views:fmt(det.statistics?.viewCount||0),likes:fmt(det.statistics?.likeCount||0),
        time:timeAgo(sn.publishedAt),dur:parseDuration(det.contentDetails?.duration||''),
        description:sn.description});
    }
  }catch(e){}

  if(shortsRes.length){
    document.getElementById('search-shorts-wrap').style.display='block';
    renderShortsGrid('search-shorts-grid',shortsRes);
  }
  if(longRes.length){
    document.getElementById('search-vids-hdr').style.display='flex';
    const feed=document.getElementById('search-long-feed');
    feed.innerHTML='';
    longRes.forEach(v=>feed.appendChild(makeLongCard(v)));
  } else {
    document.getElementById('search-long-feed').innerHTML='<div class="empty-msg"><span class="icon">🔍</span>No results found</div>';
  }
}

function toggleCmtBox(videoId){
  const body=document.getElementById('cmt-body-'+videoId);

  if(!body)return;
  const isOpen=body.style.display!=='none'&&body.style.display!=='';
  body.style.display=isOpen?'none':'block';
  if(icon) icon.style.transform=isOpen?'rotate(0deg)':'rotate(180deg)';
}

function onCmtInput(el,vid){
  const btns=document.getElementById('cmt-btns-'+vid);
  const sub=document.getElementById('cmt-submit-'+vid);
  if(btns) btns.style.display='flex';
  if(sub) sub.className=el.value.trim()?'cmt-submit ready':'cmt-submit';
}
function cancelCmt(vid){
  const inp=document.getElementById('cmt-input-'+vid);
  const btns=document.getElementById('cmt-btns-'+vid);
  if(inp) inp.value='';
  if(btns) btns.style.display='none';
}
function submitCmt(vid){
  const inp=document.getElementById('cmt-input-'+vid);
  const text=inp?inp.value.trim():'';
  if(!text)return;
  if(!ST.userComments[vid]) ST.userComments[vid]=[];
  ST.userComments[vid].unshift({text,time:new Date().toISOString()});
  save('userCmts',ST.userComments);
  inp.value='';cancelCmt(vid);
  toast('💬 Comment posted!');
  loadComments(vid);
}

function toggleSub(channelId, channelName, btnId){
  const idx=ST.subs.findIndex(s=>s.id===channelId);
  const btn=btnId?document.getElementById(btnId):null;
  if(idx===-1){
    ST.subs.push({id:channelId,name:channelName,color:chColor(channelName)});
    if(btn){btn.textContent='Subscribed ✓';btn.className='sub-btn subscribed';}
    toast('✅ Subscribed to '+channelName);
  }else{
    ST.subs.splice(idx,1);
    if(btn){btn.textContent='Subscribe';btn.className='sub-btn';}
    toast('Unsubscribed from '+channelName);
  }
  save('subs',ST.subs);
}

function toggleLike(videoId, btnId){
  const idx=ST.likes.indexOf(videoId);
  const btn=btnId?document.getElementById(btnId):null;
  if(idx===-1){
    ST.likes.push(videoId);
    if(btn){btn.textContent='❤️ Liked';btn.classList.add('liked');}
    toast('❤️ Liked!');
  }else{
    ST.likes.splice(idx,1);
    if(btn){btn.textContent='❤️ Like';btn.classList.remove('liked');}
    toast('Unliked');
  }
  save('likes',ST.likes);
}

function renderSubs(){
  const list=document.getElementById('subs-list');
  if(!ST.subs.length){
    list.innerHTML='<div class="empty-msg"><span class="icon">📺</span>No subscriptions yet.<br>Subscribe to channels to see them here.</div>';
    return;
  }
  list.innerHTML=ST.subs.map(s=>`
    <div class="sub-ch-item">
      <div class="sub-ch-av" style="background:${s.color||chColor(s.name)}">${(s.name||'?').charAt(0)}</div>
      <div class="sub-ch-info">
        <div class="sub-ch-name">${esc(s.name)}</div>
        <div class="sub-ch-count">Subscribed</div>
      </div>
      <button class="unsub-btn" onclick="toggleSub('${esc(s.id)}','${esc(s.name)}',null);renderSubs()">Unsubscribe</button>

}

function buildShortsContainer(shorts){
  if(ST.shortsObserver){ST.shortsObserver.disconnect();ST.shortsObserver=null;}
  const scroller=document.getElementById('shorts-scroller');
  scroller.innerHTML='';

  shorts.forEach((s,idx)=>{
    const liked=ST.likedShorts.includes(s.id);
    const lc=ST.shortLikes[s.id]||0;
    const subbed=ST.subs.some(sub=>sub.id===s.channelId||sub.name===s.channel);
    const avBg=chColor(s.channel);

    const slide=document.createElement('div');
    slide.className='s-slide';
    slide.id='ss-'+idx;
    slide.innerHTML=`
      <img class="s-bg-img" src="${esc(s.thumb)}" alt="">
      <div class="s-video-wrap">
        <iframe class="s-iframe" id="si-${idx}" frameborder="0" allowfullscreen
          allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture;web-share">
        </iframe>
      </div>
      <div class="s-gradient"></div>
      <div class="s-info">
        <div class="s-ch-row">
          <div class="s-avatar" style="background:${avBg}">${(s.channel||'?').charAt(0).toUpperCase()}</div>
          <span class="s-ch-name">${esc(s.channel)}</span>
          <button class="s-sub-btn ${subbed?'subbed':''}" id="ssub-${idx}"
            onclick="toggleShortSub('${esc(s.channelId||'')}','${esc(s.channel)}',${idx})">
            ${subbed?'Subscribed':'Subscribe'}
          </button>
        </div>
        <div class="s-title">${esc(s.title)}</div>
      </div>
      <div class="s-actions">
        <button class="s-act-btn ${liked?'liked':''}" id="slike-${idx}" onclick="toggleShortLike(${idx})">
          <div class="s-act-circle">
            <svg width="24" height="24" viewBox="0 0 24 24"
              fill="${liked?'#ff4444':'none'}"
              stroke="${liked?'#ff4444':'white'}" stroke-width="2">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
            </svg>
          </div>
          <span id="slc-${idx}">${lc>0?lc:''}</span>
        </button>
        <button class="s-act-btn" onclick="showShortComments(${idx})">
          <div class="s-act-circle">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          </div>
          <span>Comment</span>
        </button>
        <button class="s-act-btn" onclick="shareShort(${idx})">
          <div class="s-act-circle">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
          </div>
          <span>Share</span>
        </button>
        <button class="s-act-btn" onclick="toast('🔖 Saved!')">
          <div class="s-act-circle">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
          </div>
          <span>Save</span>
        </button>
      </div>`;
    scroller.appendChild(slide);
  });

  // IntersectionObserver for auto-play on scroll
  ST.shortsObserver=new IntersectionObserver(entries=>{
    entries.forEach(entry=>{
      if(entry.isIntersecting){
        const idx=parseInt(entry.target.id.replace('ss-',''));
        if(!isNaN(idx)) autoPlayShort(idx);
      }
    });
  },{threshold:0.7});

  document.querySelectorAll('.s-slide').forEach(slide=>{
    ST.shortsObserver.observe(slide);
  });
}

function autoPlayShort(idx){
  // Stop all iframes first
  document.querySelectorAll('.s-iframe').forEach(f=>{f.src='';});
  const iframe=document.getElementById('si-'+idx);
  if(!iframe)return;
  const s=ST.shortsData[idx];
  if(!s)return;
  iframe.src=ytEmbed(s.id,'&loop=1&playlist='+s.id);
  ST.activeShortIdx=idx;
}

function toggleShortLike(idx){
  const s=ST.shortsData[idx];if(!s)return;
  const btn=document.getElementById('slike-'+idx);
  const lspan=document.getElementById('slc-'+idx);
  const isLiked=ST.likedShorts.includes(s.id);
  if(!isLiked){
    ST.likedShorts.push(s.id);
    ST.shortLikes[s.id]=(ST.shortLikes[s.id]||0)+1;
    if(btn) btn.classList.add('liked');
    if(lspan) lspan.textContent=ST.shortLikes[s.id];
    toast('❤️ Liked!');
  }else{
    ST.likedShorts=ST.likedShorts.filter(id=>id!==s.id);
    ST.shortLikes[s.id]=Math.max(0,(ST.shortLikes[s.id]||1)-1);
    if(btn) btn.classList.remove('liked');
    if(lspan) lspan.textContent=ST.shortLikes[s.id]||'';
    toast('Unliked');
  }
  save('likedShorts',ST.likedShorts);
  save('shortLikes',ST.shortLikes);
}

function toggleShortSub(channelId, channelName, idx){
  const btn=document.getElementById('ssub-'+idx);
  const isSubbed=ST.subs.some(s=>s.id===channelId||s.name===channelName);
  if(!isSubbed){
    ST.subs.push({id:channelId,name:channelName,color:chColor(channelName)});
    if(btn){btn.textContent='Subscribed';btn.classList.add('subbed');}
    toast('✅ Subscribed to '+channelName);
  }else{
    ST.subs=ST.subs.filter(s=>s.id!==channelId&&s.name!==channelName);
    if(btn){btn.textContent='Subscribe';btn.classList.remove('subbed');}
    toast('Unsubscribed from '+channelName);
  }
  save('subs',ST.subs);
}

function shareShort(idx){
  const s=ST.shortsData[idx];if(!s)return;
  const url=`https://www.youtube.com/shorts/${s.id}`;
  if(navigator.share) navigator.share({title:s.title,url}).catch(()=>{});
  else{try{navigator.clipboard.writeText(url);}catch(e){} toast('🔗 Link copied!');}
}

async function showShortComments(idx){
  const s=ST.shortsData[idx];if(!s)return;
  document.getElementById('s-panel-overlay').style.display='block';
  document.getElementById('s-cmt-panel').style.display='block';
  document.getElementById('panel-cmt-count').textContent='Comments';
  document.getElementById('s-cmt-list').innerHTML='<div class="loading-dots"><span></span><span></span><span></span></div>';

  const comments=await fetchComments(s.id);
  const countEl=document.getElementById('panel-cmt-count');
  if(countEl) countEl.textContent=`Comments (${comments.length})`;
  const listEl=document.getElementById('s-cmt-list');
  if(listEl){
    if(comments.length){
      listEl.innerHTML=comments.map(c=>`
        <div class="cmt-item">
          <div class="cmt-av">
            ${c.avatar?`<img src="${c.avatar}" alt="">`:(c.author||'?').charAt(0).toUpperCase()}
          </div>
          <div class="cmt-body-inner">
            <span class="cmt-author">${esc(c.author)}</span>
            <span class="cmt-time">${c.time}</span>
            <div class="cmt-text">${decodeEntities(String(c.text||''))}</div>
            <button class="cmt-likes-btn" onclick="this.classList.toggle('liked')">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3H14z"/></svg>
              ${c.likes||0}
            </button>
          </div>
        </div>`).join('');
    }else{
      listEl.innerHTML='<div style="color:var(--text2);text-align:center;padding:20px;font-size:13px;">No comments available</div>';
    }
  }
}

function closeSPanel(){
  document.getElementById('s-panel-overlay').style.display='none';
  document.getElementById('s-cmt-panel').style.display='none';
}

// ============================================================
// INIT
// ============================================================
renderCats();
renderTrending();
loadHome();
</script>
