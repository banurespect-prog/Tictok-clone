<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Shorts – TikTok Style</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #app {
      width: 100%;
      max-width: 430px;
      height: 100%;
      background: #000;
      position: relative;
      overflow: hidden;
    }

    /* Feed container */
    .feed {
      height: 100%;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
    }
    .feed::-webkit-scrollbar {
      display: none;
    }

    /* Each short */
    .short {
      height: 100%;
      width: 100%;
      scroll-snap-align: start;
      position: relative;
      background: #000;
    }

    /* Video wrapper (iframe) */
    .video-wrapper {
      position: absolute;
      inset: 0;
      z-index: 1;
      background: #000;
    }
    .video-wrapper iframe {
      width: 100%;
      height: 100%;
      border: none;
      pointer-events: none;   /* so tap on video goes to parent, we control play/pause manually */
    }

    /* Gradient overlays */
    .gradient {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0.5) 0%, transparent 30%, transparent 60%, rgba(0,0,0,0.7) 100%);
      z-index: 2;
      pointer-events: none;
    }

    /* Play/pause icon */
    .play-pause-icon {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 70px;
      height: 70px;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }
    .play-pause-icon.show {
      opacity: 1;
    }

    /* Right side actions (TikTok style) */
    .right-actions {
      position: absolute;
      right: 12px;
      bottom: 100px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
      z-index: 15;
    }
    .action-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      transition: transform 0.1s;
    }
    .action-btn:active {
      transform: scale(0.92);
    }
    .action-icon {
      width: 48px;
      height: 48px;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .action-count {
      font-size: 11px;
      font-weight: 600;
      color: white;
      text-shadow: 0 1px 2px rgba(0,0,0,0.5);
    }

    /* Profile avatar + follow dot */
    .avatar-wrap {
      position: relative;
      margin-bottom: 4px;
    }
    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 2px solid white;
      object-fit: cover;
      background: #333;
    }
    .follow-dot {
      position: absolute;
      bottom: -6px;
      left: 50%;
      transform: translateX(-50%);
      width: 22px;
      height: 22px;
      background: #fe2c55;
      border-radius: 50%;
      border: 2px solid black;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: white;
      cursor: pointer;
    }
    .follow-dot.done {
      background: #25f4ee;
      font-size: 10px;
    }

    /* Music disc */
    .music-disc {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(0,0,0,0.5);
      border: 2px solid rgba(255,255,255,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: spin 4s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .music-inner {
      width: 14px;
      height: 14px;
      background: white;
      border-radius: 50%;
    }

    /* Bottom overlay (username, caption, music) */
    .bottom-info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 12px 12px 80px;
      z-index: 12;
    }
    .user-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .mini-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      object-fit: cover;
      background: #333;
    }
    .username {
      font-size: 14px;
      font-weight: 700;
      color: white;
      text-shadow: 0 1px 2px rgba(0,0,0,0.5);
    }
    .subscribe-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.8);
      color: white;
      font-size: 11px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 4px;
      margin-left: 8px;
      cursor: pointer;
    }
    .subscribe-btn.subscribed {
      border-color: rgba(255,255,255,0.3);
      color: rgba(255,255,255,0.5);
    }
    .caption {
      font-size: 13px;
      line-height: 1.4;
      color: white;
      margin-bottom: 6px;
      text-shadow: 0 1px 2px rgba(0,0,0,0.5);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .music-name {
      font-size: 11px;
      color: rgba(255,255,255,0.85);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    /* Progress bar at bottom */
    .progress-bar {
      position: absolute;
      bottom: 70px;
      left: 0;
      right: 0;
      height: 2px;
      background: rgba(255,255,255,0.2);
      z-index: 13;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: rgba(255,255,255,0.8);
      transition: width 0.05s linear;
    }

    /* Bottom navigation (simple) */
    .bottom-nav {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 68px;
      background: rgba(0,0,0,0.95);
      backdrop-filter: blur(20px);
      border-top: 0.5px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: space-around;
      z-index: 100;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      cursor: pointer;
    }
    .nav-item span {
      font-size: 10px;
      color: #888;
    }
    .nav-item.active span {
      color: white;
    }

    /* Toast */
    .toast {
      position: absolute;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(30,30,30,0.95);
      color: white;
      font-size: 13px;
      font-weight: 500;
      padding: 8px 18px;
      border-radius: 40px;
      z-index: 200;
      opacity: 0;
      transition: all 0.2s;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Loading */
    .loader {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }
    .spinner {
      width: 44px;
      height: 44px;
      border: 4px solid rgba(255,255,255,0.1);
      border-top-color: #fe2c55;
      border-radius: 50%;
      animation: spinLoader 0.7s linear infinite;
    }
    @keyframes spinLoader {
      to { transform: rotate(360deg); }
    }
    .loader p {
      color: rgba(255,255,255,0.5);
      font-size: 14px;
    }
  </style>
</head>
<body>
<div id="app">
  <div class="feed" id="feedContainer">
    <div class="loader">
      <div class="spinner"></div>
      <p>Loading shorts...</p>
    </div>
  </div>
  <div class="bottom-nav">
    <div class="nav-item active" onclick="alert('Home')">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M3 12L12 3L21 12V20a1 1 0 01-1 1H4a1 1 0 01-1-1V12z"/></svg>

      <span>Profile</span>

  <div class="toast" id="toastMsg"></div>
</div>

<script>
  // ==============================================================
  // YouTube Shorts – Autoplay, Pause on Tap, Share Button, Real API
  // ==============================================================
  const API_KEY = 'AIzaSyAXmWdEwssA7_NUJGJCQqR60fzrFpZ-mfI';
  const BASE = 'https://www.googleapis.com/youtube/v3';

  // Fallback IDs (if API fails)
  const FALLBACK_IDS = [
    'dQw4w9WgXcQ','M7lc1UVf-VE','kJQP7kiw5Fk','9bZkp7q19f0',
    'hT_nvWreIhg','jNQXAC9IVRw','fRh_vgS2dFE','hTWKbfoikeg',
    'LsoLEjrDogU','2Vv-BfVoq4g','CevxZvSJLk8','sON68ibZxs0',
    'LXb3EKWsInQ','C0DPdy98e4c','YQHsXMglC9A'
  ];

  let videosData = [];
  let currentPlayingPlayer = null;   // reference to the active YT player (postMessage target)
  let activePostElement = null;

  // Helper: format numbers
  function formatNumber(num) {
    if (num === undefined) return '0';
    let n = parseInt(num);
    if (isNaN(n)) return '0';
    if (n >= 1e6) return (n/1e6).toFixed(1).replace('.0','') + 'M';
    if (n >= 1e3) return (n/1e3).toFixed(0) + 'K';
    return n.toString();
  }

  // Avatar from channel name
  function getAvatar(name) {
    return `https://ui-avatars.com/api/?name=${encodeURIComponent(name||'YT')}&background=fe2c55&color=fff&size=100`;
  }

  // Thumbnail
  function getThumb(id) {
    return `https://i.ytimg.com/vi/${id}/hqdefault.jpg`;
  }

  // Toast
  let toastTimer;
  function showToast(msg) {
    clearTimeout(toastTimer);
    const toast = document.getElementById('toastMsg');
    toast.innerText = msg;
    toast.classList.add('show');
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
  }

  // ========== YouTube API calls ==========
  async function fetchTrendingShorts() {
    try {
      // Search for latest shorts
      const searchUrl = `${BASE}/search?part=snippet&q=shorts&type=video&videoDuration=short&maxResults=25&key=${API_KEY}&regionCode=IN`;
      const searchRes = await fetch(searchUrl);
      const searchData = await searchRes.json();
      if (!searchData.items || searchData.items.length === 0) throw new Error('No items');
      
      const videoIds = searchData.items.map(item => item.id.videoId).filter(v => v);
      // Get statistics
      const statsUrl = `${BASE}/videos?part=statistics,snippet&id=${videoIds.join(',')}&key=${API_KEY}`;
      const statsRes = await fetch(statsUrl);
      const statsData = await statsRes.json();
      
      const videos = [];
      for (const item of statsData.items || []) {
        videos.push({
          id: item.id,
          title: item.snippet.title,
          channel: item.snippet.channelTitle,
          views: formatNumber(item.statistics.viewCount),
          likes: formatNumber(item.statistics.likeCount),
          comments: formatNumber(item.statistics.commentCount),
          thumb: getThumb(item.id)
        });
      }
      return videos.length ? videos : null;
    } catch (err) {
      console.warn('API error:', err);
      return null;
    }
  }

  // Get real comments for a video
  async function fetchComments(videoId) {
    try {
      const url = `${BASE}/commentThreads?part=snippet&videoId=${videoId}&maxResults=15&key=${API_KEY}`;
      const res = await fetch(url);
      const data = await res.json();
      if (!data.items) return [];
      return data.items.map(item => {
        const top = item.snippet.topLevelComment.snippet;
        return {
          author: top.authorDisplayName,
          avatar: top.authorProfileImageUrl,
          text: top.textDisplay,
          likes: formatNumber(top.likeCount),
          time: new Date(top.publishedAt).toLocaleDateString()
        };
      });
    } catch (e) {
      return [];
    }
  }

  // Fallback videos
  function fallbackVideos() {
    const titles = [
      '🔥 This is going VIRAL!','😱 You won\'t believe this!','😂 POV: That one friend',
      '✨ Satisfying video','🎉 Best moment ever','👀 Watch till the end',
      '📈 Trending now','🌟 Made my day','😮 Incredible','🎸 Crazy talent',
      '🎶 Weekend vibes','💀 Internet gold','🤯 Mind blowing','💛 Pure happiness'
    ];
    const channels = ['ViralWorld','TrendHub','DailyFun','ShortClips','WowMoments',
      'JoyVibes','QuickFlix','HitShorts','CoolTube','TopViral'];
    return FALLBACK_IDS.slice(0,15).map((id,i) => ({
      id, title: titles[i%titles.length], channel: channels[i%channels.length],
      views: formatNumber(Math.floor(Math.random()*50000000)+100000),
      likes: formatNumber(Math.floor(Math.random()*5000000)+10000),
      comments: formatNumber(Math.floor(Math.random()*200000)+1000),
      thumb: getThumb(id)
    }));
  }

  // ========== Build HTML for each short ==========
  function buildShortHTML(v, index) {
    const avatar = getAvatar(v.channel);
    const shortTitle = v.title.length > 80 ? v.title.slice(0,80)+'...' : v.title;
    return `
      <div class="short" data-id="${v.id}" data-index="${index}">
        <div class="video-wrapper" id="wrapper_${index}"></div>
        <div class="gradient"></div>
        <div class="play-pause-icon" id="playIcon_${index}">
          <svg width="30" height="30" viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg>
        </div>
        
        <div class="right-actions">
          <div class="avatar-wrap">
            <img class="avatar" src="${avatar}" onerror="this.src='${getAvatar(v.channel)}'">
            <div class="follow-dot" data-follow="false" onclick="event.stopPropagation();toggleFollow(this)">+</div>
          </div>
          <div class="action-btn" onclick="event.stopPropagation();likeVideo(this, '${v.id}', '${v.title.replace(/'/g, "\\'")}', '${v.channel.replace(/'/g, "\\'")}', '${v.thumb}')">
            <div class="action-icon">
              <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
                <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
              </svg>
            </div>
            <span class="action-count">${v.likes}</span>
          </div>
          <div class="action-btn" onclick="event.stopPropagation();openShare('${v.id}')">
            <div class="action-icon">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
                <path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8M16 6l-4-4-4 4M12 2v13"/>
              </svg>
            </div>
            <span class="action-count">Share</span>
          </div>
          <div class="action-btn" onclick="event.stopPropagation();showCommentsSheet('${v.id}', '${v.comments}')">
            <div class="action-icon">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
                <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
              </svg>
            </div>
            <span class="action-count">${v.comments}</span>
          </div>
          <div class="music-disc">
            <div class="music-inner"></div>
          </div>
        </div>
        
        <div class="bottom-info">
          <div class="user-row">
            <img class="mini-avatar" src="${avatar}" onerror="this.src='${getAvatar(v.channel)}'">
            <div class="username">
              @${v.channel.replace(/\s/g,'').toLowerCase().slice(0,18)}
              <button class="subscribe-btn" onclick="event.stopPropagation();toggleSubscribe(this, '${v.channel.replace(/'/g, "\\'")}')">Subscribe</button>
            </div>
          </div>
          <div class="caption">${shortTitle}</div>
          <div class="music-name">♪ ${v.channel} · ${v.views} views</div>
        </div>
        
        <div class="progress-bar">
          <div class="progress-fill" id="progress_${index}"></div>
        </div>
      </div>
    `;
  }

  // ========== YouTube iframe player creation ==========
  function createPlayer(videoId, wrapperId, index) {
    const wrapper = document.getElementById(wrapperId);
    if (!wrapper) return null;
    // Clear previous iframe
    wrapper.innerHTML = '';
    const iframe = document.createElement('iframe');
    iframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=0&mute=1&loop=1&playlist=${videoId}&playsinline=1&controls=0&modestbranding=1&rel=0&enablejsapi=1`;
    iframe.allow = 'autoplay; encrypted-media; picture-in-picture';
    iframe.style.width = '100%';
    iframe.style.height = '100%';
    iframe.style.border = 'none';
    iframe.style.pointerEvents = 'none';  // tap handled by parent
    wrapper.appendChild(iframe);
    
    // Function to send postMessage commands
    const player = {
      element: iframe,
      play: () => {
        iframe.contentWindow?.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
      },
      pause: () => {
        iframe.contentWindow?.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*');
      },
      mute: () => {
        iframe.contentWindow?.postMessage('{"event":"command","func":"mute","args":""}', '*');
      },
      unmute: () => {
        iframe.contentWindow?.postMessage('{"event":"command","func":"unMute","args":""}', '*');
      }
    };
    // Store player reference on the short div
    const shortDiv = document.querySelector(`.short[data-index="${index}"]`);
    if (shortDiv) shortDiv.player = player;
    return player;
  }

  // ========== Intersection Observer for autoplay/pause ==========
  function setupObserver() {
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        const short = entry.target;
        const index = short.getAttribute('data-index');
        const wrapperId = `wrapper_${index}`;
        const videoId = short.getAttribute('data-id');
        
        if (entry.isIntersecting) {
          // Video enters viewport
          if (!short.player) {
            const player = createPlayer(videoId, wrapperId, index);
            short.player = player;
            // Start playing after a tiny delay to let iframe load
            setTimeout(() => {
              if (short.player) short.player.play();
              // Also hide play icon
              const icon = short.querySelector('.play-pause-icon');
              if (icon) icon.classList.remove('show');
            }, 200);
          } else {
            short.player.play();
            const icon = short.querySelector('.play-pause-icon');
            if (icon) icon.classList.remove('show');
          }
          currentPlayingPlayer = short.player;
          activePostElement = short;
        } else {
          // Video leaves viewport – pause
          if (short.player) {
            short.player.pause();
          }
        }
      });
    }, { threshold: 0.6 });
    
    document.querySelectorAll('.short').forEach(short => observer.observe(short));
  }

  // ========== Tap on video to toggle play/pause ==========
  function attachTapHandler() {
    document.querySelectorAll('.short').forEach(short => {
      short.addEventListener('click', (e) => {
        // Don't trigger if clicked on action buttons
        if (e.target.closest('.action-btn') || e.target.closest('.follow-dot') || e.target.closest('.subscribe-btn')) return;
        if (!short.player) return;
        
        const icon = short.querySelector('.play-pause-icon');
        // We need a way to know if video is playing; simple toggle using a flag
        // We'll store a state on the short element
        if (!short.isPlaying) {
          short.player.play();
          short.isPlaying = true;
          icon.classList.remove('show');
        } else {
          short.player.pause();
          short.isPlaying = false;
          icon.classList.add('show');
          setTimeout(() => icon.classList.remove('show'), 800);
        }
      });
    });
  }

  // ========== Like functionality (localStorage) ==========
  function likeVideo(btn, videoId, title, channel, thumb) {
    const svgPath = btn.querySelector('svg path');
    const countSpan = btn.querySelector('.action-count');
    let currentLikes = parseInt(countSpan.innerText.replace(/[KM]/g, '')) * (countSpan.innerText.includes('K') ? 1000 : (countSpan.innerText.includes('M') ? 1000000 : 1));
    
    const likedVideos = JSON.parse(localStorage.getItem('liked_shorts') || '[]');
    const already = likedVideos.includes(videoId);
    
    if (!already) {
      svgPath.setAttribute('fill', '#fe2c55');
      svgPath.setAttribute('stroke', '#fe2c55');
      currentLikes++;
      countSpan.innerText = formatNumber(currentLikes);
      likedVideos.push(videoId);
      localStorage.setItem('liked_shorts', JSON.stringify(likedVideos));
      showToast('❤️ Liked!');
    } else {
      svgPath.setAttribute('fill', 'none');
      svgPath.setAttribute('stroke', 'white');
      currentLikes--;
      countSpan.innerText = formatNumber(currentLikes);
      const newLiked = likedVideos.filter(id => id !== videoId);
      localStorage.setItem('liked_shorts', JSON.stringify(newLiked));
      showToast('💔 Removed like');
    }
  }

  // Load previous liked states
  function restoreLikedStates() {
    const liked = JSON.parse(localStorage.getItem('liked_shorts') || '[]');
    document.querySelectorAll('.action-btn').forEach(btn => {
      const svg = btn.querySelector('svg path');
      if (!svg) return;
      const parent = btn.closest('.short');
      if (!parent) return;
      const videoId = parent.getAttribute('data-id');
      if (liked.includes(videoId)) {
        svg.setAttribute('fill', '#fe2c55');
        svg.setAttribute('stroke', '#fe2c55');
      }
    });
  }

  // ========== Follow / Subscribe ==========
  window.toggleFollow = function(el) {
    const done = el.classList.contains('done');
    if (!done) {
      el.classList.add('done');
      el.innerHTML = '✓';
      showToast('✅ Following!');
    } else {
      el.classList.remove('done');
      el.innerHTML = '+';
      showToast('❌ Unfollowed');
    }
  };
  window.toggleSubscribe = function(btn, channelName) {
    const subscribed = btn.classList.contains('subscribed');
    if (!subscribed) {
      btn.classList.add('subscribed');
      btn.innerText = 'Subscribed';
      showToast(`✅ Subscribed to ${channelName}`);
    } else {
      btn.classList.remove('subscribed');
      btn.innerText = 'Subscribe';
      showToast(`❌ Unsubscribed from ${channelName}`);
    }
  };

  // ========== Share ==========
  window.openShare = function(videoId) {
    const url = `https://www.youtube.com/shorts/${videoId}`;
    if (navigator.share) {
      navigator.share({ title: 'Check this Short!', url });
    } else {
      navigator.clipboard.writeText(url);
      showToast('🔗 Link copied!');
    }
  };

  // ========== Comments Sheet (simple modal using alert for demo, but we'll build a nicer floating div) ==========
  // We'll create a simple overlay to show comments
  function showCommentsSheet(videoId, commentCount) {
    showToast('Loading comments...');
    fetchComments(videoId).then(comments => {
      if (!comments.length) {
        showToast('No comments available');
        return;
      }
      // Build a simple but effective modal
      let modal = document.getElementById('commentsModal');
      if (!modal) {
        modal = document.createElement('div');
        modal.id = 'commentsModal';
        modal.style.cssText = `
          position: fixed; bottom: 0; left: 0; right: 0; max-width: 430px; margin: auto;
          background: #111; border-radius: 20px 20px 0 0; z-index: 300;
          max-height: 70vh; overflow-y: auto; padding: 16px;
          transition: transform 0.3s; transform: translateY(100%);
          color: white; border-top: 1px solid #333;
        `;
        document.body.appendChild(modal);
        // overlay
        const overlay = document.createElement('div');
        overlay.id = 'commentsOverlay';
        overlay.style.cssText = `
          position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7);
          z-index: 299; display: none; cursor: pointer;
        `;
        overlay.onclick = () => closeCommentsSheet();
        document.body.appendChild(overlay);
      }
      const modalDiv = document.getElementById('commentsModal');
      const overlayDiv = document.getElementById('commentsOverlay');
      modalDiv.innerHTML = `<div style="display:flex; justify-content:space-between; margin-bottom:12px;"><strong>Comments (${commentCount})</strong><span style="cursor:pointer" onclick="closeCommentsSheet()">✕</span></div>`;
      comments.forEach(c => {
        modalDiv.innerHTML += `
          <div style="display:flex; gap:10px; margin-bottom:16px;">
            <img src="${c.avatar || 'https://ui-avatars.com/api/?name='+c.author[0]}" style="width:36px;height:36px;border-radius:50%;object-fit:cover;">
            <div><strong>${c.author}</strong><div style="font-size:13px; margin-top:2px;">${c.text}</div><div style="font-size:10px; color:#888; margin-top:4px;">❤️ ${c.likes} · ${c.time}</div></div>
          </div>
        `;
      });
      modalDiv.style.transform = 'translateY(0)';
      overlayDiv.style.display = 'block';
    }).catch(() => showToast('Could not load comments'));
  }
  window.closeCommentsSheet = function() {
    const modal = document.getElementById('commentsModal');
    const overlay = document.getElementById('commentsOverlay');
    if (modal) modal.style.transform = 'translateY(100%)';
    if (overlay) overlay.style.display = 'none';
  };

  // ========== Load feed ==========
  async function loadFeed() {
    const container = document.getElementById('feedContainer');
    container.innerHTML = '<div class="loader"><div class="spinner"></div><p>Loading shorts...</p></div>';
    
    let videos = await fetchTrendingShorts();
    if (!videos || videos.length === 0) {
      videos = fallbackVideos();
    }
    videosData = videos;
    
    const html = videos.map((v, idx) => buildShortHTML(v, idx)).join('');
    container.innerHTML = html;
    
    // Initialize players as they become visible via observer
    setupObserver();
    attachTapHandler();
    restoreLikedStates();
  }

  // start everything
  loadFeed();

  // Fix for iOS: ensure scroll works and body height
  window.addEventListener('touchstart', ()=>{});
</script>
</body>
</html>
