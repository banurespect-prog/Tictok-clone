<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Anskinge</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');
:root{
  --bg:#0f0f0f; --bg2:#1a1a1a; --bg3:#272727;
  --text:#f1f1f1; --text2:#aaa; --red:#ff0000;
  --white:#ffffff; --border:#333; --blue:#3ea6ff;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{color:var(--text);font-family:'DM Sans',sans-serif;max-width:430px;margin:0 auto;position:relative;}

/* ====== TOP NAV ====== */
#topnav{
  position:fixed;top:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;z-index:500;
  background:var(--bg);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;padding:10px 14px;
}
.logo-wrap{display:flex;align-items:center;gap:6px;text-decoration:none;flex-shrink:0;cursor:pointer;}
.logo-icon{width:30px;height:20px;background:var(--red);border-radius:5px;display:flex;align-items:center;justify-content:center;}
.logo-icon svg{width:13px;height:13px;fill:white;}
.logo-text{font-size:17px;font-weight:700;color:var(--white);letter-spacing:-0.5px;}
.logo-text span{color:var(--red);}
#search-form{flex:1;display:flex;}
#search-input{
  flex:1;padding:7px 13px;background:var(--bg3);border:1px solid var(--border);
  border-right:none;border-radius:18px 0 0 18px;color:var(--text);font-size:13px;outline:none;font-family:inherit;
}
#search-input::placeholder{color:var(--text2);}
#search-btn{
  padding:7px 14px;background:var(--bg3);border:1px solid var(--border);
  border-left:none;border-radius:0 18px 18px 0;cursor:pointer;color:var(--text2);font-size:15px;
}

/* ====== BOTTOM NAV ====== */
#botnav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;z-index:500;
  background:var(--bg);border-top:1px solid var(--border);
  display:flex;justify-content:space-around;align-items:center;
  padding:6px 0 env(safe-area-inset-bottom,8px);
}
.bnav-btn{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  background:none;border:none;color:var(--text2);cursor:pointer;
  font-size:10px;padding:4px 8px;font-family:inherit;min-width:52px;
}
.bnav-btn.active{color:var(--white);}
.bnav-btn svg{width:22px;height:22px;}
.bnav-plus{
  width:48px;height:32px;background:none;border:none;cursor:pointer;
  padding:0;position:relative;flex-shrink:0;
}
.bnav-plus-inner{
  width:100%;height:100%;border-radius:8px;overflow:hidden;
  display:flex;align-items:center;justify-content:center;position:relative;
  background:linear-gradient(135deg,#00c6ff 0%,#7b2ff7 50%,#ff0080 100%);
}
.bnav-plus-inner span{color:#fff;font-size:22px;font-weight:300;line-height:1;}
.bnav-badge{
  position:absolute;top:-3px;right:-3px;background:var(--red);
  color:#fff;border-radius:50%;width:15px;height:15px;
  font-size:9px;display:flex;align-items:center;justify-content:center;font-weight:700;
}
.shorts-dot{width:6px;height:6px;background:var(--red);border-radius:50%;margin:0 auto 2px;}

/* ====== MAIN SCROLL ====== */
#main{
  position:fixed;top:57px;bottom:62px;
  left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;
  overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  scroll-behavior:smooth;
}
#main::-webkit-scrollbar{width:2px;}
#main::-webkit-scrollbar-thumb{background:var(--bg3);}

/* ====== CATEGORY CHIPS ====== */
.cat-strip{
  display:flex;gap:8px;padding:10px 14px;
  overflow-x:auto;flex-shrink:0;
}
.cat-strip::-webkit-scrollbar{display:none;}
.cat-chip{
  padding:6px 14px;border-radius:20px;border:1px solid var(--border);
  background:var(--bg2);color:var(--text2);font-size:12px;font-weight:600;
  cursor:pointer;white-space:nowrap;font-family:inherit;flex-shrink:0;
  transition:all 0.2s;
}
.cat-chip.active{background:var(--white);color:#000;border-color:var(--white);}

/* ====== HOME ====== */
#home-page{display:block;padding-bottom:20px;}
.section-label{
  font-size:14px;font-weight:700;padding:12px 14px 8px;
  display:flex;align-items:center;gap:8px;
}
.red-dot{width:8px;height:8px;background:var(--red);border-radius:50%;flex-shrink:0;}

/* Shorts 2-col grid */
.shorts-section{padding:0 10px;}
.shorts-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.short-card{
  cursor:pointer;border-radius:10px;overflow:hidden;
  background:var(--bg2);position:relative;aspect-ratio:9/16;
}
.short-card img{
  width:100%;height:100%;object-fit:cover;display:block;
  background:#1a1a1a;
}
.short-card-overlay{
  position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(transparent,rgba(0,0,0,0.82));
  padding:20px 8px 8px;
}
.short-card-title{font-size:11px;color:#fff;font-weight:600;line-height:1.3;}
.short-card-meta{font-size:10px;color:rgba(255,255,255,0.65);margin-top:2px;}

/* Long video cards */
.feed-long{display:flex;flex-direction:column;}
.video-card{cursor:pointer;padding-bottom:16px;}
.video-thumb-wrap{
  width:100%;aspect-ratio:16/9;background:#1c1c1c;
  position:relative;overflow:hidden;
}
.video-thumb-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
.video-dur{
  position:absolute;bottom:5px;right:7px;
  background:rgba(0,0,0,0.88);color:#fff;font-size:11px;
  padding:2px 5px;border-radius:3px;font-weight:600;
}
.video-info-row{display:flex;gap:10px;padding:9px 14px 0;}
.ch-avatar{
  width:34px;height:34px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:13px;color:#fff;
}
.video-meta{flex:1;}
.video-title{
  font-size:13px;font-weight:600;line-height:1.35;margin-bottom:3px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.video-sub-info{font-size:11px;color:var(--text2);}
.video-sub-info span+span::before{content:'·';margin:0 4px;}

/* ====== SHORTS FULLSCREEN ====== */
#shorts-page{
  display:none;position:fixed;
  top:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;height:100vh;
  z-index:400;background:#000;overflow:hidden;
}
#shorts-back{
  position:fixed;top:14px;
  left:calc(50% - 205px);
  z-index:600;background:rgba(0,0,0,0.5);
  border:none;color:#fff;width:36px;height:36px;
  border-radius:50%;cursor:pointer;font-size:18px;
  display:none;align-items:center;justify-content:center;
  backdrop-filter:blur(4px);
}
#shorts-scroller{
  width:100%;height:100%;
  overflow-y:scroll;
  scroll-snap-type:y mandatory;
  -webkit-overflow-scrolling:touch;
}
#shorts-scroller::-webkit-scrollbar{display:none;}

/* Each short slide */
.s-slide{
  width:100%;height:100vh;
  scroll-snap-align:start;
  scroll-snap-stop:always;
  position:relative;background:#000;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;flex-shrink:0;
}
.s-thumb{
  position:absolute;inset:0;
  width:100%;height:100%;object-fit:cover;
}
.s-iframe{
  position:absolute;inset:0;
  width:100%;height:100%;border:0;display:none;
}
/* Dark gradient for readability */
.s-gradient{
  position:absolute;inset:0;
  background:linear-gradient(
    to bottom,
    rgba(0,0,0,0.0) 30%,
    rgba(0,0,0,0.6) 70%,
    rgba(0,0,0,0.85) 100%
  );
  pointer-events:none;
}

/* Bottom info */
.s-info{
  position:absolute;bottom:22px;left:14px;right:82px;z-index:10;
}
.s-ch-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.s-avatar{
  width:38px;height:38px;border-radius:50%;
  background:var(--red);color:#fff;
  font-weight:700;font-size:14px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;border:2px solid rgba(255,255,255,0.8);
}
.s-ch-name{font-size:14px;font-weight:700;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,0.5);}
.s-sub-btn{
  padding:4px 13px;border-radius:14px;
  border:1.5px solid rgba(255,255,255,0.9);
  background:transparent;color:#fff;
  font-size:12px;font-weight:700;
  cursor:pointer;font-family:inherit;
  white-space:nowrap;
}
.s-sub-btn.subbed{background:rgba(255,255,255,0.18);border-color:transparent;}
.s-title{font-size:13px;color:rgba(255,255,255,0.92);line-height:1.4;text-shadow:0 1px 3px rgba(0,0,0,0.5);}

/* Right action bar */
.s-actions{
  position:absolute;right:10px;bottom:24px;
  display:flex;flex-direction:column;align-items:center;gap:22px;
  z-index:10;
}
.s-act{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  background:none;border:none;color:#fff;cursor:pointer;
  font-family:inherit;font-size:11px;font-weight:600;
  text-shadow:0 1px 3px rgba(0,0,0,0.5);
}
.s-act-circle{
  width:46px;height:46px;border-radius:50%;
  background:rgba(0,0,0,0.38);
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.12);
}
.s-act svg{width:23px;height:23px;}
.s-act.liked .s-act-circle{background:rgba(255,40,40,0.35);}
.s-act.liked .heart-svg{fill:#ff4444;stroke:none;}

/* ====== VIDEO PLAYER ====== */
#player-page{display:none;}
.player-topbar{
  display:flex;align-items:center;gap:12px;padding:11px 14px;
  border-bottom:1px solid var(--border);
}
.back-btn{
  background:none;border:none;color:var(--white);
  cursor:pointer;font-size:22px;line-height:1;padding:2px;
}
.player-topbar-title{
  font-size:14px;font-weight:600;flex:1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.player-wrap{width:100%;aspect-ratio:16/9;background:#000;position:relative;}
.player-wrap iframe{width:100%;height:100%;display:block;border:0;}
.fake-play{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
}
.fake-play img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.fake-play-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.28);}
.fake-play-btn{
  position:relative;z-index:2;
  width:60px;height:60px;background:rgba(255,255,255,0.92);
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  box-shadow:0 3px 18px rgba(0,0,0,0.45);
}
.fake-play-btn svg{width:28px;height:28px;fill:#000;margin-left:5px;}

/* Video details */
.vid-details{padding:12px 14px 0;}
.vid-title{font-size:15px;font-weight:700;line-height:1.4;margin-bottom:10px;}
.vid-ch-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.vid-ch-info{display:flex;align-items:center;gap:10px;}
.vid-ch-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;color:#fff;}
.vid-ch-name{font-size:14px;font-weight:600;}
.vid-ch-subs{font-size:12px;color:var(--text2);}
.sub-btn{
  padding:7px 16px;border-radius:20px;border:none;cursor:pointer;
  font-size:13px;font-weight:700;background:var(--white);color:#000;font-family:inherit;
}
.sub-btn.subscribed{background:var(--bg3);color:var(--text2);}
.vid-stats{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.stat-pill{background:var(--bg3);border-radius:18px;padding:5px 12px;font-size:12px;color:var(--text2);}
.vid-actions{display:flex;gap:8px;margin-bottom:0;}
.vid-act-btn{
  flex:1;padding:10px 6px;border-radius:8px;border:none;cursor:pointer;
  font-size:13px;font-weight:700;
  display:flex;align-items:center;justify-content:center;gap:5px;
  font-family:inherit;
}
.like-btn{background:#8b1a1a;color:#fff;}
.like-btn.liked{background:#c0392b;}
.save-btn{background:#3a3a00;color:#fff;}
.share-btn{background:var(--bg3);color:var(--text2);}

/* Related/Up Next */
.upnext-section{padding:14px;}
.upnext-label{font-size:14px;font-weight:700;margin-bottom:12px;}
.rel-list{display:flex;flex-direction:column;gap:12px;}
.rel-card{display:flex;gap:10px;cursor:pointer;}
.rel-thumb{
  width:120px;flex-shrink:0;aspect-ratio:16/9;background:#1c1c1c;
  border-radius:6px;overflow:hidden;position:relative;
}
.rel-thumb img{width:100%;height:100%;object-fit:cover;}
.rel-dur{position:absolute;bottom:4px;right:5px;background:rgba(0,0,0,0.85);color:#fff;font-size:10px;padding:1px 4px;border-radius:2px;font-weight:600;}
.rel-info{flex:1;}
.rel-title{font-size:12px;font-weight:600;line-height:1.35;margin-bottom:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.rel-meta{font-size:11px;color:var(--text2);}

/* ====== COMMENTS ====== */
.comments-section{padding:14px;border-top:1px solid var(--border);}
.cmt-header{font-size:14px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.cmt-count{color:var(--text2);font-weight:400;font-size:13px;}
.cmt-input-row{display:flex;gap:10px;margin-bottom:16px;}
.cmt-input-wrap{flex:1;}
.cmt-textarea{
  width:100%;background:transparent;border:none;
  border-bottom:1px solid var(--border);
  color:var(--text);font-size:13px;padding:6px 0;
  resize:none;outline:none;font-family:inherit;min-height:34px;
}
.cmt-textarea::placeholder{color:var(--text2);}
.cmt-acts{display:flex;justify-content:flex-end;gap:8px;margin-top:8px;}
.cmt-cancel{background:none;border:none;color:var(--text2);cursor:pointer;font-size:13px;padding:6px 12px;border-radius:20px;font-family:inherit;}
.cmt-submit{background:var(--bg3);border:none;color:var(--text2);cursor:pointer;font-size:13px;font-weight:600;padding:6px 14px;border-radius:20px;font-family:inherit;}
.cmt-submit.active{background:var(--blue);color:#000;}
.cmt-item{display:flex;gap:10px;margin-bottom:16px;}
.cmt-avatar{width:30px;height:30px;border-radius:50%;background:var(--bg3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--text2);}
.cmt-body{flex:1;}
.cmt-author{font-size:12px;font-weight:700;color:var(--text);}
.cmt-time{font-size:11px;color:var(--text2);margin-left:6px;}
.cmt-text{font-size:13px;color:var(--text);margin-top:3px;line-height:1.4;}
.cmt-btns{display:flex;align-items:center;gap:12px;margin-top:6px;}
.cmt-like-btn{background:none;border:none;color:var(--text2);cursor:pointer;font-size:12px;display:flex;align-items:center;gap:4px;font-family:inherit;}
.cmt-like-btn.liked{color:var(--blue);}
.reply-btn{background:none;border:none;color:var(--blue);cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;}

/* ====== SHORT COMMENTS PANEL ====== */
#s-cmt-panel{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;
  background:var(--bg2);border-radius:16px 16px 0 0;
  max-height:65vh;overflow-y:auto;
  z-index:700;padding:14px 16px;
  display:none;box-shadow:0 -4px 24px rgba(0,0,0,0.7);
}
#s-cmt-panel::-webkit-scrollbar{width:2px;}
.drag-bar{width:36px;height:4px;background:var(--bg3);border-radius:2px;margin:0 auto 12px;}
#panel-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.55);z-index:650;
}

/* ====== SEARCH PAGE ====== */
#search-page{display:none;padding-bottom:20px;}
.search-label{font-size:13px;color:var(--text2);padding:10px 14px;}

/* ====== SUBS / PROFILE ====== */
#subs-page,#profile-page{display:none;padding:14px;}
.profile-hdr{text-align:center;padding:24px 0 16px;}
.profile-big-av{
  width:76px;height:76px;border-radius:50%;
  background:var(--red);color:#fff;font-size:28px;font-weight:700;
  display:flex;align-items:center;justify-content:center;margin:0 auto 12px;
}
.profile-name{font-size:18px;font-weight:700;}
.profile-handle{font-size:13px;color:var(--text2);margin-top:4px;}

/* Sentinel */
#load-sentinel{height:30px;}
.hidden{display:none!important;}
</style>
</head>
<body>

<!-- TOP NAV -->
<nav id="topnav">
  <div class="logo-wrap" onclick="showPage('home')">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M19.6 3H4.4C2.5 3 1 4.5 1 6.4v11.2C1 19.5 2.5 21 4.4 21h15.2c1.9 0 3.4-1.5 3.4-3.4V6.4C23 4.5 21.5 3 19.6 3zm-3.1 9.5l-7 4c-.2.1-.4.1-.6 0-.2-.1-.3-.3-.3-.5v-8c0-.2.1-.4.3-.5.2-.1.4-.1.6 0l7 4c.2.1.3.3.3.5s-.1.4-.3.5z"/></svg>
    </div>
    <span class="logo-text">Ansk<span>i</span>nge</span>
  </div>
  <form id="search-form" onsubmit="doSearch(event)">
    <input id="search-input" type="text" placeholder="Search videos, channels..." autocomplete="off">
    <button id="search-btn" type="submit">🔍</button>
  </form>
</nav>

<!-- MAIN -->
<div id="main">

  <!-- HOME -->
  <div id="home-page">
    <div class="cat-strip" id="cat-strip"></div>
    <div class="section-label"><div class="red-dot"></div> Shorts</div>
    <div class="shorts-section">
      <div class="shorts-grid" id="home-shorts-grid"></div>
    </div>
    <div class="section-label" style="margin-top:16px;" id="videos-label">Videos</div>
    <div class="feed-long" id="home-long-feed"></div>
    <div id="load-sentinel"></div>
  </div>

  <!-- VIDEO PLAYER -->
  <div id="player-page">
    <div class="player-topbar">
      <button class="back-btn" onclick="goBack()">&#8592;</button>
      <div class="player-topbar-title" id="player-title">Video</div>
    </div>
    <div class="player-wrap" id="player-wrap">
      <div class="fake-play" id="fake-play" onclick="playVideo()">
        <img id="player-thumb" src="" alt="">
        <div class="fake-play-overlay"></div>
        <div class="fake-play-btn">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </div>
      </div>
      <iframe id="yt-iframe" style="display:none;width:100%;height:100%;border:0;position:absolute;inset:0;"
        frameborder="0" allowfullscreen
        allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture;web-share">
      </iframe>
    </div>
    <div class="vid-details" id="vid-details"></div>
    <div class="upnext-section">
      <div class="upnext-label">Up Next</div>
      <div class="rel-list" id="rel-list"></div>
    </div>
    <div class="comments-section" id="cmt-section"></div>
  </div>

  <!-- SEARCH -->
  <div id="search-page">
    <div class="player-topbar" style="border:none;">
      <button class="back-btn" onclick="goBack()">&#8592;</button>
      <div class="player-topbar-title">Search Results</div>
    </div>
    <div class="search-label" id="search-label"></div>
    <div id="search-shorts-wrap" style="display:none;">
      <div class="section-label"><div class="red-dot"></div> Shorts</div>
      <div class="shorts-section"><div class="shorts-grid" id="search-shorts-grid"></div></div>
    </div>
    <div class="section-label" style="margin-top:12px;" id="search-vids-label" style="display:none;">Videos</div>
    <div class="feed-long" id="search-long-feed"></div>
  </div>

  <!-- SUBS -->
  <div id="subs-page">
    <div class="section-label">Subscriptions</div>
    <div id="subs-list"></div>
  </div>

  <!-- PROFILE -->
  <div id="profile-page">
    <div class="profile-hdr">
      <div class="profile-big-av">A</div>
      <div class="profile-name">Anskinge User</div>
      <div class="profile-handle">@anskinge</div>
    </div>
  </div>

</div>

<!-- SHORTS FULLSCREEN -->
<div id="shorts-page">
  <div id="shorts-scroller"></div>
</div>
<button id="shorts-back" onclick="goBack()">&#8592;</button>

<!-- Overlay + Comments panel -->
<div id="panel-overlay" onclick="closePanel()"></div>
<div id="s-cmt-panel">
  <div class="drag-bar"></div>

function showPage(page, data){
  if(currentPage!==page) pageHistory.push(currentPage);

    .forEach(el=>el.style.display='none');

  document.getElementById('shorts-back').style.display='none';
  document.getElementById('topnav').style.display='flex';
  document.getElementById('botnav').style.display='flex';
  document.querySelectorAll('.bnav-btn').forEach(b=>b.classList.remove('active'));
  stopAllMedia();
  closePanel();

  if(page==='home'){
    document.getElementById('home-page').style.display='block';
    document.getElementById('bn-home').classList.add('active');
    document.getElementById('main').style.overflowY='auto';
  } else if(page==='video'){
    document.getElementById('player-page').style.display='block';
    document.getElementById('main').style.overflowY='auto';
    document.getElementById('main').scrollTop=0;
    openVideo(data);
  } else if(page==='shorts'){
    document.getElementById('shorts-page').style.display='block';
    document.getElementById('shorts-back').style.display='flex';
    document.getElementById('topnav').style.display='none';
    document.getElementById('botnav').style.display='none';
    document.getElementById('bn-shorts').classList.add('active');
    if(data!==undefined) openShortsAt(data);
  } else if(page==='search'){
    document.getElementById('search-page').style.display='block';
    document.getElementById('main').style.overflowY='auto';
    document.getElementById('main').scrollTop=0;
  } else if(page==='subs'){

    document.getElementById('bn-subs').classList.add('active');
    renderSubs();
  } else if(page==='profile'){
    document.getElementById('profile-page').style.display='block';
    document.getElementById('bn-profile').classList.add('active');
  }
}

function goBack(){
  stopAllMedia();
  const prev=pageHistory.pop()||'home';
  currentPage='';
  showPage(prev);
}

function stopAllMedia(){
  const yi=document.getElementById('yt-iframe');
  if(yi){yi.src='';yi.style.display='none';}
  const fp=document.getElementById('fake-play');
  if(fp) fp.style.display='flex';

  document.querySelectorAll('.s-iframe').forEach(f=>{f.src='';f.style.display='none';});
  document.querySelectorAll('.s-play-overlay').forEach(o=>o.style.display='flex');
}

function renderShortsGrid(containerId, shorts){
  const g=document.getElementById(containerId);
  if(!g) return;
  g.innerHTML='';
  shorts.forEach((s,i)=>g.appendChild(makeShortCard(s,i)));
}

function makeShortCard(s, localIdx){
  // Get global index in shuffledShorts
  const globalIdx=shuffledShorts.findIndex(x=>x.id===s.id);
  const div=document.createElement('div');
  div.className='short-card';
  div.onclick=()=>showPage('shorts', globalIdx>=0?globalIdx:0);
  const thumb=`https://img.youtube.com/vi/${s.ytId}/mqdefault.jpg`;
  div.innerHTML=`
    <img src="${thumb}" alt="${escHtml(s.title)}" loading="lazy"
      onerror="this.closest('.short-card').remove()">
    <div class="short-card-overlay">
      <div class="short-card-title">${escHtml(s.title)}</div>
      <div class="short-card-meta">${s.views} views</div>
    </div>`;
  return div;
}

// ====================================================================
function renderLongFeed(containerId, videos){
  const f=document.getElementById(containerId);
  if(!f) return;
  videos.forEach(v=>f.appendChild(makeLongCard(v)));
}

function makeLongCard(v){
  const div=document.createElement('div');
  div.className='video-card';
  div.onclick=()=>showPage('video',v);
  // Use mqdefault for cleaner thumbnails (always available)
  const thumb=`https://img.youtube.com/vi/${v.ytId}/mqdefault.jpg`;
  div.innerHTML=`
    <div class="video-thumb-wrap">
      <img src="${thumb}" alt="${escHtml(v.title)}" loading="lazy"
        onerror="this.closest('.video-card').remove()">
      <div class="video-dur">${v.dur||''}</div>
    </div>
    <div class="video-info-row">
      <div class="ch-avatar" style="background:${chColor(v.channel)}">${v.channel.charAt(0).toUpperCase()}</div>
      <div class="video-meta">
        <div class="video-title">${escHtml(v.title)}</div>
        <div class="video-sub-info">
          <span>${escHtml(v.channel)}</span>
          <span>${v.views} views</span>
          <span>${v.time||''}</span>
        </div>
      </div>
    </div>`;
  return div;
}

function openVideo(v){
  currentVideo=v;

  document.getElementById('player-thumb').src=`https://img.youtube.com/vi/${v.ytId}/hqdefault.jpg`;

  const subbed=subs.includes(v.channel);

  document.getElementById('vid-details').innerHTML=`

      <div class="vid-ch-info">
        <div class="vid-ch-avatar" style="background:${chColor(v.channel)}">${v.channel.charAt(0)}</div>

          <div class="vid-ch-subs">${subbed?'Subscribed':'Subscribe for updates'}</div>

function playVideo(){
  if(!currentVideo) return;
  document.getElementById('fake-play').style.display='none';
  const iframe=document.getElementById('yt-iframe');
  iframe.style.display='block';
  iframe.src=ytSrc(currentVideo.ytId);
}

function shareVideo(){
  if(!currentVideo) return;
  const url=ytURL(currentVideo.ytId,false);
  if(navigator.share) navigator.share({title:currentVideo.title,url}).catch(()=>{});
  else{try{navigator.clipboard.writeText(url);}catch(e){}alert('Link copied!');}
}

function renderRelated(cur){
  const list=document.getElementById('rel-list');
  list.innerHTML='';
  shuffledLong.filter(v=>v.id!==cur.id).slice(0,8).forEach(v=>{

    scroller.appendChild(slide);
  });
  shortsBuilt=true;
  setupScrollObs();
}

function openShortsAt(idx){
  if(!shortsBuilt) buildShortsContainer();
  activeShortIdx=idx;
  // Jump to slide instantly
  const slide=document.getElementById('ss-'+idx);
  if(slide){
    document.getElementById('shorts-scroller').scrollTop=slide.offsetTop;
  }
  // Auto-play first slide
  setTimeout(()=>playShort(idx),200);
}

// AUTO-PLAY on swipe using IntersectionObserver
function setupScrollObs(){
  if(scrollObs) scrollObs.disconnect();
  scrollObs=new IntersectionObserver(entries=>{
    entries.forEach(entry=>{
      const idx=parseInt(entry.target.id.replace('ss-',''));
      const iframe=document.getElementById('si-'+idx);
      const overlay=document.getElementById('spo-'+idx);
      if(entry.isIntersecting && entry.intersectionRatio>0.7){
        activeShortIdx=idx;
        // Auto-play when swiped into view
        const s=shuffledShorts[idx];
        if(s && iframe && !iframe.src){
          playShort(idx);
        }
      } else {
        // Stop when out of view
        if(iframe){iframe.src='';iframe.style.display='none';}
        if(overlay) overlay.style.display='flex';
      }
    });
  },{threshold:0.75, root:document.getElementById('shorts-scroller')});
  document.querySelectorAll('.s-slide').forEach(s=>scrollObs.observe(s));
}

function playShort(idx){
  const s=shuffledShorts[idx];
  if(!s) return;
  const iframe=document.getElementById('si-'+idx);
  const overlay=document.getElementById('spo-'+idx);
  if(!iframe) return;
  iframe.src=`${YTN}${s.ytId}?autoplay=1&rel=0&playsinline=1&modestbranding=1&mute=0&origin=${ORIG}`;
  iframe.style.display='block';
  if(overlay) overlay.style.display='none';
}

function toggleSliderLike(idx){
  const s=shuffledShorts[idx];
  if(!s) return;
  const btn=document.getElementById('slike-'+idx);
  const countEl=document.getElementById('slc-'+idx);
  const svg=btn?btn.querySelector('.heart-svg'):null;
  const li=likedShorts.indexOf(s.id);
  if(li===-1){
    likedShorts.push(s.id);
    shortLikes[s.id]=(shortLikes[s.id]||0)+1;
    if(btn) btn.classList.add('liked');
    if(svg){svg.setAttribute('fill','#ff4444');svg.setAttribute('stroke','#ff4444');}
  } else {
    likedShorts.splice(li,1);
    shortLikes[s.id]=Math.max(0,(shortLikes[s.id]||1)-1);
    if(btn) btn.classList.remove('liked');
    if(svg){svg.setAttribute('fill','none');svg.setAttribute('stroke','#fff');}
  }
  if(countEl) countEl.textContent=shortLikes[s.id]||0;
  try{localStorage.setItem('likedShorts',JSON.stringify(likedShorts));localStorage.setItem('shortLikes',JSON.stringify(shortLikes));}catch(e){}
}

function toggleSliderSub(channel,idx){
  const btn=document.getElementById('ssub-'+idx);
  const ci=subs.indexOf(channel);
  if(ci===-1){
    subs.push(channel);
    if(btn){btn.textContent='Subscribed';btn.classList.add('subbed');}
  } else {
    subs.splice(ci,1);
    if(btn){btn.textContent='Subscribe';btn.classList.remove('subbed');}
  }
  try{localStorage.setItem('subs',JSON.stringify(subs));}catch(e){}
}

function shareSlide(idx){
  const s=shuffledShorts[idx];
  if(!s) return;
  const url=ytURL(s.ytId,true);
  if(navigator.share) navigator.share({title:s.title,url}).catch(()=>{});
  else{try{navigator.clipboard.writeText(url);}catch(e){}alert('Link copied!');}
}

function saveSlide(idx){
  const s=shuffledShorts[idx];
  if(s) alert('Saved: '+s.title);
}

function showSCmt(idx){
  const s=shuffledShorts[idx];
  if(!s) return;
  document.getElementById('s-cmt-panel').style.display='block';
  document.getElementById('panel-overlay').style.display='block';
  const cmts=COMMENTS_DB[s.id]||COMMENTS_DB.default;
  document.getElementById('s-cmt-list').innerHTML=cmts.map(c=>cmtHTML(c)).join('');
}

function closePanel(){
  document.getElementById('s-cmt-panel').style.display='none';
  document.getElementById('panel-overlay').style.display='none';
}

// ====================================================================
// COMMENTS
// ====================================================================
function renderComments(videoId){
  const sec=document.getElementById('cmt-section');
  const stored=userCmts.filter(c=>c.videoId===videoId);
  const base=COMMENTS_DB[videoId]||COMMENTS_DB.default;
  const all=[...stored.map(c=>({user:'You',text:c.text,time:'just now',likes:0})),...base];
  sec.innerHTML=`
    <div class="cmt-header">Comments <span class="cmt-count">${all.length}</span></div>
    <div class="cmt-input-row">
      <div class="cmt-avatar" style="background:var(--red);color:#fff;">A</div>
      <div class="cmt-input-wrap">
        <textarea class="cmt-textarea" id="ci-${videoId}" placeholder="Add a comment..." rows="1"
          oninput="onCmtInput(this,'${videoId}')"></textarea>
        <div class="cmt-acts" id="ca-${videoId}" style="display:none">
          <button class="cmt-cancel" onclick="cancelCmt('${videoId}')">Cancel</button>
          <button class="cmt-submit" id="cs-${videoId}" onclick="submitCmt('${videoId}')">Comment</button>
        </div>
      </div>
    </div>
    <div id="cl-${videoId}">${all.map(c=>cmtHTML(c)).join('')}</div>`;
}

function cmtHTML(c){
  const ini=(c.user||'?').substring(0,2).toUpperCase();
  return `<div class="cmt-item">
    <div class="cmt-avatar">${ini}</div>
    <div class="cmt-body">
      <span class="cmt-author">@${c.user}</span>
      <span class="cmt-time">${c.time||''}</span>
      <div class="cmt-text">${c.text}</div>
      <div class="cmt-btns">
        <button class="cmt-like-btn" onclick="this.classList.toggle('liked')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3H14z"/><path d="M7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/></svg>
          ${c.likes||0}
        </button>
        <button class="reply-btn">Reply</button>
      </div>
    </div>
  </div>`;
}

function onCmtInput(el,vid){
  const acts=document.getElementById('ca-'+vid);
  const sub=document.getElementById('cs-'+vid);
  acts.style.display='flex';
  sub.className=el.value.trim()?'cmt-submit active':'cmt-submit';
}
function cancelCmt(vid){
  document.getElementById('ci-'+vid).value='';
  document.getElementById('ca-'+vid).style.display='none';
}
function submitCmt(vid){
  const inp=document.getElementById('ci-'+vid);
  const text=inp.value.trim();
  if(!text) return;
  userCmts.push({videoId:vid,text,time:new Date().toLocaleDateString()});
  try{localStorage.setItem('cmts',JSON.stringify(userCmts));}catch(e){}
  inp.value='';
  document.getElementById('ca-'+vid).style.display='none';
  renderComments(vid);
}

// ====================================================================
// SUBSCRIBE / LIKE VIDEO
// ====================================================================
function toggleSub(channel,btnId){
  const idx=subs.indexOf(channel);
  const btn=document.getElementById(btnId);
  if(idx===-1){
    subs.push(channel);
    if(btn){btn.textContent='Subscribed ✓';btn.classList.add('subscribed');}
  } else {
    subs.splice(idx,1);
    if(btn){btn.textContent='Subscribe';btn.classList.remove('subscribed');}
  }
  try{localStorage.setItem('subs',JSON.stringify(subs));}catch(e){}
}

function toggleLike(videoId,btnId){
  const idx=likedVids.indexOf(videoId);
  const btn=document.getElementById(btnId);
  if(idx===-1){
    likedVids.push(videoId);
    if(btn){btn.textContent='❤️ Liked';btn.classList.add('liked');}
  } else {
    likedVids.splice(idx,1);
    if(btn){btn.textContent='❤️ Like';btn.classList.remove('liked');}
  }
  try{localStorage.setItem('likes',JSON.stringify(likedVids));}catch(e){}
}

// ====================================================================
// SEARCH — full text search across title + channel + categories
// ====================================================================
function doSearch(e){
  e.preventDefault();
  const q=document.getElementById('search-input').value.trim().toLowerCase();
  if(!q){showPage('home');return;}
  showPage('search');
  document.getElementById('search-label').textContent=`Results for "${q}"`;
  // Match against all fields
  const ms=shuffledShorts.filter(v=>
    v.title.toLowerCase().includes(q)||
    v.channel.toLowerCase().includes(q)||
    (v.cats||[]).some(c=>c.toLowerCase().includes(q))
  );
  const ml=shuffledLong.filter(v=>
    v.title.toLowerCase().includes(q)||
    v.channel.toLowerCase().includes(q)||
    (v.cats||[]).some(c=>c.toLowerCase().includes(q))
  );
  const sw=document.getElementById('search-shorts-wrap');
  if(ms.length){
    sw.style.display='block';
    renderShortsGrid('search-shorts-grid',ms);
  } else sw.style.display='none';
  const svl=document.getElementById('search-vids-label');
  const lf=document.getElementById('search-long-feed');
  lf.innerHTML='';
  if(ml.length){
    svl.style.display='block';
    ml.forEach(v=>lf.appendChild(makeLongCard(v)));
  } else svl.style.display='none';
  if(!ms.length&&!ml.length){
    lf.innerHTML='<p style="color:var(--text2);padding:24px;text-align:center;">No results found for "'+escHtml(q)+'"</p>';
  }
}

// ====================================================================
// SUBS PAGE
// ====================================================================
function renderSubs(){
  const list=document.getElementById('subs-list');
  if(!subs.length){
    list.innerHTML='<p style="color:var(--text2);padding:20px;text-align:center;">No subscriptions yet.<br>Subscribe to channels to see them here.</p>';
    return;
  }
  list.innerHTML=subs.map(ch=>`
    <div style="display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--border);">
      <div style="width:44px;height:44px;border-radius:50%;background:${chColor(ch)};color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;flex-shrink:0;">${ch.charAt(0)}</div>
      <div style="flex:1"><div style="font-size:14px;font-weight:600">${escHtml(ch)}</div><div style="font-size:12px;color:var(--text2)">Subscribed</div></div>
      <button onclick="toggleSub('${ch}','usub-${ch.replace(/\s/g,'_')}')" id="usub-${ch.replace(/\s/g,'_')}" class="sub-btn subscribed" style="font-size:12px;padding:5px 12px">Subscribed ✓</button>
    </div>`).join('');
}

// ====================================================================
// INFINITE SCROLL for long feed
// ====================================================================
const infObs=new IntersectionObserver(entries=>{
  if(entries[0].isIntersecting && currentPage==='home'){
    const cat=activeCat;
    const pool=cat==='All'?shuffledLong:shuffledLong.filter(v=>v.cats&&v.cats.includes(cat));
    const more=pool.slice(longFeedPage,longFeedPage+4);
    if(more.length){renderLongFeed('home-long-feed',more);longFeedPage+=4;}
  }
},{threshold:0.1});

// ====================================================================
// UTILITIES
// ====================================================================
function escHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

const CH_COLORS=['#c0392b','#2980b9','#27ae60','#8e44ad','#d35400','#16a085','#f39c12','#1abc9c'];
function chColor(ch){return CH_COLORS[(ch.charCodeAt(0)||0)%CH_COLORS.length];}

// ====================================================================
// INIT
// ====================================================================
renderHome();
infObs.observe(document.getElementById('load-sentinel'));
// Pre-build shorts in background for instant open
setTimeout(()=>buildShortsContainer(), 800);
</script>
