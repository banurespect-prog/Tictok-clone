<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anskinge</title>
<style>
  :root {
    --bg: #0f0f0f;
    --bg2: #1a1a1a;
    --bg3: #272727;
    --text: #f1f1f1;
    --text2: #aaa;
    --red: #ff0000;
    --white: #ffffff;
    --border: #333;
    --search-ph: #888;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Segoe UI',sans-serif; min-height:100vh; }

  /* ===== TOP NAV ===== */
  #topnav {
    position:sticky; top:0; z-index:200;
    background:var(--bg); border-bottom:1px solid var(--border);
    display:flex; align-items:center; gap:12px; padding:10px 16px;
  }
  .logo-wrap { display:flex; align-items:center; gap:6px; text-decoration:none; }
  .logo-icon { width:32px; height:22px; background:var(--red); border-radius:6px;
    display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .logo-icon svg { width:14px; height:14px; fill:white; }
  .logo-text { font-size:18px; font-weight:700; color:var(--white); letter-spacing:-0.5px; }
  .logo-text span { color:var(--red); }

  #search-form { flex:1; display:flex; max-width:480px; margin:0 auto; }
  #search-input {
    flex:1; padding:8px 14px; background:var(--bg3); border:1px solid var(--border);
    border-right:none; border-radius:20px 0 0 20px; color:var(--text); font-size:14px; outline:none;
  }
  #search-input::placeholder { color:var(--search-ph); }
  #search-btn {
    padding:8px 16px; background:var(--bg3); border:1px solid var(--border);
    border-left:none; border-radius:0 20px 20px 0; cursor:pointer; color:var(--text2);
    font-size:16px;
  }
  #search-btn:hover { background:var(--bg2); }

  /* ===== BOTTOM NAV ===== */
  #botnav {
    position:fixed; bottom:0; left:0; right:0; z-index:200;
    background:var(--bg); border-top:1px solid var(--border);
    display:flex; justify-content:space-around; align-items:center; padding:8px 0 12px;
  }
  .bnav-btn {
    display:flex; flex-direction:column; align-items:center; gap:3px;
    background:none; border:none; color:var(--text2); cursor:pointer; font-size:11px; padding:4px 12px;
  }
  .bnav-btn.active { color:var(--white); }
  .bnav-btn svg { width:22px; height:22px; }
  .bnav-plus {
    width:44px; height:44px; background:linear-gradient(135deg,#00c6ff,#ff0080);
    border-radius:10px; display:flex; align-items:center; justify-content:center;
    border:none; cursor:pointer; color:white; font-size:24px; font-weight:300;
  }
  .bnav-inbox-wrap { position:relative; }
  .inbox-badge {
    position:absolute; top:-4px; right:8px; background:var(--red);
    color:white; border-radius:50%; width:16px; height:16px;
    font-size:9px; display:flex; align-items:center; justify-content:center; font-weight:700;
  }

  /* ===== MAIN CONTENT ===== */
  #main { padding-bottom:80px; }

  /* ===== HOME FEED ===== */
  #home-page { display:block; }
  .section-title {
    font-size:15px; font-weight:700; padding:14px 14px 8px;
    display:flex; align-items:center; gap:8px;
  }
  .section-title .red-dot { width:10px; height:10px; background:var(--red); border-radius:50%; }

  /* Long videos - 1 per row, BIG like YouTube */
  .feed-long { display:flex; flex-direction:column; gap:0; }
  .video-card {
    cursor:pointer; padding:0 0 16px;
  }
  .video-thumb {
    width:100%; aspect-ratio:16/9; object-fit:cover; background:#222;
    display:block; position:relative; overflow:hidden;
  }
  .video-thumb-img {
    width:100%; height:100%; object-fit:cover;
  }
  .video-duration {
    position:absolute; bottom:6px; right:8px;
    background:rgba(0,0,0,0.85); color:#fff; font-size:11px;
    padding:2px 5px; border-radius:3px; font-weight:600;
  }
  .video-info { display:flex; gap:10px; padding:10px 14px 0; }
  .channel-avatar {
    width:36px; height:36px; border-radius:50%; background:var(--bg3);
    flex-shrink:0; overflow:hidden;
  }
  .channel-avatar img { width:100%; height:100%; object-fit:cover; }
  .video-meta { flex:1; }
  .video-title { font-size:14px; font-weight:600; line-height:1.35; margin-bottom:3px;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .video-sub { font-size:12px; color:var(--text2); }
  .video-sub span::after { content:'·'; margin:0 4px; }
  .video-sub span:last-child::after { content:''; }

  /* Shorts grid - 2 per row */
  .shorts-section { padding:0 8px; }
  .shorts-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .short-card {
    cursor:pointer; border-radius:10px; overflow:hidden; background:var(--bg2);
  }
  .short-thumb {
    width:100%; aspect-ratio:9/16; background:#222; position:relative; overflow:hidden;
  }
  .short-thumb-img { width:100%; height:100%; object-fit:cover; }
  .short-overlay {
    position:absolute; bottom:0; left:0; right:0;
    background:linear-gradient(transparent,rgba(0,0,0,0.75));
    padding:20px 8px 8px;
  }
  .short-title { font-size:11px; color:#fff; font-weight:600; line-height:1.3; }
  .short-meta { font-size:10px; color:rgba(255,255,255,0.75); margin-top:2px; }

  /* ===== VIDEO PLAYER PAGE ===== */
  #player-page { display:none; }
  .player-top { display:flex; align-items:center; gap:12px; padding:12px 14px; }
  .back-btn { background:none; border:none; color:var(--white); cursor:pointer; font-size:20px; }
  .player-top-title { font-size:14px; font-weight:600; flex:1;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

  .player-wrap { width:100%; background:#000; position:relative; }
  /* LONG video - 16:9 */
  .player-long { aspect-ratio:16/9; }
  /* SHORT video - 9:16 full vertical */
  .player-short { aspect-ratio:9/16; max-height:70vh; margin:0 auto; display:block; }

  .player-wrap video, .player-wrap iframe {
    width:100%; height:100%; display:block;
  }
  .fake-player {
    width:100%; height:100%; background:#111;
    display:flex; align-items:center; justify-content:center; flex-direction:column; gap:12px;
    cursor:pointer; position:relative;
  }
  .fake-player-thumb { width:100%; height:100%; object-fit:cover; position:absolute; top:0; left:0; opacity:0.6; }
  .play-icon {
    position:relative; z-index:2;
    width:60px; height:60px; background:rgba(255,255,255,0.9);
    border-radius:50%; display:flex; align-items:center; justify-content:center;
  }
  .play-icon svg { width:28px; height:28px; fill:#000; margin-left:4px; }

  .video-details { padding:12px 14px; }
  .video-details .video-title { font-size:16px; font-weight:700; margin-bottom:8px; }
  .channel-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
  .channel-info { display:flex; align-items:center; gap:10px; }
  .channel-info .channel-avatar { width:40px; height:40px; }
  .channel-name { font-size:14px; font-weight:600; }
  .channel-subs { font-size:12px; color:var(--text2); }
  .sub-btn {
    padding:8px 18px; border-radius:20px; border:none; cursor:pointer;
    font-size:13px; font-weight:700; background:var(--white); color:#000;
    transition:opacity 0.2s;
  }
  .sub-btn.subscribed { background:var(--bg3); color:var(--text2); }
  .stats-row { display:flex; gap:8px; margin-bottom:12px; }
  .stat-pill {
    background:var(--bg3); border-radius:20px; padding:6px 12px;
    font-size:12px; color:var(--text2);
  }
  .action-row { display:flex; gap:10px; margin-bottom:16px; }
  .action-btn {
    flex:1; padding:10px; border-radius:8px; border:none; cursor:pointer;
    font-size:14px; font-weight:600; display:flex; align-items:center;
    justify-content:center; gap:6px;
  }
  .like-btn { background:#8b1a1a; color:#fff; }
  .like-btn.liked { background:#c0392b; }
  .save-btn { background:#4a4a00; color:#fff; }

  /* ===== RELATED VIDEOS (infinite scroll style) ===== */
  .up-next-title { font-size:15px; font-weight:700; padding:4px 0 10px; }
  .related-list { display:flex; flex-direction:column; gap:12px; }
  .related-card { display:flex; gap:10px; cursor:pointer; }
  .related-thumb {
    width:120px; flex-shrink:0; aspect-ratio:16/9; background:#222;
    border-radius:6px; overflow:hidden; position:relative;
  }
  .related-thumb img { width:100%; height:100%; object-fit:cover; }
  .related-thumb .video-duration { font-size:10px; }
  .related-info { flex:1; }
  .related-title { font-size:13px; font-weight:600; line-height:1.35; margin-bottom:3px;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .related-meta { font-size:11px; color:var(--text2); }

  /* Load more sentinel */
  #load-sentinel { height:30px; }

  /* ===== COMMENTS SECTION ===== */
  .comments-section { padding:14px; border-top:1px solid var(--border); margin-top:4px; }
  .comments-header { font-size:15px; font-weight:700; margin-bottom:14px; display:flex; align-items:center; gap:8px; }
  .comments-count { color:var(--text2); font-weight:400; font-size:13px; }

  /* Comment input */
  .comment-input-row { display:flex; gap:10px; margin-bottom:18px; }
  .comment-input-row .channel-avatar { background:var(--red); color:white;
    display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px; }
  .comment-input-wrap { flex:1; }
  .comment-textarea {
    width:100%; background:transparent; border:none; border-bottom:1px solid var(--border);
    color:var(--text); font-size:14px; padding:6px 0; resize:none; outline:none;
    font-family:inherit; min-height:36px;
  }
  .comment-textarea::placeholder { color:var(--text2); }
  .comment-actions { display:flex; justify-content:flex-end; gap:8px; margin-top:8px; }
  .comment-cancel { background:none; border:none; color:var(--text2); cursor:pointer; font-size:13px; padding:6px 12px; border-radius:20px; }
  .comment-submit {
    background:var(--bg3); border:none; color:var(--text2); cursor:pointer;
    font-size:13px; font-weight:600; padding:6px 14px; border-radius:20px;
  }
  .comment-submit.active { background:#3ea6ff; color:#000; }

  .comment-item { display:flex; gap:10px; margin-bottom:16px; }
  .comment-avatar {
    width:32px; height:32px; border-radius:50%; background:var(--bg3);
    flex-shrink:0; overflow:hidden; display:flex; align-items:center;
    justify-content:center; font-size:12px; font-weight:700; color:var(--text2);
  }
  .comment-body { flex:1; }
  .comment-author { font-size:12px; font-weight:700; color:var(--text); }
  .comment-time { font-size:11px; color:var(--text2); margin-left:6px; }
  .comment-text { font-size:13px; color:var(--text); margin-top:3px; line-height:1.4; }
  .comment-like-row { display:flex; align-items:center; gap:14px; margin-top:6px; }
  .cmt-like-btn { background:none; border:none; color:var(--text2); cursor:pointer; font-size:12px; display:flex; align-items:center; gap:4px; }
  .cmt-like-btn.liked { color:#3ea6ff; }
  .reply-toggle { background:none; border:none; color:#3ea6ff; cursor:pointer; font-size:12px; font-weight:600; margin-top:6px; }

  /* ===== SHORTS PLAYER PAGE ===== */
  #shorts-page { display:none; }
  .shorts-player-wrap {
    background:#000; height:calc(100vh - 60px - 80px);
    display:flex; align-items:center; justify-content:center;
    position:relative; overflow:hidden;
  }
  .shorts-player-wrap video, .shorts-player-wrap .fake-player {
    width:100%; height:100%; object-fit:cover;
  }
  .shorts-overlay {
    position:absolute; bottom:0; left:0; right:0;
    background:linear-gradient(transparent, rgba(0,0,0,0.8));
    padding:20px 14px 16px;
  }
  .shorts-channel { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
  .shorts-channel-name { font-size:14px; font-weight:700; color:#fff; }
  .shorts-sub-btn {
    padding:4px 12px; border-radius:20px; border:none; cursor:pointer;
    font-size:12px; font-weight:700; background:var(--white); color:#000;
    margin-left:8px;
  }
  .shorts-title { font-size:13px; color:#fff; margin-bottom:8px; }
  .shorts-actions {
    position:absolute; right:12px; bottom:60px;
    display:flex; flex-direction:column; align-items:center; gap:20px;
  }
  .short-action-btn { background:none; border:none; color:#fff; cursor:pointer;
    display:flex; flex-direction:column; align-items:center; gap:3px; font-size:10px; }
  .short-action-btn svg { width:26px; height:26px; }

  /* SEARCH PAGE */
  #search-page { display:none; padding:8px; }
  .search-results-title { font-size:13px; color:var(--text2); padding:8px 6px 12px; }

  /* ===== SUBSCRIBE PAGE ===== */
  #subs-page { display:none; padding:14px; }

  /* ===== AD REDUCTION ===== */
  /* Ads appear max 1 in every 10 items, styled subtly */
  .ad-card { opacity:0.7; border:1px solid var(--border); border-radius:6px; padding:8px; margin:8px 14px; }
  .ad-label { font-size:10px; color:#aaa; margin-bottom:4px; }
  .ad-card img { width:100%; border-radius:4px; }

  /* ===== SCROLLBAR ===== */
  ::-webkit-scrollbar { width:4px; }
  ::-webkit-scrollbar-track { background:var(--bg); }
  ::-webkit-scrollbar-thumb { background:var(--bg3); border-radius:2px; }

  /* ===== SHORTS red dot indicator ===== */
  .shorts-nav-dot { width:8px; height:8px; background:var(--red); border-radius:50%; margin:0 auto 2px; }

  .hidden { display:none !important; }
</style>
</head>

<!-- TOP NAV -->
<nav id="topnav">
  <a class="logo-wrap" href="#" onclick="showPage('home')">

      <svg viewBox="0 0 24 24"><path d="M19.6 3H4.4C2.5 3 1 4.5 1 6.4v11.2C1 19.5 2.5 21 4.4 21h15.2c1.9 0 3.4-1.5 3.4-3.4V6.4C23 4.5 21.5 3 19.6 3zm-3.1 9.5l-7 4c-.2.1-.4.1-.6 0-.2-.1-.3-.3-.3-.5v-8c0-.2.1-.4.3-.5.2-.1.4-.1.6 0l7 4c.2.1.3.3.3.5s-.1.4-.3.5z"/></svg>

  </form>
</nav>

<!-- MAIN -->
<div id="main">

  <!-- HOME PAGE -->
  <div id="home-page">
    <!-- SHORTS ROW -->
    <div class="section-title">
      <div class="red-dot"></div>
      Shorts

  <!-- SEARCH PAGE -->

</nav>

// User subscriptions (local)

// ===== PAGE MANAGEMENT =====
function showPage(page, data) {
  if(currentPage !== page) pageHistory.push(currentPage);
  currentPage = page;

  document.querySelectorAll('#home-page,#player-page,#shorts-page,#search-page,#subs-page')
    .forEach(el => el.style.display = 'none');
  document.querySelectorAll('.bnav-btn').forEach(b => b.classList.remove('active'));

  // Stop all playing iframes to prevent multiple playbacks
  stopAllMedia();

  if(page === 'home' || page === 'home-shorts') {
    document.getElementById('home-page').style.display = 'block';
    document.getElementById('bn-home').classList.add('active');
    if(page === 'home-shorts') {
      setTimeout(()=>{ document.querySelector('.shorts-section').scrollIntoView({behavior:'smooth'}); },100);
    }
  } else if(page === 'video') {
    document.getElementById('player-page').style.display = 'block';
    openVideo(data);
  } else if(page === 'short') {
    document.getElementById('shorts-page').style.display = 'block';
    document.getElementById('bn-shorts').classList.add('active');
    openShort(data);
  } else if(page === 'search') {
    document.getElementById('search-page').style.display = 'block';
  } else if(page === 'subs') {
    document.getElementById('subs-page').style.display = 'block';
    document.getElementById('bn-subs').classList.add('active');
    renderSubs();
  }
  window.scrollTo(0,0);
}

function goBack() {
  stopAllMedia();
  const prev = pageHistory.pop() || 'home';
  currentPage = '';
  showPage(prev);
}

function stopAllMedia() {
  // Reset all iframes to stop playback
  ['yt-iframe','short-iframe'].forEach(id => {
    const el = document.getElementById(id);
    if(el) { el.src = el.src; el.style.display = 'none'; }
  });
  document.getElementById('fake-player') && (document.getElementById('fake-player').style.display = 'flex');
  const fp2 = document.querySelector('#shorts-player-wrap .fake-player');
  if(fp2) fp2.style.display = 'flex';
}

  renderShortsGrid('home-shorts-grid', SHORTS.slice(0,8));

function renderShortsGrid(containerId, shorts) {
  const g = document.getElementById(containerId);
  g.innerHTML = '';
  shorts.forEach(s => { g.appendChild(makeShortCard(s)); });
}

function makeShortCard(s) {
  const div = document.createElement('div');
  div.className = 'short-card';
  div.onclick = () => showPage('short', s);
  div.innerHTML = `
    <div class="short-thumb">
      <img class="short-thumb-img" src="${s.thumb}" alt="${s.title}" loading="lazy" onerror="this.style.background='#333'">
      <div class="short-overlay">
        <div class="short-title">${s.title}</div>
        <div class="short-meta">${s.views} views</div>
      </div>
    </div>`;
  return div;
}

function renderLongFeed(containerId, videos) {
  const f = document.getElementById(containerId);
  videos.forEach(v => { f.appendChild(makeLongCard(v)); });
}

function makeLongCard(v) {
  const div = document.createElement('div');
  div.className = 'video-card';
  div.onclick = () => showPage('video', v);
  div.innerHTML = `
    <div class="video-thumb">
      <img class="video-thumb-img" src="${v.thumb}" alt="${v.title}" loading="lazy">
      <div class="video-duration">${v.dur||''}</div>
    </div>
    <div class="video-info">
      <div class="channel-avatar" style="background:#c0392b;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;">
        ${v.channel.charAt(0)}

      <div class="video-meta">
        <div class="video-title">${v.title}</div>
        <div class="video-sub">
          <span>${v.channel}</span>
          <span>${v.views} views</span>
          <span>${v.time||''}</span>
        </div>
      </div>
    </div>`;
  return div;
}

// ===== VIDEO PLAYER =====
function openVideo(v) {
  currentVideo = v;
  document.getElementById('player-top-title').textContent = v.title;
  document.getElementById('player-thumb').src = v.thumb;
  document.getElementById('fake-player').style.display = 'flex';
  document.getElementById('yt-iframe').style.display = 'none';

  // Player size: always 16:9 for long
  const pw = document.getElementById('player-wrap');
  pw.className = 'player-wrap player-long';

  // Details
  const subbed = subscribedChannels.includes(v.channel);
  const liked = likedVideos.includes(v.id);
  document.getElementById('video-details').innerHTML = `
    <div class="video-title">${v.title}</div>
    <div class="channel-row">
      <div class="channel-info">
        <div class="channel-avatar" style="background:#c0392b;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;">${v.channel.charAt(0)}</div>
        <div>
          <div class="channel-name">${v.channel}</div>
          <div class="channel-subs">${subscribedChannels.includes(v.channel)?'Subscribed':'Subscribe'}</div>
        </div>
      </div>
      <button class="sub-btn ${subbed?'subscribed':''}" id="sub-btn-main" onclick="toggleSub('${v.channel}','sub-btn-main')">
        ${subbed?'Subscribed ✓':'Subscribe'}
      </button>
    </div>
    <div class="stats-row">
      <div class="stat-pill">👁 ${v.views} views</div>
      <div class="stat-pill">👍 ${v.likes||'0'} likes</div>
    </div>
    <div class="action-row">
      <button class="action-btn like-btn ${liked?'liked':''}" id="like-btn-main" onclick="toggleLike('${v.id}','like-btn-main')">
        ❤️ ${liked?'Liked':'Like'}
      </button>
      <button class="action-btn save-btn">🔖 Save</button>
    </div>`;

  // Related videos — infinite style
  renderRelated(v);
  // Comments
  renderComments(v.id);
}

function playVideo() {
  const v = currentVideo;
  if(!v || !v.ytId) return;
  document.getElementById('fake-player').style.display = 'none';
  const iframe = document.getElementById('yt-iframe');
  iframe.src = YT_BASE + v.ytId + '?autoplay=1&rel=0';
  iframe.style.display = 'block';
}

function renderRelated(current) {
  const list = document.getElementById('related-list');
  list.innerHTML = '';
  const others = ALL_VIDEOS.filter(v => v.id !== current.id);
  // Show all, user can scroll infinitely
  others.forEach(v => { list.appendChild(makeRelatedCard(v)); });
}

function makeRelatedCard(v) {
  const div = document.createElement('div');
  div.className = 'related-card';
  div.onclick = () => showPage(v.type==='short'?'short':'video', v);
  div.innerHTML = `
    <div class="related-thumb">
      <img src="${v.thumb}" alt="${v.title}" loading="lazy">
      ${v.dur?`<div class="video-duration">${v.dur}</div>`:''}
    </div>
    <div class="related-info">
      <div class="related-title">${v.title}</div>
      <div class="related-meta">${v.channel} · ${v.views} views</div>
    </div>`;
  return div;
}

    <div class="shorts-title">${s.title}</div>`;

function playShort() {
  const s = SHORTS.find(x => x.id === activeShortId) || ALL_VIDEOS.find(x => x.id === activeShortId);
  if(!s || !s.ytId) return;
  const fp = document.querySelector('#shorts-player-wrap .fake-player');
  fp.style.display = 'none';
  const iframe = document.getElementById('short-iframe');
  iframe.src = YT_BASE + s.ytId + '?autoplay=1&rel=0';
  iframe.style.display = 'block';
}

function likeShort(btn) {

function showShortComments() {

// ===== COMMENTS =====
function renderComments(videoId) {
  const section = document.getElementById('comments-section');
  const stored = userComments.filter(c => c.videoId === videoId);
  const base = COMMENTS_DB[videoId] || COMMENTS_DB.default;
  const all = [...stored.map(c => ({user:'You', text:c.text, time:'just now', likes:0})), ...base];

  section.innerHTML = `
    <div class="comments-header">
      Comments <span class="comments-count">${all.length}</span>
    </div>
    <div class="comment-input-row">
      <div class="channel-avatar" style="background:var(--red);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;">A</div>
      <div class="comment-input-wrap">
        <textarea class="comment-textarea" id="comment-input-${videoId}" placeholder="Add a comment..." rows="1"
          oninput="onCommentInput(this,'${videoId}')"></textarea>
        <div class="comment-actions" id="comment-actions-${videoId}" style="display:none">
          <button class="comment-cancel" onclick="cancelComment('${videoId}')">Cancel</button>
          <button class="comment-submit" id="comment-submit-${videoId}" onclick="submitComment('${videoId}')">Comment</button>
        </div>
      </div>
    </div>
    <div id="comments-list-${videoId}">
      ${all.map(c => commentHTML(c)).join('')}
    </div>`;
}

function commentHTML(c) {
  const initials = (c.user||'?').substring(0,2).toUpperCase();
  return `<div class="comment-item">
    <div class="comment-avatar">${initials}</div>
    <div class="comment-body">
      <span class="comment-author">@${c.user}</span>
      <span class="comment-time">${c.time||''}</span>
      <div class="comment-text">${c.text}</div>
      <div class="comment-like-row">
        <button class="cmt-like-btn" onclick="likeCmt(this)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3H14z"/><path d="M7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/></svg>
          ${c.likes||0}
        </button>
        <button class="cmt-like-btn" onclick="dislikeCmt(this)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3H10z"/><path d="M17 2h2.67A2.31 2.31 0 0 1 22 4v7a2.31 2.31 0 0 1-2.33 2H17"/></svg>
        </button>
        <button class="reply-toggle">Reply</button>
      </div>
    </div>
  </div>`;
}

function onCommentInput(el, videoId) {
  const actions = document.getElementById('comment-actions-'+videoId);
  const submit = document.getElementById('comment-submit-'+videoId);
  actions.style.display = 'flex';
  submit.className = el.value.trim() ? 'comment-submit active' : 'comment-submit';
}

function cancelComment(videoId) {
  document.getElementById('comment-input-'+videoId).value = '';
  document.getElementById('comment-actions-'+videoId).style.display = 'none';
}

function submitComment(videoId) {
  const input = document.getElementById('comment-input-'+videoId);
  const text = input.value.trim();
  if(!text) return;
  userComments.push({ videoId, text, time: new Date().toLocaleDateString() });
  localStorage.setItem('comments', JSON.stringify(userComments));
  input.value = '';
  document.getElementById('comment-actions-'+videoId).style.display = 'none';
  renderComments(videoId);
}

function likeCmt(btn) { btn.classList.toggle('liked'); }
function dislikeCmt(btn) { btn.classList.toggle('liked'); }

// ===== SUBSCRIBE =====
function toggleSub(channel, btnId) {
  const idx = subscribedChannels.indexOf(channel);
  const btn = document.getElementById(btnId);
  if(idx === -1) {
    subscribedChannels.push(channel);
    if(btn) { btn.textContent = 'Subscribed ✓'; btn.classList.add('subscribed'); }
    // Show alert to remind user to also subscribe on YouTube
    setTimeout(()=>{
      if(confirm('To subscribe on the real YouTube channel too, press OK to open YouTube!')) {
        window.open('https://www.youtube.com/results?search_query='+encodeURIComponent(channel), '_blank');
      }
    }, 300);
  } else {
    subscribedChannels.splice(idx,1);
    if(btn) { btn.textContent = 'Subscribe'; btn.classList.remove('subscribed'); }
  }
  localStorage.setItem('subs', JSON.stringify(subscribedChannels));
}

// ===== LIKE VIDEO =====
function toggleLike(videoId, btnId) {
  const idx = likedVideos.indexOf(videoId);
  const btn = document.getElementById(btnId);
  if(idx === -1) { likedVideos.push(videoId); if(btn){btn.textContent='❤️ Liked'; btn.classList.add('liked');} }
  else { likedVideos.splice(idx,1); if(btn){btn.textContent='❤️ Like'; btn.classList.remove('liked');} }
  localStorage.setItem('likes', JSON.stringify(likedVideos));
}

// ===== SEARCH =====
function doSearch(e) {
  e.preventDefault();
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  if(!q) return;
  showPage('search');
  document.getElementById('search-query-label').textContent = `Results for "${q}"`;
  const matched = ALL_VIDEOS.filter(v =>
    v.title.toLowerCase().includes(q) || v.channel.toLowerCase().includes(q)
  );
  const shorts = matched.filter(v => v.type==='short');
  const longs = matched.filter(v => v.type==='long');

  // Shorts section visibility
  const ss = document.getElementById('search-shorts-section');
  if(shorts.length) {
    ss.style.display = 'block';
    renderShortsGrid('search-shorts-grid', shorts);
  } else { ss.style.display = 'none'; }

  const lf = document.getElementById('search-long-feed');
  lf.innerHTML = '';
  if(longs.length) longs.forEach(v => lf.appendChild(makeLongCard(v)));
  else if(!shorts.length) lf.innerHTML = '<p style="color:var(--text2);padding:20px;text-align:center;">No results found.</p>';
}

// ===== SUBS PAGE =====
function renderSubs() {
  const list = document.getElementById('subs-list');
  if(!subscribedChannels.length) {
    list.innerHTML = '<p style="color:var(--text2);padding:20px;text-align:center;">No subscriptions yet.<br>Subscribe to channels to see them here.</p>';
    return;
  }
  list.innerHTML = subscribedChannels.map(ch => `
    <div style="display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--border);">
      <div style="width:44px;height:44px;border-radius:50%;background:var(--red);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;">${ch.charAt(0)}</div>
      <div style="flex:1;"><div style="font-size:14px;font-weight:600;">${ch}</div><div style="font-size:12px;color:var(--text2);">Subscribed</div></div>
      <button onclick="toggleSub('${ch}','unsub-${ch.replace(/\s/g,'_')}')" id="unsub-${ch.replace(/\s/g,'_')}" class="sub-btn subscribed" style="font-size:12px;padding:6px 12px;">Subscribed ✓</button>
    </div>`).join('');
}

// ===== INFINITE SCROLL =====
const observer = new IntersectionObserver(entries => {
  if(entries[0].isIntersecting && currentPage === 'home') {
    const more = LONG_VIDEOS.slice(longFeedPage, longFeedPage+4);
    if(more.length) {
      renderLongFeed('home-long-feed', more);
      longFeedPage += 4;
    }
  }
}, { threshold:0.1 });

// ===== INIT =====
renderHome();
observer.observe(document.getElementById('load-sentinel'));
</script>
