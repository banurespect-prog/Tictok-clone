<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Anskinge</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap');
  :root {
    --bg: #0f0f0f;
    --bg2: #1a1a1a;
    --bg3: #272727;
    --text: #f1f1f1;
    --text2: #aaa;
    --red: #ff0000;
    --white: #ffffff;
    --border: #333;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; touch-action:manipulation; }
  html, body { height:100%; overflow:hidden; }
  body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; max-width:430px; margin:0 auto; position:relative; }

  /* TOP NAV */
  #topnav {
    position:fixed; top:0; left:50%; transform:translateX(-50%);
    width:100%; max-width:430px; z-index:200;
    background:var(--bg); border-bottom:1px solid var(--border);
    display:flex; align-items:center; gap:10px; padding:10px 14px;
  }
  .logo-wrap { display:flex; align-items:center; gap:6px; text-decoration:none; flex-shrink:0; }
  .logo-icon { width:30px; height:20px; background:var(--red); border-radius:5px;
    display:flex; align-items:center; justify-content:center; }
  .logo-icon svg { width:13px; height:13px; fill:white; }
  .logo-text { font-size:17px; font-weight:700; color:var(--white); letter-spacing:-0.5px; }
  .logo-text span { color:var(--red); }
  #search-form { flex:1; display:flex; }
  #search-input {
    flex:1; padding:7px 13px; background:var(--bg3); border:1px solid var(--border);
    border-right:none; border-radius:18px 0 0 18px; color:var(--text); font-size:13px; outline:none; font-family:inherit;
  }
  #search-input::placeholder { color:var(--text2); }
  #search-btn {
    padding:7px 14px; background:var(--bg3); border:1px solid var(--border);
    border-left:none; border-radius:0 18px 18px 0; cursor:pointer; color:var(--text2); font-size:15px;
  }

  /* BOTTOM NAV - TikTok style */
  #botnav {
    position:fixed; bottom:0; left:50%; transform:translateX(-50%);
    width:100%; max-width:430px; z-index:200;
    background:var(--bg); border-top:1px solid var(--border);
    display:flex; justify-content:space-around; align-items:center; padding:8px 0 env(safe-area-inset-bottom,10px);
  }
  .bnav-btn {
    display:flex; flex-direction:column; align-items:center; gap:3px;
    background:none; border:none; color:var(--text2); cursor:pointer; font-size:10px; padding:4px 10px; font-family:inherit;
  }
  .bnav-btn.active { color:var(--white); }
  .bnav-btn svg { width:22px; height:22px; }
  .bnav-plus {
    width:48px; height:32px; background:none; border:none; cursor:pointer; padding:0; position:relative; flex-shrink:0;
  }
  .bnav-plus-inner {
    width:100%; height:100%; border-radius:8px; overflow:hidden; position:relative;
    display:flex; align-items:center; justify-content:center;
  }
  .bnav-plus-inner::before {
    content:''; position:absolute; inset:0;
    background:linear-gradient(135deg,#00c6ff,#ff0080); border-radius:8px;
  }
  .bnav-plus-inner span { position:relative; z-index:1; color:#fff; font-size:22px; font-weight:300; line-height:1; }
  .bnav-badge-wrap { position:relative; }
  .inbox-badge {
    position:absolute; top:-4px; right:-4px; background:var(--red);
    color:white; border-radius:50%; width:15px; height:15px;
    font-size:9px; display:flex; align-items:center; justify-content:center; font-weight:700;
  }
  .shorts-nav-dot { width:7px; height:7px; background:var(--red); border-radius:50%; margin:0 auto 1px; }

  /* MAIN SCROLL AREA */
  #main {
    position:fixed; top:57px; bottom:60px; left:50%; transform:translateX(-50%);
    width:100%; max-width:430px;
    overflow-y:auto; overflow-x:hidden;
    -webkit-overflow-scrolling:touch;
  }

  /* HOME */
  #home-page { display:block; padding-bottom:20px; }
  .section-title {
    font-size:14px; font-weight:700; padding:13px 14px 8px;
    display:flex; align-items:center; gap:8px;
  }
  .section-title .red-dot { width:9px; height:9px; background:var(--red); border-radius:50%; flex-shrink:0; }

  /* Long videos */
  .feed-long { display:flex; flex-direction:column; }
  .video-card { cursor:pointer; padding:0 0 14px; }
  .video-thumb { width:100%; aspect-ratio:16/9; background:#222; display:block; position:relative; overflow:hidden; }
  .video-thumb-img { width:100%; height:100%; object-fit:cover; display:block; }
  .video-duration {
    position:absolute; bottom:5px; right:7px;
    background:rgba(0,0,0,0.85); color:#fff; font-size:11px;
    padding:2px 5px; border-radius:3px; font-weight:600;
  }
  .video-info { display:flex; gap:10px; padding:9px 14px 0; }
  .channel-avatar {
    width:34px; height:34px; border-radius:50%; background:var(--bg3); flex-shrink:0; overflow:hidden;
    display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; color:#fff;
  }
  .video-meta { flex:1; }
  .video-title { font-size:14px; font-weight:600; line-height:1.35; margin-bottom:3px;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .video-sub { font-size:12px; color:var(--text2); }
  .video-sub span::after { content:'·'; margin:0 4px; }
  .video-sub span:last-child::after { content:''; }

  /* Shorts grid */
  .shorts-section { padding:0 8px; }
  .shorts-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .short-card { cursor:pointer; border-radius:10px; overflow:hidden; background:var(--bg2); }
  .short-thumb { width:100%; aspect-ratio:9/16; background:#222; position:relative; overflow:hidden; }
  .short-thumb-img { width:100%; height:100%; object-fit:cover; display:block; }
  .short-overlay {
    position:absolute; bottom:0; left:0; right:0;
    background:linear-gradient(transparent,rgba(0,0,0,0.78));
    padding:18px 8px 8px;
  }
  .short-title { font-size:11px; color:#fff; font-weight:600; line-height:1.3; }
  .short-meta { font-size:10px; color:rgba(255,255,255,0.7); margin-top:2px; }

  /* ============ SHORTS FULL SCREEN PLAYER (TikTok Style) ============ */
  #shorts-page {
    display:none;
    position:fixed; top:0; left:50%; transform:translateX(-50%);
    width:100%; max-width:430px; height:100vh; z-index:150;
    background:#000; overflow:hidden;
  }

  /* Shorts container — vertical snap scroll */
  #shorts-container {
    width:100%; height:100%;
    overflow-y:scroll;
    scroll-snap-type:y mandatory;
    -webkit-overflow-scrolling:touch;
  }
  #shorts-container::-webkit-scrollbar { display:none; }

  .short-slide {
    width:100%; height:100vh;
    scroll-snap-align:start;
    scroll-snap-stop:always;
    position:relative; background:#000; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
  }

  /* Video/thumbnail fill */
  .short-slide .slide-thumb {
    position:absolute; inset:0;
    width:100%; height:100%; object-fit:cover;
  }
  .short-slide .slide-iframe {
    position:absolute; inset:0;
    width:100%; height:100%; border:0; display:none;
  }
  .short-slide .slide-overlay {
    position:absolute; inset:0; background:rgba(0,0,0,0.2);
    display:flex; align-items:center; justify-content:center;
  }
  .slide-play-btn {
    width:60px; height:60px; background:rgba(255,255,255,0.85);
    border-radius:50%; display:flex; align-items:center; justify-content:center;
    border:none; cursor:pointer; flex-shrink:0; transition:opacity 0.3s;
  }
  .slide-play-btn svg { width:28px; height:28px; fill:#000; margin-left:5px; }
  .slide-play-btn.hidden { opacity:0; pointer-events:none; }

  /* Bottom info overlay */
  .slide-info {
    position:absolute; bottom:70px; left:14px; right:80px;
    z-index:10; pointer-events:none;
  }
  .slide-channel-row { display:flex; align-items:center; gap:8px; margin-bottom:6px; pointer-events:auto; }
  .slide-avatar { width:36px; height:36px; border-radius:50%; background:var(--red); color:#fff; font-weight:700; font-size:14px; display:flex; align-items:center; justify-content:center; flex-shrink:0; border:2px solid #fff; }
  .slide-channel-name { font-size:14px; font-weight:700; color:#fff; }
  .slide-sub-btn { padding:3px 12px; border-radius:14px; border:1.5px solid #fff; background:transparent; color:#fff; font-size:12px; font-weight:700; cursor:pointer; font-family:inherit; }
  .slide-sub-btn.subbed { background:rgba(255,255,255,0.15); }
  .slide-title { font-size:13px; color:#fff; line-height:1.4; pointer-events:none; }

  /* Right-side action buttons */
  .slide-actions {
    position:absolute; right:10px; bottom:80px;
    display:flex; flex-direction:column; align-items:center; gap:20px;
    z-index:10;
  }
  .slide-action {
    display:flex; flex-direction:column; align-items:center; gap:4px;
    background:none; border:none; color:#fff; cursor:pointer; font-family:inherit;
    font-size:11px; font-weight:600;
  }
  .slide-action .icon-circle {
    width:44px; height:44px; border-radius:50%; background:rgba(255,255,255,0.15);
    display:flex; align-items:center; justify-content:center;
    backdrop-filter:blur(6px);
  }
  .slide-action svg { width:22px; height:22px; }
  .slide-action.liked .icon-circle { background:rgba(255,68,68,0.3); }
  .slide-action.liked svg { fill:#ff4444; stroke:none; }

  /* Back button on shorts */
  #shorts-back-btn {
    position:fixed; top:14px; left:50%; transform:translateX(calc(-215px));
    z-index:300; background:rgba(0,0,0,0.45); border:none; color:#fff;
    width:36px; height:36px; border-radius:50%; cursor:pointer;
    display:none; align-items:center; justify-content:center; font-size:18px;
    backdrop-filter:blur(4px);
  }

  /* Short comments panel */
  #short-comments-panel {
    position:fixed; bottom:0; left:50%; transform:translateX(-50%);
    width:100%; max-width:430px;
    background:var(--bg2); border-radius:16px 16px 0 0;
    max-height:65vh; overflow-y:auto; z-index:400; padding:16px;
    display:none; box-shadow:0 -4px 24px rgba(0,0,0,0.6);
  }
  #short-comments-panel::-webkit-scrollbar { width:2px; }
  .panel-drag-bar { width:36px; height:4px; background:var(--bg3); border-radius:2px; margin:0 auto 12px; }

  /* ============ VIDEO PLAYER PAGE ============ */
  #player-page { display:none; }
  .player-top { display:flex; align-items:center; gap:12px; padding:11px 14px; }
  .back-btn { background:none; border:none; color:var(--white); cursor:pointer; font-size:20px; line-height:1; padding:4px; }
  .player-top-title { font-size:14px; font-weight:600; flex:1;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .player-wrap { width:100%; background:#000; position:relative; aspect-ratio:16/9; }
  .player-wrap iframe { width:100%; height:100%; display:block; border:0; }

  /* Thumbnail fake player */
  .fake-player {
    width:100%; height:100%; background:#111;
    display:flex; align-items:center; justify-content:center; flex-direction:column; gap:12px;
    cursor:pointer; position:absolute; inset:0;
  }
  .fake-player-thumb { width:100%; height:100%; object-fit:cover; position:absolute; top:0; left:0; }
  .play-overlay { position:absolute; inset:0; background:rgba(0,0,0,0.3); }
  .play-icon {
    position:relative; z-index:2;
    width:58px; height:58px; background:rgba(255,255,255,0.93);
    border-radius:50%; display:flex; align-items:center; justify-content:center;
    box-shadow:0 2px 16px rgba(0,0,0,0.5);
  }
  .play-icon svg { width:26px; height:26px; fill:#000; margin-left:4px; }

  /* Video details */
  .video-details { padding:12px 14px; }
  .vd-title { font-size:15px; font-weight:700; margin-bottom:10px; line-height:1.4; }
  .channel-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
  .channel-info { display:flex; align-items:center; gap:10px; }
  .channel-info .channel-avatar { width:38px; height:38px; font-size:14px; }
  .channel-name { font-size:14px; font-weight:600; }
  .channel-subs { font-size:12px; color:var(--text2); }
  .sub-btn {
    padding:7px 16px; border-radius:20px; border:none; cursor:pointer;
    font-size:13px; font-weight:700; background:var(--white); color:#000; font-family:inherit;
  }
  .sub-btn.subscribed { background:var(--bg3); color:var(--text2); }
  .stats-row { display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; }
  .stat-pill { background:var(--bg3); border-radius:18px; padding:5px 11px; font-size:12px; color:var(--text2); }
  .action-row { display:flex; gap:10px; margin-bottom:14px; }
  .action-btn {
    flex:1; padding:10px; border-radius:8px; border:none; cursor:pointer;
    font-size:13px; font-weight:700; display:flex; align-items:center;
    justify-content:center; gap:6px; font-family:inherit; transition:background 0.2s;
  }
  .like-btn { background:#8b1a1a; color:#fff; }
  .like-btn.liked { background:#c0392b; }
  .save-btn { background:#3a3a00; color:#fff; }

  /* Related */
  .up-next-title { font-size:14px; font-weight:700; padding:4px 0 10px; }
  .related-list { display:flex; flex-direction:column; gap:12px; }
  .related-card { display:flex; gap:10px; cursor:pointer; }
  .related-thumb {
    width:115px; flex-shrink:0; aspect-ratio:16/9; background:#222;
    border-radius:6px; overflow:hidden; position:relative;
  }
  .related-thumb img { width:100%; height:100%; object-fit:cover; }
  .related-thumb .video-duration { font-size:10px; }
  .related-info { flex:1; }
  .related-title { font-size:13px; font-weight:600; line-height:1.35; margin-bottom:3px;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .related-meta { font-size:11px; color:var(--text2); }

  /* Load sentinel */
  #load-sentinel { height:28px; }

  /* Comments */
  .comments-section { padding:14px; border-top:1px solid var(--border); margin-top:4px; }
  .comments-header { font-size:14px; font-weight:700; margin-bottom:14px; display:flex; align-items:center; gap:8px; }
  .comments-count { color:var(--text2); font-weight:400; font-size:13px; }
  .comment-input-row { display:flex; gap:10px; margin-bottom:16px; }
  .comment-input-wrap { flex:1; }
  .comment-textarea {
    width:100%; background:transparent; border:none; border-bottom:1px solid var(--border);
    color:var(--text); font-size:13px; padding:6px 0; resize:none; outline:none;
    font-family:inherit; min-height:34px;
  }
  .comment-textarea::placeholder { color:var(--text2); }
  .comment-actions { display:flex; justify-content:flex-end; gap:8px; margin-top:8px; }
  .comment-cancel { background:none; border:none; color:var(--text2); cursor:pointer; font-size:13px; padding:6px 12px; border-radius:20px; font-family:inherit; }
  .comment-submit { background:var(--bg3); border:none; color:var(--text2); cursor:pointer; font-size:13px; font-weight:600; padding:6px 14px; border-radius:20px; font-family:inherit; }
  .comment-submit.active { background:#3ea6ff; color:#000; }
  .comment-item { display:flex; gap:10px; margin-bottom:16px; }
  .comment-avatar {
    width:30px; height:30px; border-radius:50%; background:var(--bg3); flex-shrink:0;
    display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:var(--text2);
  }
  .comment-body { flex:1; }
  .comment-author { font-size:12px; font-weight:700; color:var(--text); }
  .comment-time { font-size:11px; color:var(--text2); margin-left:6px; }
  .comment-text { font-size:13px; color:var(--text); margin-top:3px; line-height:1.4; }
  .comment-like-row { display:flex; align-items:center; gap:12px; margin-top:6px; }
  .cmt-like-btn { background:none; border:none; color:var(--text2); cursor:pointer; font-size:12px; display:flex; align-items:center; gap:4px; font-family:inherit; }
  .cmt-like-btn.liked { color:#3ea6ff; }
  .reply-toggle { background:none; border:none; color:#3ea6ff; cursor:pointer; font-size:12px; font-weight:600; font-family:inherit; }

  /* SEARCH PAGE */
  #search-page { display:none; padding:0 8px 20px; }
  .search-results-title { font-size:13px; color:var(--text2); padding:8px 6px 12px; }

  /* SUBS PAGE */
  #subs-page { display:none; padding:14px; }

  /* PROFILE PAGE */
  #profile-page { display:none; padding:14px; }
  .profile-header { text-align:center; padding:20px 0; }
  .profile-avatar-big { width:72px; height:72px; border-radius:50%; background:var(--red); color:#fff; font-size:28px; font-weight:700; display:flex; align-items:center; justify-content:center; margin:0 auto 12px; }
  .profile-name { font-size:18px; font-weight:700; }
  .profile-handle { font-size:13px; color:var(--text2); margin-top:4px; }

  /* SCROLLBAR */
  #main::-webkit-scrollbar { width:3px; }
  #main::-webkit-scrollbar-track { background:var(--bg); }
  #main::-webkit-scrollbar-thumb { background:var(--bg3); border-radius:2px; }
  .hidden { display:none !important; }

  /* Dim overlay for comments panel */
  #panel-overlay {
    display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:350;
  }
</style>
</head>
<body>

<!-- TOP NAV -->
<nav id="topnav">
  <a class="logo-wrap" href="#" onclick="showPage('home');return false;">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M19.6 3H4.4C2.5 3 1 4.5 1 6.4v11.2C1 19.5 2.5 21 4.4 21h15.2c1.9 0 3.4-1.5 3.4-3.4V6.4C23 4.5 21.5 3 19.6 3zm-3.1 9.5l-7 4c-.2.1-.4.1-.6 0-.2-.1-.3-.3-.3-.5v-8c0-.2.1-.4.3-.5.2-.1.4-.1.6 0l7 4c.2.1.3.3.3.5s-.1.4-.3.5z"/></svg>
    </div>
    <span class="logo-text">Ansk<span>i</span>nge</span>
  </a>
  <form id="search-form" onsubmit="doSearch(event)">
    <input id="search-input" type="text" placeholder="Search" autocomplete="off">
    <button id="search-btn" type="submit">🔍</button>
  </form>
</nav>

<!-- MAIN SCROLL AREA -->
<div id="main">

  <!-- HOME PAGE -->
  <div id="home-page">
    <div class="section-title"><div class="red-dot"></div> Shorts</div>
    <div class="shorts-section">
      <div class="shorts-grid" id="home-shorts-grid"></div>
    </div>
    <div class="section-title" style="margin-top:16px;">Videos</div>
    <div class="feed-long" id="home-long-feed"></div>
    <div id="load-sentinel"></div>
  </div>

  <!-- VIDEO PLAYER PAGE -->
  <div id="player-page">
    <div class="player-top">
      <button class="back-btn" onclick="goBack()">&#8592;</button>
      <div class="player-top-title" id="player-top-title">Video</div>
    </div>
    <div class="player-wrap" id="player-wrap">
      <div class="fake-player" id="fake-player" onclick="playVideo()">
        <img class="fake-player-thumb" id="player-thumb" src="" alt="">
        <div class="play-overlay"></div>
        <div class="play-icon">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </div>
      </div>
      <iframe id="yt-iframe" style="display:none;width:100%;height:100%;border:0;position:absolute;inset:0;"
        frameborder="0" allowfullscreen
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
      ></iframe>
    </div>
    <div class="video-details" id="video-details"></div>
    <div style="padding:0 14px">
      <div class="up-next-title">Up Next</div>
      <div class="related-list" id="related-list"></div>
    </div>
    <div class="comments-section" id="comments-section"></div>
  </div>

  <!-- SEARCH PAGE -->
  <div id="search-page">
    <div class="section-title">
      <button onclick="goBack()" style="background:none;border:none;color:var(--text2);cursor:pointer;font-size:18px;line-height:1;">&#8592;</button>
      Search Results
    </div>
    <div class="search-results-title" id="search-query-label"></div>
    <div id="search-shorts-section">
      <div class="section-title"><div class="red-dot"></div> Shorts</div>
      <div class="shorts-section"><div class="shorts-grid" id="search-shorts-grid"></div></div>
    </div>
    <div class="section-title" style="margin-top:14px;">Videos</div>
    <div class="feed-long" id="search-long-feed"></div>
  </div>

  <!-- SUBS PAGE -->
  <div id="subs-page">
    <div class="section-title">Subscriptions</div>
    <div id="subs-list"></div>
  </div>

  <!-- PROFILE PAGE -->
  <div id="profile-page">
    <div class="profile-header">
      <div class="profile-avatar-big">A</div>
      <div class="profile-name">Anskinge User</div>
      <div class="profile-handle">@anskinge</div>
    </div>
  </div>

</div>

<!-- SHORTS FULL SCREEN (outside #main, fixed) -->
<div id="shorts-page">
  <div id="shorts-container"></div>
</div>

<!-- Shorts back button (fixed, shown over shorts) -->
<button id="shorts-back-btn" onclick="goBack()">&#8592;</button>

<!-- Overlay dim for comments panel -->
<div id="panel-overlay" onclick="closeShortComments()"></div>

<!-- Short comments panel -->
<div id="short-comments-panel">
  <div class="panel-drag-bar"></div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
    <span style="font-size:15px;font-weight:700;">Comments</span>
    <button onclick="closeShortComments()" style="background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;">✕</button>
  </div>
  <div id="short-comments-list"></div>
</div>

// ===== STATE =====
let subscribedChannels = [];

try {

let currentPage = 'home';

// ===== PAGE MANAGEMENT =====
function showPage(page, data) {
  if(currentPage !== page) pageHistory.push(currentPage);
  currentPage = page;

  document.querySelectorAll('#home-page,#player-page,#search-page,#subs-page,#profile-page')
    .forEach(el => el.style.display = 'none');
  document.getElementById('shorts-page').style.display = 'none';
  document.getElementById('shorts-back-btn').style.display = 'none';
  document.querySelector('#main').style.overflowY = 'auto';
  document.querySelectorAll('.bnav-btn').forEach(b => b.classList.remove('active'));

  stopAllMedia();

  if(page === 'home') {
    document.getElementById('home-page').style.display = 'block';
    document.getElementById('bn-home').classList.add('active');
  } else if(page === 'video') {
    document.getElementById('player-page').style.display = 'block';
    openVideo(data);
  } else if(page === 'shorts') {
    document.getElementById('shorts-page').style.display = 'block';
    document.getElementById('shorts-back-btn').style.display = 'flex';
    document.getElementById('bn-shorts').classList.add('active');
    document.querySelector('#main').style.overflowY = 'hidden';
    if(data !== undefined) openShortsAt(data);
  } else if(page === 'search') {
    document.getElementById('search-page').style.display = 'block';
  } else if(page === 'subs') {
    document.getElementById('subs-page').style.display = 'block';
    document.getElementById('bn-subs').classList.add('active');
    renderSubs();
  } else if(page === 'profile') {
    document.getElementById('profile-page').style.display = 'block';
    document.getElementById('bn-profile').classList.add('active');

}

function goBack() {
  stopAllMedia();
  const prev = pageHistory.pop() || 'home';
  currentPage = '';
  showPage(prev);
}

function stopAllMedia() {
  const ytIframe = document.getElementById('yt-iframe');
  if(ytIframe) { ytIframe.src = ''; ytIframe.style.display = 'none'; }
  // Stop all short iframes
  document.querySelectorAll('.slide-iframe').forEach(f => { f.src = ''; f.style.display = 'none'; });
  document.querySelectorAll('.slide-play-btn').forEach(b => b.classList.remove('hidden'));
  const fp = document.getElementById('fake-player');
  if(fp) fp.style.display = 'flex';
  closeShortComments();
}

function openShortsFromHome() {
  showPage('shorts', 0);
}

// ===== RENDER HOME =====
function renderHome() {
  renderShortsGrid('home-shorts-grid', SHORTS);
  renderLongFeed('home-long-feed', LONG_VIDEOS.slice(0,4));
  longFeedPage = 4;
}

function renderShortsGrid(containerId, shorts) {
  const g = document.getElementById(containerId);
  g.innerHTML = '';
  shorts.forEach((s, idx) => g.appendChild(makeShortCard(s, idx)));
}

function makeShortCard(s, idx) {
  const div = document.createElement('div');
  div.className = 'short-card';
  div.onclick = () => showPage('shorts', idx);
  div.innerHTML = `
    <div class="short-thumb">
      <img class="short-thumb-img" src="${s.thumb}" alt="${s.title}" loading="lazy"
        onerror="this.closest('.short-card').style.display='none'">
      <div class="short-overlay">
        <div class="short-title">${s.title}</div>
        <div class="short-meta">${s.views} views</div>
      </div>
    </div>`;
  return div;
}

function renderLongFeed(containerId, videos) {
  const f = document.getElementById(containerId);
  videos.forEach(v => f.appendChild(makeLongCard(v)));
}

function makeLongCard(v) {
  const div = document.createElement('div');
  div.className = 'video-card';
  div.onclick = () => showPage('video', v);
  div.innerHTML = `
    <div class="video-thumb">
      <img class="video-thumb-img" src="${v.thumb}" alt="${v.title}" loading="lazy"
        onerror="this.closest('.video-card').style.display='none'">

    </div>

      <div class="channel-avatar" style="background:#c0392b;">${v.channel.charAt(0)}</div>
      <div class="video-meta">
        <div class="video-title">${v.title}</div>
        <div class="video-sub">
          <span>${v.channel}</span>
          <span>${v.views} views</span>
          <span>${v.time||''}</span>
        </div>

  return div;
}

// ===== VIDEO PLAYER =====
function openVideo(v) {
  currentVideo = v;
  document.getElementById('player-top-title').textContent = v.title;
  document.getElementById('player-thumb').src = v.thumb;
  document.getElementById('fake-player').style.display = 'flex';
  const iframe = document.getElementById('yt-iframe');
  iframe.src = '';
  iframe.style.display = 'none';

  const subbed = subscribedChannels.includes(v.channel);
  const liked = likedVideos.includes(v.id);
  document.getElementById('video-details').innerHTML = `
    <div class="vd-title">${v.title}</div>
    <div class="channel-row">
      <div class="channel-info">
        <div class="channel-avatar" style="background:#c0392b;font-size:15px;">${v.channel.charAt(0)}</div>
        <div>
          <div class="channel-name">${v.channel}</div>
          <div class="channel-subs">${subbed?'Subscribed':'Subscribe'}</div>
        </div>
      </div>
      <button class="sub-btn ${subbed?'subscribed':''}" id="sub-btn-main" onclick="toggleSub('${v.channel}','sub-btn-main')">
        ${subbed?'Subscribed ✓':'Subscribe'}
      </button>
    </div>
    <div class="stats-row">
      <div class="stat-pill">👁 ${v.views} views</div>
      <div class="stat-pill">👍 ${v.likes||'0'} likes</div>
    </div>
    <div class="action-row">
      <button class="action-btn like-btn ${liked?'liked':''}" id="like-btn-main" onclick="toggleLike('${v.id}','like-btn-main')">
        ❤️ ${liked?'Liked':'Like'}
      </button>
      <button class="action-btn save-btn">🔖 Save</button>
    </div>`;

  renderRelated(v);
  renderComments(v.id);
}

function playVideo() {
  const v = currentVideo;
  if(!v || !v.ytId) return;
  
  // If video is not embeddable, open in YouTube directly
  if(v.embeddable === false) {
    window.open(ytWatchUrl(v.ytId, false), '_blank');
    return;
  }

  document.getElementById('fake-player').style.display = 'none';
  const iframe = document.getElementById('yt-iframe');
  iframe.style.display = 'block';
  iframe.src = ytSrc(v.ytId);
}

function renderRelated(current) {
  const list = document.getElementById('related-list');
  list.innerHTML = '';
  ALL_VIDEOS.filter(v => v.id !== current.id && v.type === 'long').forEach(v => list.appendChild(makeRelatedCard(v)));
}

function makeRelatedCard(v) {
  const div = document.createElement('div');
  div.className = 'related-card';
  div.onclick = () => showPage('video', v);

    <div class="related-thumb">

    <div class="related-info">

      <div class="related-meta">${v.channel} · ${v.views} views</div>

  return div;
}

// ===== SHORTS FULL SCREEN PLAYER (TikTok swipe) =====
let shortsBuilt = false;

function buildShortsContainer() {
  const container = document.getElementById('shorts-container');
  container.innerHTML = '';
  SHORTS.forEach((s, idx) => {
    const slide = document.createElement('div');
    slide.className = 'short-slide';
    slide.id = 'slide-' + idx;

    const liked = likedShorts.includes(s.id);
    const likeCount = shortLikes[s.id] || 0;
    const subbed = subscribedChannels.includes(s.channel);

    slide.innerHTML = `
      <img class="slide-thumb" src="${s.thumb}" alt="${s.title}"
        onerror="this.style.display='none'">
      <iframe class="slide-iframe" frameborder="0" allowfullscreen
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
      ></iframe>
      <div class="slide-overlay">
        <button class="slide-play-btn" id="play-btn-${idx}" onclick="playSlide(${idx})">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </button>
      </div>
      <div class="slide-info">
        <div class="slide-channel-row">
          <div class="slide-avatar">${s.channel.charAt(0)}</div>
          <span class="slide-channel-name">${s.channel}</span>
          <button class="slide-sub-btn ${subbed?'subbed':''}" id="slide-sub-${idx}"
            onclick="toggleSliderSub('${s.channel}',${idx})">
            ${subbed?'Subscribed':'Subscribe'}
          </button>
        </div>
        <div class="slide-title">${s.title}</div>
      </div>
      <div class="slide-actions">
        <button class="slide-action ${liked?'liked':''}" id="slide-like-${idx}" onclick="toggleSliderLike(${idx})">
          <div class="icon-circle">
            <svg viewBox="0 0 24 24" fill="${liked?'#ff4444':'none'}" stroke="${liked?'#ff4444':'#fff'}" stroke-width="2">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
            </svg>
          </div>
          <span id="slide-like-count-${idx}">${likeCount}</span>
        </button>
        <button class="slide-action" onclick="showShortComments(${idx})">
          <div class="icon-circle">
            <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
          </div>
          <span>Comment</span>
        </button>
        <button class="slide-action" onclick="shareSlide(${idx})">
          <div class="icon-circle">
            <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2">
              <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
              <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
            </svg>
          </div>
          <span>Share</span>
        </button>
        <button class="slide-action" onclick="saveSlide(${idx})">
          <div class="icon-circle">
            <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2">
              <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
            </svg>
          </div>
          <span>Save</span>
        </button>
      </div>`;
    container.appendChild(slide);
  });
  shortsBuilt = true;
}

function openShortsAt(idx) {
  if(!shortsBuilt) buildShortsContainer();
  activeShortIdx = idx;
  // Scroll to the slide instantly
  const slide = document.getElementById('slide-' + idx);
  if(slide) slide.scrollIntoView({ behavior:'instant' });

  // Observe scroll to pause/play on swipe
  setupShortsScrollObserver();
}

let scrollObserverShorts = null;
function setupShortsScrollObserver() {
  if(scrollObserverShorts) scrollObserverShorts.disconnect();
  scrollObserverShorts = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      const idx = parseInt(entry.target.id.replace('slide-',''));
      const iframe = entry.target.querySelector('.slide-iframe');
      if(entry.isIntersecting) {
        activeShortIdx = idx;
        // Auto-play when scrolled into view if iframe was playing
        // (user must tap play first)
      } else {
        // Pause: clear iframe src to stop video
        if(iframe && iframe.src) {
          iframe._saved = iframe.src;
          iframe.src = '';
          iframe.style.display = 'none';
          const pb = entry.target.querySelector('.slide-play-btn');
          if(pb) pb.classList.remove('hidden');
        }
      }
    });
  }, { threshold: 0.6, root: document.getElementById('shorts-container') });

  document.querySelectorAll('.short-slide').forEach(slide => {
    scrollObserverShorts.observe(slide);
  });
}

function playSlide(idx) {
  const s = SHORTS[idx];
  if(!s) return;
  const slide = document.getElementById('slide-' + idx);
  const iframe = slide.querySelector('.slide-iframe');
  const btn = document.getElementById('play-btn-' + idx);

  iframe.src = YT_NOCOOKIE + s.ytId + '?autoplay=1&rel=0&playsinline=1&modestbranding=1&mute=0&origin=' + ORIGIN;
  iframe.style.display = 'block';
  btn.classList.add('hidden');
  // Hide the overlay
  slide.querySelector('.slide-overlay').style.pointerEvents = 'none';
  slide.querySelector('.slide-overlay').style.background = 'transparent';
}

function toggleSliderLike(idx) {
  const s = SHORTS[idx];
  if(!s) return;
  const btn = document.getElementById('slide-like-' + idx);
  const countEl = document.getElementById('slide-like-count-' + idx);
  const svg = btn.querySelector('svg');
  const likeIdx = likedShorts.indexOf(s.id);
  if(likeIdx === -1) {
    likedShorts.push(s.id);
    shortLikes[s.id] = (shortLikes[s.id] || 0) + 1;
    btn.classList.add('liked');
    svg.setAttribute('fill','#ff4444');
    svg.setAttribute('stroke','#ff4444');
  } else {
    likedShorts.splice(likeIdx, 1);
    shortLikes[s.id] = Math.max(0, (shortLikes[s.id] || 1) - 1);
    btn.classList.remove('liked');
    svg.setAttribute('fill','none');
    svg.setAttribute('stroke','#fff');
  }
  countEl.textContent = shortLikes[s.id] || 0;
  try {
    localStorage.setItem('likedShorts', JSON.stringify(likedShorts));
    localStorage.setItem('shortLikes', JSON.stringify(shortLikes));
  } catch(e) {}
}

function toggleSliderSub(channel, idx) {
  const btn = document.getElementById('slide-sub-' + idx);
  const cidx = subscribedChannels.indexOf(channel);
  if(cidx === -1) {
    subscribedChannels.push(channel);
    if(btn) { btn.textContent = 'Subscribed'; btn.classList.add('subbed'); }
  } else {
    subscribedChannels.splice(cidx,1);
    if(btn) { btn.textContent = 'Subscribe'; btn.classList.remove('subbed'); }
  }
  try { localStorage.setItem('subs', JSON.stringify(subscribedChannels)); } catch(e) {}
}

function shareSlide(idx) {
  const s = SHORTS[idx];
  if(!s) return;
  const url = ytWatchUrl(s.ytId, true);
  if(navigator.share) {
    navigator.share({ title: s.title, url }).catch(()=>{});
  } else {
    try { navigator.clipboard.writeText(url); } catch(e) {}
    alert('Link copied: ' + url);
  }
}

function saveSlide(idx) {
  const s = SHORTS[idx];
  if(!s) return;
  alert('Saved: ' + s.title);
}

function showShortComments(idx) {
  const s = SHORTS[idx];
  if(!s) return;
  const panel = document.getElementById('short-comments-panel');
  const overlay = document.getElementById('panel-overlay');
  panel.style.display = 'block';
  overlay.style.display = 'block';
  const list = document.getElementById('short-comments-list');
  const comments = COMMENTS_DB[s.id] || COMMENTS_DB.default;
  list.innerHTML = comments.slice(0,8).map(c => commentHTML(c)).join('');
}

function closeShortComments() {
  document.getElementById('short-comments-panel').style.display = 'none';
  document.getElementById('panel-overlay').style.display = 'none';
}

// ===== COMMENTS =====
function renderComments(videoId) {
  const section = document.getElementById('comments-section');
  const stored = userComments.filter(c => c.videoId === videoId);
  const base = COMMENTS_DB[videoId] || COMMENTS_DB.default;
  const all = [...stored.map(c => ({user:'You', text:c.text, time:'just now', likes:0})), ...base];

  section.innerHTML = `
    <div class="comments-header">Comments <span class="comments-count">${all.length}</span></div>
    <div class="comment-input-row">
      <div class="channel-avatar" style="background:var(--red);color:#fff;">A</div>
      <div class="comment-input-wrap">
        <textarea class="comment-textarea" id="comment-input-${videoId}" placeholder="Add a comment..." rows="1"
          oninput="onCommentInput(this,'${videoId}')"></textarea>
        <div class="comment-actions" id="comment-actions-${videoId}" style="display:none">
          <button class="comment-cancel" onclick="cancelComment('${videoId}')">Cancel</button>
          <button class="comment-submit" id="comment-submit-${videoId}" onclick="submitComment('${videoId}')">Comment</button>
        </div>
      </div>
    </div>
    <div id="comments-list-${videoId}">${all.map(c => commentHTML(c)).join('')}</div>`;
}

function commentHTML(c) {
  const initials = (c.user||'?').substring(0,2).toUpperCase();
  return `<div class="comment-item">
    <div class="comment-avatar">${initials}</div>
    <div class="comment-body">
      <span class="comment-author">@${c.user}</span>
      <span class="comment-time">${c.time||''}</span>
      <div class="comment-text">${c.text}</div>
      <div class="comment-like-row">
        <button class="cmt-like-btn" onclick="likeCmt(this)">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3H14z"/>
            <path d="M7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/>
          </svg>
          ${c.likes||0}
        </button>
        <button class="reply-toggle">Reply</button>
      </div>
    </div>
  </div>`;
}

function onCommentInput(el, videoId) {
  const actions = document.getElementById('comment-actions-'+videoId);
  const submit = document.getElementById('comment-submit-'+videoId);
  actions.style.display = 'flex';
  submit.className = el.value.trim() ? 'comment-submit active' : 'comment-submit';
}
function cancelComment(videoId) {
  document.getElementById('comment-input-'+videoId).value = '';
  document.getElementById('comment-actions-'+videoId).style.display = 'none';
}
function submitComment(videoId) {
  const input = document.getElementById('comment-input-'+videoId);
  const text = input.value.trim();
  if(!text) return;
  userComments.push({ videoId, text, time: new Date().toLocaleDateString() });
  try { localStorage.setItem('comments', JSON.stringify(userComments)); } catch(e) {}
  input.value = '';
  document.getElementById('comment-actions-'+videoId).style.display = 'none';
  renderComments(videoId);
}
function likeCmt(btn) { btn.classList.toggle('liked'); }

// ===== SUBSCRIBE =====
function toggleSub(channel, btnId) {
  const idx = subscribedChannels.indexOf(channel);
  const btn = document.getElementById(btnId);
  if(idx === -1) {
    subscribedChannels.push(channel);
    if(btn) { btn.textContent = 'Subscribed ✓'; btn.classList.add('subscribed'); }
  } else {
    subscribedChannels.splice(idx,1);
    if(btn) { btn.textContent = 'Subscribe'; btn.classList.remove('subscribed'); }
  }
  try { localStorage.setItem('subs', JSON.stringify(subscribedChannels)); } catch(e) {}
}

// ===== LIKE VIDEO =====
function toggleLike(videoId, btnId) {
  const idx = likedVideos.indexOf(videoId);
  const btn = document.getElementById(btnId);
  if(idx === -1) { likedVideos.push(videoId); if(btn){btn.textContent='❤️ Liked'; btn.classList.add('liked');} }
  else { likedVideos.splice(idx,1); if(btn){btn.textContent='❤️ Like'; btn.classList.remove('liked');} }
  try { localStorage.setItem('likes', JSON.stringify(likedVideos)); } catch(e) {}
}

// ===== SEARCH =====
function doSearch(e) {
  e.preventDefault();
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  if(!q) return;
  showPage('search');
  document.getElementById('search-query-label').textContent = `Results for "${q}"`;
  // Only show playable content in search
  const matched = ALL_VIDEOS.filter(v =>
    v.title.toLowerCase().includes(q) || v.channel.toLowerCase().includes(q)
  );
  const shorts = matched.filter(v => v.type==='short');
  const longs = matched.filter(v => v.type==='long');
  const ss = document.getElementById('search-shorts-section');
  if(shorts.length) { ss.style.display = 'block'; renderShortsGrid('search-shorts-grid', shorts); }
  else ss.style.display = 'none';
  const lf = document.getElementById('search-long-feed');
  lf.innerHTML = '';
  if(longs.length) longs.forEach(v => lf.appendChild(makeLongCard(v)));
  else if(!shorts.length) lf.innerHTML = '<p style="color:var(--text2);padding:20px;text-align:center;">No results found.</p>';
}

// ===== SUBS PAGE =====
function renderSubs() {
  const list = document.getElementById('subs-list');
  if(!subscribedChannels.length) {
    list.innerHTML = '<p style="color:var(--text2);padding:20px;text-align:center;">No subscriptions yet.</p>';
    return;
  }
  list.innerHTML = subscribedChannels.map(ch => `
    <div style="display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--border);">
      <div style="width:42px;height:42px;border-radius:50%;background:var(--red);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;flex-shrink:0;">${ch.charAt(0)}</div>
      <div style="flex:1;"><div style="font-size:14px;font-weight:600;">${ch}</div><div style="font-size:12px;color:var(--text2);">Subscribed</div></div>
      <button onclick="toggleSub('${ch}','unsub-${ch.replace(/\s/g,'_')}')" id="unsub-${ch.replace(/\s/g,'_')}" class="sub-btn subscribed" style="font-size:12px;padding:5px 11px;">Subscribed ✓</button>
    </div>`).join('');
}

// ===== INFINITE SCROLL =====
const scrollObserver = new IntersectionObserver(entries => {
  if(entries[0].isIntersecting && currentPage === 'home') {
    const more = LONG_VIDEOS.slice(longFeedPage, longFeedPage+4);
    if(more.length) { renderLongFeed('home-long-feed', more); longFeedPage += 4; }
  }
}, { threshold:0.1 });

// ===== INIT =====
renderHome();
scrollObserver.observe(document.getElementById('load-sentinel'));

// Build shorts container ahead of time for smooth experience
setTimeout(() => buildShortsContainer(), 500);
</script>
</body>
