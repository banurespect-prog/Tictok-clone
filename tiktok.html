<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Anskinge - Triple Mode</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Segoe UI',Roboto,sans-serif;background:#000;color:#fff;max-width:430px;margin:0 auto;position:relative;height:100vh;overflow:hidden;}
/* splash */
#splash{position:fixed;inset:0;z-index:9999;background:#0f0f0f;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity .4s;}
#splash.hide{opacity:0;pointer-events:none;}
.splash-logo{display:flex;align-items:center;gap:12px;}
.splash-icon{width:48px;height:33px;border-radius:10px;display:flex;align-items:center;justify-content:center;}
.splash-icon.yt{background:#ff0000;}
.splash-icon.tt{background:#000;border:1px solid #333;}
.splash-icon.ig{background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);}
.splash-name{font-size:32px;font-weight:800;letter-spacing:-1px;}
.splash-name em{font-style:normal;color:#ff0000;}
.splash-name-tt em{color:#fe2c55;}
.splash-name-ig em{color:#e6683c;}
.splash-line{width:200px;height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;}
.splash-bar{width:0%;height:100%;background:#ff0000;border-radius:2px;animation:splashAnim 2.3s cubic-bezier(.4,0,.2,1) forwards;}
.splash-bar.tt{background:#fe2c55;}
.splash-bar.ig{background:linear-gradient(90deg,#f09433,#e6683c,#dc2743);}
@keyframes splashAnim{0%{width:0%}30%{width:30%}60%{width:65%}85%{width:90%}100%{width:100%}}

/* no internet */
#no-internet{display:none;position:fixed;inset:0;z-index:8000;background:#000;flex-direction:column;align-items:center;justify-content:center;gap:20px;}
.retry-btn{padding:12px 32px;border-radius:24px;background:#ff0000;border:none;color:#fff;font-weight:700;cursor:pointer;}

/* dropdown */
#platform-dropdown{display:none;position:fixed;top:52px;left:12px;z-index:800;background:#1a1a1a;border-radius:14px;overflow:hidden;min-width:150px;border:1px solid #333;}
.pd-item{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;}
.pd-item:active{background:#333;}
.pd-logo{width:24px;height:20px;border-radius:5px;display:flex;align-items:center;justify-content:center;}
.pd-logo.yt{background:#ff0000;}
.pd-logo.ig{background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);}
.pd-logo.tt{background:#000;border:1px solid #444;}

/* topnav */
#topnav{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(15,15,15,.97);backdrop-filter:blur(12px);border-bottom:1px solid #2a2a2a;height:52px;display:flex;align-items:center;gap:8px;padding:0 12px;z-index:500;}
.logo-wrap{display:flex;align-items:center;gap:6px;cursor:pointer;}
.logo-box{width:28px;height:20px;background:#ff0000;border-radius:5px;display:flex;align-items:center;justify-content:center;}
.logo-text{font-size:17px;font-weight:800;}
.logo-text em{color:#ff0000;font-style:normal;}
.platform-arrow{width:20px;height:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
#search-bar{flex:1;background:#272727;border-radius:22px;display:flex;align-items:center;padding:0 12px;}
#search-bar input{flex:1;background:none;border:none;color:#fff;font-size:13px;padding:8px 0;outline:none;}
#search-bar button{background:none;border:none;color:#aaa;cursor:pointer;}

/* bottom nav */
#botnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(15,15,15,.97);backdrop-filter:blur(12px);border-top:1px solid #2a2a2a;height:56px;display:flex;justify-content:space-around;align-items:center;z-index:500;}
.bnav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;color:#666;font-size:10px;font-weight:600;cursor:pointer;}
.bnav-btn.active{color:#fff;}
.bnav-plus{width:50px;height:34px;background:none;border:none;cursor:pointer;}
.bnav-plus-inner{width:100%;height:100%;background:linear-gradient(135deg,#00c6ff,#7b2ff7,#ff0080);border-radius:9px;display:flex;align-items:center;justify-content:center;}
.bnav-plus-inner svg{stroke:#fff;stroke-width:2.5;width:18px;}
.bnav-badge{position:absolute;top:-2px;right:-4px;background:#ff0000;border-radius:50%;width:14px;height:14px;font-size:9px;display:flex;align-items:center;justify-content:center;}
.shorts-dot{width:5px;height:5px;background:#ff0000;border-radius:50%;margin-bottom:1px;}

#main{position:fixed;top:52px;bottom:56px;left:50%;transform:translateX(-50%);width:100%;max-width:430px;overflow-y:auto;overflow-x:hidden;}
/* home */
.cat-strip{display:flex;gap:8px;padding:10px 12px;overflow-x:auto;background:#0f0f0f;border-bottom:1px solid #2a2a2a;position:sticky;top:0;z-index:10;}
.cat-chip{padding:6px 14px;border-radius:20px;background:#1a1a1a;color:#aaa;border:1px solid #2a2a2a;font-size:12px;font-weight:600;white-space:nowrap;cursor:pointer;}
.cat-chip.active{background:#fff;color:#000;border-color:#fff;}
.section-hdr{display:flex;align-items:center;gap:8px;padding:14px 14px 10px;font-weight:700;}
.red-pill{background:#ff0000;color:#fff;font-size:10px;padding:2px 8px;border-radius:10px;}
.shorts-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:0 10px;}
.short-card{aspect-ratio:9/16;border-radius:10px;overflow:hidden;background:#1a1a1a;position:relative;cursor:pointer;}
.short-card img{width:100%;height:100%;object-fit:cover;}
.short-card-info{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.9));padding:22px 8px 8px;}
.short-card-title{font-size:11px;font-weight:600;}
.short-card-views{font-size:10px;color:#aaa;}
.video-card{cursor:pointer;margin-bottom:2px;}
.thumb-wrap{aspect-ratio:16/9;background:#1a1a1a;position:relative;}
.thumb-wrap img{width:100%;height:100%;object-fit:cover;}
.thumb-dur{position:absolute;bottom:6px;right:8px;background:rgba(0,0,0,.9);padding:2px 5px;border-radius:4px;font-size:11px;}
.video-row{display:flex;gap:10px;padding:10px 14px;}
.ch-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;flex-shrink:0;}
.vid-title{font-size:13px;font-weight:600;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.vid-sub{font-size:11px;color:#aaa;}
/* shorts fullscreen */
#shorts-page{display:none;position:fixed;inset:0;z-index:600;background:#000;}
#shorts-scroller{height:100%;overflow-y:scroll;scroll-snap-type:y mandatory;}
.s-slide{height:100vh;scroll-snap-align:start;position:relative;background:#000;}
.s-bg-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:blur(2px);opacity:.4;}
.s-video-wrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
.s-iframe{width:100%;height:100%;border:0;}
.s-play-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:6;background:rgba(0,0,0,.3);cursor:pointer;}
.s-play-circle{width:70px;height:70px;background:rgba(255,255,255,.2);backdrop-filter:blur(8px);border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid rgba(255,255,255,.8);}
.s-play-circle svg{width:32px;fill:#fff;margin-left:4px;}
.s-gradient{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 0%,transparent 55%,rgba(0,0,0,.85) 100%);pointer-events:none;z-index:5;}
.s-info{position:absolute;bottom:76px;left:14px;right:76px;z-index:10;}
.s-ch-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.s-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;border:2px solid rgba(255,255,255,.85);}
.s-ch-name{font-size:14px;font-weight:700;}
.s-sub-btn{padding:5px 12px;border-radius:16px;border:1.5px solid #fff;background:transparent;color:#fff;font-size:12px;font-weight:600;cursor:pointer;}
.s-sub-btn.subbed{background:rgba(255,255,255,.2);}
.s-title{font-size:13px;color:#fff;line-height:1.45;}
.s-actions{position:absolute;right:10px;bottom:80px;display:flex;flex-direction:column;gap:20px;z-index:10;}
.s-act-btn{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;}
.s-act-circle{width:46px;height:46px;border-radius:50%;background:rgba(0,0,0,.45);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,.12);}
.s-act-btn.liked .s-act-circle{background:rgba(255,48,48,.4);}
.s-act-circle svg{width:24px;height:24px;}
.s-mute-btn{margin-top:0;}
#shorts-cat-strip{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;z-index:620;background:linear-gradient(180deg,rgba(0,0,0,.85) 0%,transparent 100%);padding:10px 12px 20px;display:flex;gap:8px;overflow-x:auto;}
#shorts-cat-chips{display:flex;gap:6px;}
.shorts-header-logo{display:flex;align-items:center;gap:6px;cursor:pointer;}
.shl-box{width:26px;height:18px;background:#ff0000;border-radius:4px;display:flex;align-items:center;justify-content:center;}
.shl-name{font-size:14px;font-weight:800;}
.shl-name em{color:#ff0000;}
.shl-arrow{width:18px;height:18px;background:rgba(255,255,255,.15);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;}
#shorts-botnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;z-index:650;background:rgba(0,0,0,.75);backdrop-filter:blur(16px);border-top:1px solid rgba(255,255,255,.08);display:none;justify-content:space-around;align-items:center;height:56px;}
.sbn-btn{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;color:rgba(255,255,255,.7);font-size:10px;font-weight:600;cursor:pointer;}
.sbn-btn.active{color:#fff;}
.sbn-plus{width:50px;height:34px;background:none;border:none;cursor:pointer;}
.sbn-plus-inner{width:100%;height:100%;border-radius:9px;background:linear-gradient(135deg,#00c6ff,#7b2ff7,#ff0080);display:flex;align-items:center;justify-content:center;}

/* player */
#player-page{display:none;}
.player-topbar{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid #2a2a2a;}
.back-btn{width:36px;height:36px;border-radius:50%;background:#1a1a1a;border:1px solid #2a2a2a;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.player-title{font-size:14px;font-weight:600;flex:1;}
.player-wrap{aspect-ratio:16/9;background:#000;position:relative;}
.fake-play{position:absolute;inset:0;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.fake-play img{width:100%;height:100%;object-fit:cover;position:absolute;}
.play-circle{position:relative;width:64px;height:64px;background:rgba(255,255,255,.95);border-radius:50%;display:flex;align-items:center;justify-content:center;}
.player-controls-bar{display:flex;justify-content:flex-end;gap:12px;padding:8px 12px;background:rgba(0,0,0,.6);}
.ctrl-btn{background:none;border:none;color:#aaa;font-size:9px;font-weight:600;display:flex;align-items:center;gap:4px;cursor:pointer;}
.ctrl-btn.ctrl-active{color:#3ea6ff;}

/* instagram */
#ig-page{display:none;position:fixed;inset:0;z-index:590;flex-direction:column;}
.ig-topnav{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#000;border-bottom:1px solid #262626;height:52px;}
.ig-logo-area{display:flex;align-items:center;gap:8px;cursor:pointer;}
.ig-logo-box{width:26px;height:18px;background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);border-radius:4px;display:flex;align-items:center;justify-content:center;}
.ig-title{font-size:18px;font-weight:800;font-style:italic;}
.ig-reels-tabs{display:flex;border-bottom:1px solid #262626;flex-shrink:0;}
.ig-reels-tab{flex:1;text-align:center;padding:10px;font-size:14px;font-weight:600;color:#aaa;cursor:pointer;border-bottom:2px solid transparent;}
.ig-reels-tab.active{color:#fff;border-bottom-color:#fff;}
#ig-scroller{flex:1;overflow-y:scroll;scroll-snap-type:y mandatory;}
.ig-slide{width:100%;height:calc(100vh - 52px - 40px - 56px);scroll-snap-align:start;position:relative;}
.ig-slide-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:blur(3px);opacity:.35;}
.ig-iframe{position:absolute;inset:0;width:100%;height:100%;border:0;}
.ig-actions{position:absolute;right:12px;bottom:80px;display:flex;flex-direction:column;gap:18px;z-index:10;}
.ig-act{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;}
.ig-act-icon{width:44px;height:44px;border-radius:50%;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;}
.ig-info{position:absolute;bottom:12px;left:12px;right:68px;z-index:10;}
.ig-username{font-size:14px;font-weight:700;}
.ig-caption{font-size:13px;color:#eee;}
.ig-music-row{display:flex;align-items:center;gap:5px;margin-top:5px;font-size:12px;color:#aaa;}
.ig-botnav{height:56px;background:#000;border-top:1px solid #262626;display:flex;justify-content:space-around;align-items:center;}
.ig-nav-btn{background:none;border:none;color:#fff;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;cursor:pointer;}
.ig-nav-btn.ig-inactive{color:#aaa;}
.ig-plus-btn{width:44px;height:30px;border:2px solid #fff;border-radius:8px;position:relative;background:none;cursor:pointer;}
.ig-plus-btn::before{content:'';position:absolute;inset:2px;background:#00b4d8;border-radius:4px;}

/* tiktok */
#tt-page{display:none;position:fixed;inset:0;z-index:590;flex-direction:column;}
.tt-topnav{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;justify-content:center;padding:12px 16px;z-index:10;background:linear-gradient(180deg,rgba(0,0,0,.7) 0%,transparent 100%);height:56px;}
.tt-logo-area{position:absolute;left:12px;top:50%;transform:translateY(-50%);display:flex;align-items:center;gap:6px;cursor:pointer;}
.tt-logo-box{width:24px;height:24px;background:#000;border:1px solid #333;border-radius:4px;display:flex;align-items:center;justify-content:center;}
.tt-tabs{display:flex;gap:20px;}
.tt-tab{font-size:16px;font-weight:600;color:#aaa;cursor:pointer;}
.tt-tab.active{color:#fff;border-bottom:2px solid #fe2c55;}
.tt-search-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;}
#tt-scroller{position:absolute;inset:0;overflow-y:scroll;scroll-snap-type:y mandatory;}
.tt-slide{width:100%;height:100vh;scroll-snap-align:start;position:relative;}
.tt-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:blur(2px);opacity:.35;}
.tt-iframe{position:absolute;inset:0;width:100%;height:100%;border:0;}
.tt-actions{position:absolute;right:8px;bottom:90px;display:flex;flex-direction:column;gap:16px;}
.tt-act{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;}
.tt-act-icon{width:48px;height:48px;border-radius:50%;background:rgba(0,0,0,.4);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;}
.tt-avatar-wrap{position:relative;margin-bottom:4px;}
.tt-avatar{width:48px;height:48px;border-radius:50%;border:2.5px solid #fff;display:flex;align-items:center;justify-content:center;}
.tt-plus-badge{position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);width:20px;height:20px;background:#fe2c55;border-radius:50%;border:2px solid #000;display:flex;align-items:center;justify-content:center;}
.tt-info{position:absolute;bottom:70px;left:12px;right:70px;}
.tt-username{font-size:15px;font-weight:800;margin-bottom:4px;}
.tt-caption{font-size:13px;margin-bottom:6px;}
.tt-music{display:flex;align-items:center;gap:6px;font-size:12px;}
.tt-music-disc{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,#333,#666);display:flex;align-items:center;justify-content:center;animation:spin 3s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.tt-botnav{position:absolute;bottom:0;left:0;right:0;height:56px;background:rgba(0,0,0,.85);backdrop-filter:blur(10px);border-top:1px solid #333;display:flex;justify-content:space-around;align-items:center;}
.tt-nav-btn{background:none;border:none;color:#aaa;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;font-weight:600;cursor:pointer;}
.tt-nav-btn.tt-active{color:#fff;}
.tt-plus-btn{width:52px;height:33px;position:relative;overflow:hidden;border:none;background:none;cursor:pointer;}
.tt-plus-btn::before{content:'';position:absolute;left:-4px;top:0;bottom:0;width:50%;background:#3ea6ff;border-radius:8px 0 0 8px;}
.tt-plus-btn::after{content:'';position:absolute;right:-4px;top:0;bottom:0;width:50%;background:#fe2c55;border-radius:0 8px 8px 0;}
.tt-plus-btn-inner{position:absolute;inset:0;background:#fff;border-radius:8px;margin:0 3px;display:flex;align-items:center;justify-content:center;}
.tt-plus-btn-inner svg{width:18px;stroke:#000;stroke-width:2.5;fill:none;}

/* common */
#toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:8px 20px;border-radius:24px;font-size:13px;z-index:9999;opacity:0;transition:.2s;pointer-events:none;}
#toast.show{opacity:1;}
.loading-dots{display:flex;gap:6px;justify-content:center;padding:20px;}
.loading-dots span{width:8px;height:8px;background:#ff0000;border-radius:50%;animation:dotPulse 1.2s infinite;}
.loading-dots span:nth-child(2){animation-delay:.2s;}
.loading-dots span:nth-child(3){animation-delay:.4s;}
@keyframes dotPulse{0%,80%,100%{opacity:.3;transform:scale(.8);}40%{opacity:1;transform:scale(1);}}
</style>
</head>
<body>

<div id="splash">
  <div class="splash-logo" id="splashLogo">
    <div class="splash-icon yt"><svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M19.6 3H4.4C2.5 3 1 4.5 1 6.4v11.2C1 19.5 2.5 21 4.4 21h15.2c1.9 0 3.4-1.5 3.4-3.4V6.4C23 4.5 21.5 3 19.6 3zm-3.1 9.5l-7 4c-.2.1-.4.1-.6 0-.2-.1-.3-.3-.3-.5v-8c0-.2.1-.4.3-.5.2-.1.4-.1.6 0l7 4z"/></svg></div>
    <span class="splash-name">Ansk<em>i</em>nge</span>
  </div>
  <div class="splash-line"><div class="splash-bar yt-bar" id="splashBar"></div></div>
</div>

<div id="no-internet"><div class="retry-icon">📡</div><div class="retry-title">No Internet</div><button class="retry-btn" onclick="retryLoad()">Retry</button></div>

<script>
const API_KEY='AIzaSyAXmWdEwssA7_NUJGJCQqR60fzrFpZ-mfI';
const EMBED_BASE='https://www.youtube-nocookie.com/embed/';
const ORIGIN='&origin='+encodeURIComponent(location.origin);

let currentMode='yt',currentCat='All',shortsList=[],longList=[],longNext='';
let shortsPageData=[],shortsObserver=null,currentPlayingIdx=-1;
let loopActive=false,headphoneActive=false,curVideoId='',curVideoObj=null;
let likedVideos={},savedVideos={},subs={},likedCount=0;
try{likedVideos=JSON.parse(localStorage.getItem('liked')||'{}');}catch(e){}
try{subs=JSON.parse(localStorage.getItem('subs')||'{}');}catch(e){}
function saveLiked(){localStorage.setItem('liked',JSON.stringify(likedVideos));}
function saveSubs(){localStorage.setItem('subs',JSON.stringify(subs));}

async function fetchEmbeddableShorts(cat){
  const q=(SHORT_CAT_QUERIES[cat]||SHORT_CAT_QUERIES.All)[Math.floor(Math.random()*3)];
  const url=`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&videoDuration=short&maxResults=15&q=${encodeURIComponent(q)}&key=${API_KEY}`;
  try{
    let res=await fetch(url);
    let data=await res.json();
    if(!data.items) return [];
    let ids=data.items.map(i=>i.id.videoId).filter(Boolean);
    if(!ids.length) return [];
    let detailUrl=`https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics,status&id=${ids.join(',')}&key=${API_KEY}`;
    let detRes=await fetch(detailUrl);
    let detData=await detRes.json();
    if(!detData.items) return [];
    return detData.items.filter(v=>v.status?.embeddable!==false).map(v=>({
      id:v.id, title:v.snippet.title, channel:v.snippet.channelTitle,
      thumb:v.snippet.thumbnails.high?.url||v.snippet.thumbnails.medium?.url,
      views:parseInt(v.statistics?.viewCount)||0,
      likes:parseInt(v.statistics?.likeCount)||0,
      comments:parseInt(v.statistics?.commentCount)||0
    }));
  }catch(e){console.warn(e); return [];}
}
async function fetchEmbeddableLong(cat,pageToken=''){
  const q=(CAT_QUERIES[cat]||CAT_QUERIES.All)[Math.floor(Math.random()*3)];
  let url=`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=10&q=${encodeURIComponent(q)}&key=${API_KEY}`;
  if(pageToken)url+=`&pageToken=${pageToken}`;
  try{
    let res=await fetch(url);
    let data=await res.json();
    if(!data.items) return {items:[],nextPage:''};
    let ids=data.items.map(i=>i.id.videoId).filter(Boolean);
    if(!ids.length) return {items:[],nextPage:''};
    let detailUrl=`https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics,contentDetails,status&id=${ids.join(',')}&key=${API_KEY}`;
    let detRes=await fetch(detailUrl);
    let detData=await detRes.json();
    let items=(detData.items||[]).filter(v=>v.status?.embeddable!==false).map(v=>{
      let dur=v.contentDetails?.duration||'';
      let match=dur.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
      let mins=match?parseInt(match[2]||0):0,secs=match?parseInt(match[3]||0):0;
      return {
        id:v.id, title:v.snippet.title, channel:v.snippet.channelTitle,
        thumb:v.snippet.thumbnails.high?.url||v.snippet.thumbnails.medium?.url,
        views:parseInt(v.statistics?.viewCount)||0,likes:parseInt(v.statistics?.likeCount)||0,
        comments:parseInt(v.statistics?.commentCount)||0,duration:`${mins}:${secs<10?'0'+secs:secs}`,
        channelId:v.snippet.channelId
      };
    });
    return {items,nextPage:data.nextPageToken||''};
  }catch(e){return {items:[],nextPage:''};}
}
function formatNum(n){if(n>=1e6)return (n/1e6).toFixed(1)+'M';if(n>=1e3)return (n/1e3).toFixed(0)+'K';return n;}
function showToast(msg){let t=document.getElementById('toast');t.innerText=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}
function togglePlatformDropdown(){let dd=document.getElementById('platform-dropdown');dd.style.display=dd.style.display==='block'?'none':'block';}
document.addEventListener('click',e=>{if(!e.target.closest('#platform-dropdown')&&!e.target.closest('.platform-arrow')&&!e.target.closest('.shl-arrow')&&!e.target.closest('.ig-arrow-btn')&&!e.target.closest('.tt-logo-area')) document.getElementById('platform-dropdown').style.display='none';});
function selectPlatform(p){
  document.getElementById('platform-dropdown').style.display='none';
  currentMode=p;
  document.getElementById('topnav').style.display=p==='yt'?'flex':'none';
  document.getElementById('botnav').style.display=p==='yt'?'flex':'none';
  document.getElementById('main').style.display=p==='yt'?'block':'none';
  document.getElementById('ig-page').style.display=p==='ig'?'flex':'none';
  document.getElementById('tt-page').style.display=p==='tt'?'flex':'none';
  if(p==='ig') loadIgShorts();
  if(p==='tt') loadTtShorts();
  if(p==='yt'){loadHomeFeed();showPage('home');}
}
function loadHomeFeed(){fetchEmbeddableShorts(currentCat).then(s=>{shortsList=s;renderHomeShorts();});fetchEmbeddableLong(currentCat).then(l=>{longList=l.items;longNext=l.nextPage;renderHomeLong();});}
function renderHomeShorts(){
  let g=document.getElementById('homeShortsGrid');g.innerHTML='';
  shortsList.slice(0,6).forEach(v=>{
    let d=document.createElement('div');d.className='short-card';
    d.innerHTML=`<img src="${v.thumb}" loading="lazy"><div class="short-card-info"><div class="short-card-title">${v.title.slice(0,50)}</div><div class="short-card-views">${formatNum(v.views)}</div></div>`;
    d.onclick=()=>openShortsPage(0,v.id);
    g.appendChild(d);
  });
}
function renderHomeLong(){
  let f=document.getElementById('homeLongFeed');f.innerHTML='';
  longList.forEach(v=>f.appendChild(createVideoCard(v)));
}
function createVideoCard(v){
  let d=document.createElement('div');d.className='video-card';
  d.innerHTML=`<div class="thumb-wrap"><img src="${v.thumb}"><div class="thumb-dur">${v.duration}</div></div><div class="video-row"><div class="ch-av" style="background:#ff0000">${v.channel[0]}</div><div class="vid-meta"><div class="vid-title">${v.title}</div><div class="vid-sub">${v.channel} · ${formatNum(v.views)} views</div></div></div>`;
  d.onclick=()=>openPlayer(v);
  return d;
}
function openPlayer(v){
  curVideoId=v.id;curVideoObj=v;
  document.getElementById('playerTitle').innerText=v.title;
  document.getElementById('playerThumb').src=v.thumb;
  document.getElementById('fakePlay').style.display='flex';
  document.getElementById('ytIframe').style.display='none';
  showPage('player');
  document.getElementById('vidDetails').innerHTML=`<div class="vd-title">${v.title}</div><div class="vd-ch-row"><div class="vd-ch-left"><div class="vd-av" style="background:#ff0000">${v.channel[0]}</div><div><div>${v.channel}</div></div></div><button class="sub-btn" onclick="toggleSub('${v.channel}')">${subs[v.channel]?'Subscribed':'Subscribe'}</button></div><div class="vd-stats"><div class="stat-chip">👁 ${formatNum(v.views)}</div><div class="stat-chip">👍 ${formatNum(v.likes)}</div></div><div class="vd-actions"><button class="vd-act like-act" onclick="toggleLike('${v.id}')">${likedVideos[v.id]?'❤️ Liked':'🤍 Like'}</button><button class="vd-act save-act" onclick="toast('Saved')">🔖 Save</button><button class="vd-act share-act" onclick="shareVideo('${v.id}')">↗ Share</button></div>`;
}
function playVideo(){
  let ifr=document.getElementById('ytIframe');
  document.getElementById('fakePlay').style.display='none';
  ifr.style.display='block';
  let loopParam=loopActive?`&loop=1&playlist=${curVideoId}`:'';
  ifr.src=`${EMBED_BASE}${curVideoId}?autoplay=1&mute=0&rel=0&playsinline=1${ORIGIN}${loopParam}`;
}
function toggleLoop(){loopActive=!loopActive;document.getElementById('loopBtn').classList.toggle('ctrl-active',loopActive);showToast(loopActive?'Loop ON':'Loop OFF');if(document.getElementById('ytIframe').src)playVideo();}
function toggleHeadphone(){headphoneActive=!headphoneActive;document.getElementById('hdphBtn').classList.toggle('ctrl-active',headphoneActive);showToast(headphoneActive?'Headphone mode ON (bg audio)':'Headphone OFF');}
function toggleLike(id){if(likedVideos[id])delete likedVideos[id];else likedVideos[id]=true;saveLiked();}
function toggleSub(ch){if(subs[ch])delete subs[ch];else subs[ch]=true;saveSubs();}
function shareVideo(id){navigator.clipboard?.writeText(`https://youtu.be/${id}`);showToast('Link copied');}
async function openShortsPage(startIdx,specId=null){
  document.getElementById('shorts-page').style.display='block';
  document.getElementById('shorts-botnav').style.display='flex';
  document.getElementById('topnav').style.display='none';
  document.getElementById('botnav').style.display='none';
  document.getElementById('main').style.display='none';
  let items=await fetchEmbeddableShorts(currentCat);
  if(specId){let idx=items.findIndex(i=>i.id===specId);if(idx>0){let [it]=items.splice(idx,1);items.unshift(it);}}
  shortsPageData=items;
  renderShortsSlides();
  setTimeout(()=>{let slide=document.getElementById('ss-0');if(slide)slide.scrollIntoView();},100);
}
function renderShortsSlides(){
  let scroller=document.getElementById('shortsScroller');scroller.innerHTML='';
  shortsPageData.forEach((v,idx)=>{
    let slide=document.createElement('div');slide.className='s-slide';slide.id=`ss-${idx}`;
    slide.innerHTML=`
      <img class="s-bg-img" src="${v.thumb}">
      <div class="s-video-wrap" id="swrap-${idx}"><img src="${v.thumb}" style="width:100%;height:100%;object-fit:cover;"></div>
      <div class="s-play-overlay" id="playOverlay-${idx}" onclick="playShortVideo(${idx})"><div class="s-play-circle"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z" fill="white"/></svg></div></div>
      <div class="s-gradient"></div>
      <div class="s-info"><div class="s-ch-row"><div class="s-avatar" style="background:#ff0000">${v.channel[0]}</div><div class="s-ch-name">${v.channel}</div><button class="s-sub-btn ${subs[v.channel]?'subbed':''}" onclick="toggleSub('${v.channel}')">${subs[v.channel]?'Subscribed':'Subscribe'}</button></div><div class="s-title">${v.title}</div></div>
      <div class="s-actions"><button class="s-act-btn ${likedVideos[v.id]?'liked':''}" onclick="toggleLikeShort(${idx})"><div class="s-act-circle"><svg viewBox="0 0 24 24" fill="${likedVideos[v.id]?'#ff4444':'none'}" stroke="white"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></div><span>Like</span></button>
      <button class="s-act-btn" onclick="toast('Comments')"><div class="s-act-circle"><svg viewBox="0 0 24 24" fill="none" stroke="white"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div><span>Comment</span></button>
      <button class="s-act-btn" onclick="shareVideo('${v.id}')"><div class="s-act-circle"><svg viewBox="0 0 24 24" fill="none" stroke="white"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg></div><span>Share</span></button>
      <button class="s-act-btn" id="muteBtn-${idx}" onclick="toggleMuteShort(${idx})"><div class="s-act-circle"><svg viewBox="0 0 24 24" fill="none" stroke="white"><path d="M11 5L6 9H2v6h4l5 4V5zM15.54 8.46a5 5 0 0 1 0 7.07M19.07 4.93a10 10 0 0 1 0 14.14"/></svg></div><span>Mute</span></button></div>`;
    scroller.appendChild(slide);
  });
  if(shortsObserver)shortsObserver.disconnect();
  shortsObserver=new IntersectionObserver(entries=>{
    entries.forEach(entry=>{
      let idx=parseInt(entry.target.id.split('-')[1]);
      if(entry.isIntersecting){
        if(currentPlayingIdx!==idx)playShortVideo(idx);
      }else{
        let wrap=document.getElementById(`swrap-${idx}`);
        if(wrap&&wrap.querySelector('iframe')){wrap.querySelector('iframe').src='';wrap.innerHTML=`<img src="${shortsPageData[idx].thumb}" style="width:100%;height:100%;object-fit:cover;">`;}
        let overlay=document.getElementById(`playOverlay-${idx}`);
        if(overlay)overlay.style.display='flex';
        if(currentPlayingIdx===idx)currentPlayingIdx=-1;
      }
    });
  },{threshold:0.5});
  document.querySelectorAll('.s-slide').forEach(s=>shortsObserver.observe(s));
}
function playShortVideo(idx){
  if(currentPlayingIdx!==-1){
    let prevWrap=document.getElementById(`swrap-${currentPlayingIdx}`);
    if(prevWrap&&prevWrap.querySelector('iframe'))prevWrap.querySelector('iframe').src='';
    let prevOverlay=document.getElementById(`playOverlay-${currentPlayingIdx}`);
    if(prevOverlay)prevOverlay.style.display='flex';
  }
  let wrap=document.getElementById(`swrap-${idx}`);
  let overlay=document.getElementById(`playOverlay-${idx}`);
  if(!wrap)return;
  let v=shortsPageData[idx];
  wrap.innerHTML=`<iframe class="s-iframe" src="${EMBED_BASE}${v.id}?autoplay=1&mute=0&rel=0&playsinline=1${ORIGIN}" frameborder="0" allow="autoplay;encrypted-media" allowfullscreen></iframe>`;
  if(overlay)overlay.style.display='none';
  currentPlayingIdx=idx;
}
function toggleMuteShort(idx){
  let iframe=document.querySelector(`#swrap-${idx} iframe`);
  if(iframe){
    iframe.contentWindow?.postMessage(JSON.stringify({event:'command',func:iframe.muted?'unMute':'mute',args:''}),'*');
    iframe.muted=!iframe.muted;
    showToast(iframe.muted?'Muted':'Unmuted');
  }
}
function toggleLikeShort(idx){let v=shortsPageData[idx];if(likedVideos[v.id])delete likedVideos[v.id];else likedVideos[v.id]=true;saveLiked();renderShortsSlides();}
function leaveShorts(page){if(shortsObserver)shortsObserver.disconnect();document.getElementById('shorts-page').style.display='none';document.getElementById('shorts-botnav').style.display='none';document.getElementById('topnav').style.display='flex';document.getElementById('botnav').style.display='flex';document.getElementById('main').style.display='block';if(page)showPage(page);}
function refreshHome(){loadHomeFeed();showPage('home');}
function showPage(p){
  document.querySelectorAll('#home-page,#search-page,#player-page,#subs-page,#profile-page').forEach(el=>el.style.display='none');
  document.getElementById(`${p}-page`).style.display='block';
}
function goBack(){showPage('home');}
async function doSearch(){
  let q=document.getElementById('searchBigInput').value||document.getElementById('searchInput').value;
  if(!q)return;
  showPage('search');
  let res=document.getElementById('searchResults');
  res.innerHTML='<div class="loading-dots"><span></span><span></span><span></span></div>';
  let items=await fetchEmbeddableShorts(currentCat);
  let filtered=items.filter(v=>v.title.toLowerCase().includes(q.toLowerCase())||v.channel.toLowerCase().includes(q.toLowerCase()));
  if(currentMode==='ig')res.innerHTML=`<div class="shorts-grid" style="grid-template-columns:1fr 1fr 1fr;">${filtered.map(v=>`<div class="short-card" onclick="openShortsPage(0,'${v.id}')"><img src="${v.thumb}"><div class="short-card-info"><div class="short-card-title">${v.title.slice(0,40)}</div><div class="short-card-views">${formatNum(v.views)}</div></div></div>`).join('')}</div>`;
  else res.innerHTML=filtered.map(v=>`<div class="short-card" onclick="openShortsPage(0,'${v.id}')"><img src="${v.thumb}"><div class="short-card-info"><div class="short-card-title">${v.title.slice(0,50)}</div><div class="short-card-views">${formatNum(v.views)}</div></div></div>`).join('')||'<div style="padding:40px;text-align:center">No results</div>';
}
async function loadIgShorts(){let data=await fetchEmbeddableShorts(currentCat);let scroller=document.getElementById('igScroller');scroller.innerHTML='';data.forEach((v,i)=>{let slide=document.createElement('div');slide.className='ig-slide';slide.innerHTML=`<img class="ig-slide-bg" src="${v.thumb}"><div class="s-video-wrap" id="igwrap-${i}"><img src="${v.thumb}" style="width:100%;height:100%;object-fit:cover;"></div><div class="s-play-overlay" style="z-index:6;display:flex" onclick="playIgVideo(${i})"><div class="s-play-circle"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z" fill="white"/></svg></div></div><div class="ig-gradient"></div><div class="ig-info"><div class="ig-username">${v.channel}</div><div class="ig-caption">${v.title.slice(0,80)}</div><div class="ig-music-row"><svg width="12" viewBox="0 0 24 24" fill="white"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg><span>Original audio</span></div></div><div class="ig-actions"><div class="ig-act" onclick="toggleLikeShortIg(${i})"><div class="ig-act-icon"><svg viewBox="0 0 24 24" fill="none" stroke="white"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></div><span>${formatNum(v.likes)}</span></div><div class="ig-act" onclick="toast('Comments')"><div class="ig-act-icon"><svg viewBox="0 0 24 24" fill="none" stroke="white"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div><span>Comment</span></div><div class="ig-act" onclick="shareVideo('${v.id}')"><div class="ig-act-icon"><svg viewBox="0 0 24 24" fill="none" stroke="white"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg></div><span>Share</span></div><div class="ig-act"><div class="ig-music-disc-right"><svg width="20" viewBox="0 0 24 24" fill="white"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></div></div></div>`;scroller.appendChild(slide);});}
function playIgVideo(idx){let wrap=document.getElementById(`igwrap-${idx}`);if(!wrap)return;let v=shortsPageData[idx];wrap.innerHTML=`<iframe class="ig-iframe" src="${EMBED_BASE}${v.id}?autoplay=1&mute=0&rel=0&playsinline=1${ORIGIN}" frameborder="0" allow="autoplay;encrypted-media" allowfullscreen></iframe>`;let overlay=wrap.parentNode.querySelector('.s-play-overlay');if(overlay)overlay.style.display='none';}
function toggleLikeShortIg(idx){let v=shortsPageData[idx];if(likedVideos[v.id])delete likedVideos[v.id];else likedVideos[v.id]=true;saveLiked();loadIgShorts();}
async function loadTtShorts(){let data=await fetchEmbeddableShorts(currentCat);let scroller=document.getElementById('ttScroller');scroller.innerHTML='';data.forEach((v,i)=>{let slide=document.createElement('div');slide.className='tt-slide';slide.innerHTML=`<img class="tt-bg" src="${v.thumb}"><div class="s-video-wrap" id="ttwrap-${i}"><img src="${v.thumb}" style="width:100%;height:100%;object-fit:cover;"></div><div class="s-play-overlay" style="z-index:6;display:flex" onclick="playTtVideo(${i})"><div class="s-play-circle"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z" fill="white"/></svg></div></div><div class="tt-gradient"></div><div class="tt-info"><div class="tt-username">@${v.channel.replace(/\s/g,'')}</div><div class="tt-caption">${v.title.slice(0,70)}</div><div class="tt-music"><div class="tt-music-disc"><svg width="10" viewBox="0 0 24 24" fill="white"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></div><span>original sound</span></div></div><div class="tt-actions"><div class="tt-act" onclick="toggleLikeShortTt(${i})"><div class="tt-act-icon"><svg viewBox="0 0 24 24" fill="none" stroke="white"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></div><span>${formatNum(v.likes)}</span></div><div class="tt-act" onclick="toast('Comments')"><div class="tt-act-icon"><svg viewBox="0 0 24 24" fill="none" stroke="white"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div><span>Comment</span></div><div class="tt-act" onclick="shareVideo('${v.id}')"><div class="tt-act-icon"><svg viewBox="0 0 24 24" fill="none" stroke="white"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg></div><span>Share</span></div><div class="tt-avatar-wrap"><div class="tt-avatar" style="background:#ff0000">${v.channel[0]}</div><div class="tt-plus-badge"><svg viewBox="0 0 24 24" fill="none" stroke="white"><line x1="12" y1="4" x2="12" y2="20"/><line x1="4" y1="12" x2="20" y2="12"/></svg></div></div></div>`;scroller.appendChild(slide);});}
function playTtVideo(idx){let wrap=document.getElementById(`ttwrap-${idx}`);if(!wrap)return;let v=shortsPageData[idx];wrap.innerHTML=`<iframe class="tt-iframe" src="${EMBED_BASE}${v.id}?autoplay=1&mute=0&rel=0&playsinline=1${ORIGIN}" frameborder="0" allow="autoplay;encrypted-media" allowfullscreen></iframe>`;let overlay=wrap.parentNode.querySelector('.s-play-overlay');if(overlay)overlay.style.display='none';}
function toggleLikeShortTt(idx){let v=shortsPageData[idx];if(likedVideos[v.id])delete likedVideos[v.id];else likedVideos[v.id]=true;saveLiked();loadTtShorts();}
function initCatStrip(){
  let strip=document.getElementById('catStrip');
  let cats=['All','Music','Song','Funny','Motivation','Skill','Gaming','News','Tech','Sports','Travel','Food','Animals','Fashion','Education','Cartoon'];
  strip.innerHTML=cats.map(c=>`<div class="cat-chip ${c===currentCat?'active':''}" onclick="changeCat('${c}')">${c}</div>`).join('');
}
function changeCat(cat){currentCat=cat;initCatStrip();loadHomeFeed();}
function retryLoad(){if(navigator.onLine){document.getElementById('no-internet').style.display='none';loadHomeFeed();}else showToast('Still offline');}
window.addEventListener('load',()=>{
  document.getElementById('splash').style.display='flex';
  setTimeout(()=>{document.getElementById('splash').classList.add('hide');setTimeout(()=>document.getElementById('splash').style.display='none',400);},2300);
  initCatStrip();loadHomeFeed();buildPlatformDropdown();
});
function buildPlatformDropdown(){
  let dd=document.getElementById('platform-dropdown');
  dd.innerHTML=`<div class="pd-item" onclick="selectPlatform('yt')"><div class="pd-logo yt"><svg width="14" viewBox="0 0 24 24" fill="white"><path d="M19.6 3H4.4C2.5 3 1 4.5 1 6.4v11.2C1 19.5 2.5 21 4.4 21h15.2c1.9 0 3.4-1.5 3.4-3.4V6.4C23 4.5 21.5 3 19.6 3z"/></svg></div><span>YouTube Style</span></div><div class="pd-item" onclick="selectPlatform('ig')"><div class="pd-logo ig"><svg width="12" viewBox="0 0 24 24" fill="none" stroke="white"><rect x="2" y="2" width="20" height="20" rx="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg></div><span>Instagram Style</span></div><div class="pd-item" onclick="selectPlatform('tt')"><div class="pd-logo tt"><svg width="12" viewBox="0 0 24 24" fill="white"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.28 6.28 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.34-6.34V8.69a8.14 8.14 0 0 0 4.77 1.52V6.74a4.85 4.85 0 0 1-1.01-.05z"/></svg></div><span>TikTok Style</span></div>`;
}
window.onerror=function(){};
