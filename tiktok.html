<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Shorts – Unlimited</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #app {
      width: 100%;
      max-width: 430px;
      height: 100%;
      background: #000;
      position: relative;
      overflow: hidden;
    }

    .feed {
      height: 100%;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
    }
    .feed::-webkit-scrollbar {
      display: none;
    }

    .short {
      height: 100%;
      width: 100%;
      scroll-snap-align: start;
      position: relative;
      background: #000;
    }

    .video-wrapper {
      position: absolute;
      inset: 0;
      z-index: 1;
      background: #000;
    }
    .video-wrapper iframe {
      width: 100%;
      height: 100%;
      border: none;
      pointer-events: none;
    }

    .gradient {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0.5) 0%, transparent 30%, transparent 60%, rgba(0,0,0,0.7) 100%);
      z-index: 2;
      pointer-events: none;
    }

    .play-pause-icon {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 70px;
      height: 70px;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }
    .play-pause-icon.show {
      opacity: 1;
    }

    .right-actions {
      position: absolute;
      right: 12px;
      bottom: 100px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
      z-index: 15;
    }
    .action-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      transition: transform 0.1s;
    }
    .action-btn:active {
      transform: scale(0.92);
    }
    .action-icon {
      width: 48px;
      height: 48px;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .action-count {
      font-size: 11px;
      font-weight: 600;
      color: white;
      text-shadow: 0 1px 2px rgba(0,0,0,0.5);
    }

    .avatar-wrap {
      position: relative;
      margin-bottom: 4px;
    }
    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 2px solid white;
      object-fit: cover;
      background: #333;
    }
    .follow-dot {
      position: absolute;
      bottom: -6px;
      left: 50%;
      transform: translateX(-50%);
      width: 22px;
      height: 22px;
      background: #fe2c55;
      border-radius: 50%;
      border: 2px solid black;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: white;
      cursor: pointer;
    }
    .follow-dot.done {
      background: #25f4ee;
      font-size: 10px;
    }

    .music-disc {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(0,0,0,0.5);
      border: 2px solid rgba(255,255,255,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: spin 4s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .music-inner {
      width: 14px;
      height: 14px;
      background: white;
      border-radius: 50%;
    }

    .bottom-info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 12px 12px 80px;
      z-index: 12;
    }
    .user-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .mini-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      object-fit: cover;
      background: #333;
    }
    .username {
      font-size: 14px;
      font-weight: 700;
      color: white;
      text-shadow: 0 1px 2px rgba(0,0,0,0.5);
    }
    .subscribe-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.8);
      color: white;
      font-size: 11px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 4px;
      margin-left: 8px;
      cursor: pointer;
    }
    .subscribe-btn.subscribed {
      border-color: rgba(255,255,255,0.3);
      color: rgba(255,255,255,0.5);
    }
    .caption {
      font-size: 13px;
      line-height: 1.4;
      color: white;
      margin-bottom: 6px;
      text-shadow: 0 1px 2px rgba(0,0,0,0.5);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .music-name {
      font-size: 11px;
      color: rgba(255,255,255,0.85);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .progress-bar {
      position: absolute;
      bottom: 70px;
      left: 0;
      right: 0;
      height: 2px;
      background: rgba(255,255,255,0.2);
      z-index: 13;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: rgba(255,255,255,0.8);
    }

    .bottom-nav {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 68px;
      background: rgba(0,0,0,0.95);
      backdrop-filter: blur(20px);
      border-top: 0.5px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: space-around;
      z-index: 100;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      cursor: pointer;
    }
    .nav-item span {
      font-size: 10px;
      color: #888;
    }
    .nav-item.active span {
      color: white;
    }

    .toast {
      position: absolute;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(30,30,30,0.95);
      color: white;
      font-size: 13px;
      font-weight: 500;
      padding: 8px 18px;
      border-radius: 40px;
      z-index: 200;
      opacity: 0;
      transition: all 0.2s;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .loader {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }
    .spinner {
      width: 44px;
      height: 44px;
      border: 4px solid rgba(255,255,255,0.1);
      border-top-color: #fe2c55;
      border-radius: 50%;
      animation: spinLoader 0.7s linear infinite;
    }
    @keyframes spinLoader {
      to { transform: rotate(360deg); }
    }
    .loader p {
      color: rgba(255,255,255,0.5);
      font-size: 14px;
    }
  </style>
</head>
<body>
<div id="app">
  <div class="feed" id="feedContainer">
    <div class="loader">
      <div class="spinner"></div>
      <p>Loading shorts...</p>
    </div>
  </div>
  <div class="bottom-nav">
    <div class="nav-item active" onclick="alert('Home')">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M3 12L12 3L21 12V20a1 1 0 01-1 1H4a1 1 0 01-1-1V12z"/></svg>
      <span>Home</span>
    </div>
    <div class="nav-item" onclick="alert('Search')">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg>
      <span>Search</span>
    </div>
    <div class="nav-item" onclick="alert('Create')">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      <span>Create</span>
    </div>
    <div class="nav-item" onclick="alert('Inbox')">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
      <span>Inbox</span>
    </div>
    <div class="nav-item" onclick="alert('Profile')">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      <span>Profile</span>
    </div>
  </div>
  <div class="toast" id="toastMsg"></div>
</div>

<script>
  // ==============================================================
  // NO GOOGLE API – Uses Piped API + Fallback (never fails)
  // ==============================================================
  
  // Hardcoded fallback IDs (100% guaranteed to work)
  const FALLBACK_IDS = [
    'dQw4w9WgXcQ', 'M7lc1UVf-VE', 'kJQP7kiw5Fk', '9bZkp7q19f0',
    'hT_nvWreIhg', 'jNQXAC9IVRw', 'fRh_vgS2dFE', 'hTWKbfoikeg',
    'LsoLEjrDogU', '2Vv-BfVoq4g', 'CevxZvSJLk8', 'sON68ibZxs0',
    'LXb3EKWsInQ', 'C0DPdy98e4c', 'YQHsXMglC9A', 'pRpeEdMmmQ0'
  ];

  // Piped API instances (no key, no quota)
  const PIPED_INSTANCES = [
    'https://pipedapi.kavin.rocks',
    'https://pipedapi.adminforge.de',
    'https://piped-api.garudalinux.org',
    'https://api.piped.yt'
  ];

  let videosData = [];
  let currentPlayingPlayer = null;
  let activePostElement = null;

  function formatNumber(num) {
    if (num === undefined) return '0';
    let n = parseInt(num);
    if (isNaN(n)) return '0';
    if (n >= 1e6) return (n/1e6).toFixed(1).replace('.0','') + 'M';
    if (n >= 1e3) return (n/1e3).toFixed(0) + 'K';
    return n.toString();
  }

  function getAvatar(name) {
    return `https://ui-avatars.com/api/?name=${encodeURIComponent(name||'YT')}&background=fe2c55&color=fff&size=100`;
  }

  function getThumb(id) {
    return `https://i.ytimg.com/vi/${id}/hqdefault.jpg`;
  }

  function showToast(msg) {
    const toast = document.getElementById('toastMsg');
    clearTimeout(window.toastTimer);
    toast.innerText = msg;
    toast.classList.add('show');
    window.toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
  }

  // Fetch videos from Piped API (no key)
  async function fetchPipedVideos() {
    for (const base of PIPED_INSTANCES) {
      try {
        const url = `${base}/trending?region=IN`;
        const res = await fetch(url, { signal: AbortSignal.timeout(8000) });
        if (!res.ok) continue;
        const data = await res.json();
        if (!Array.isArray(data) || data.length === 0) continue;
        
        // Extract video IDs from trending items
        const videos = [];
        for (const item of data.slice(0, 15)) {
          let id = '';
          const urlMatch = item.url || '';
          if (urlMatch.includes('watch?v=')) {
            id = urlMatch.split('watch?v=')[1]?.split('&')[0];
          } else if (urlMatch.includes('youtu.be/')) {
            id = urlMatch.split('youtu.be/')[1]?.split('?')[0];
          }
          if (id && id.length === 11) {
            videos.push({
              id: id,
              title: item.title || 'Trending Short',
              channel: item.uploaderName || 'Creator',
              views: formatNumber(item.views || Math.floor(Math.random()*5000000)+100000),
              likes: formatNumber(Math.floor(Math.random()*500000)+10000),
              comments: formatNumber(Math.floor(Math.random()*50000)+1000),
              thumb: item.thumbnail || getThumb(id)
            });
          }
        }
        if (videos.length >= 5) return videos;
      } catch(e) { /* try next */ }
    }
    return null;
  }

  // Build fallback videos (always works)
  function buildFallbackVideos() {
    const titles = [
      '🔥 This is going VIRAL!','😱 You won\'t believe this!','😂 POV: That one friend',
      '✨ Satisfying video','🎉 Best moment ever','👀 Watch till the end',
      '📈 Trending now','🌟 Made my day','😮 Incredible','🎸 Crazy talent',
      '🎶 Weekend vibes','💀 Internet gold','🤯 Mind blowing','💛 Pure happiness'
    ];
    const channels = ['ViralWorld','TrendHub','DailyFun','ShortClips','WowMoments',
      'JoyVibes','QuickFlix','HitShorts','CoolTube','TopViral'];
    return FALLBACK_IDS.slice(0,15).map((id,i) => ({
      id, title: titles[i%titles.length], channel: channels[i%channels.length],
      views: formatNumber(Math.floor(Math.random()*50000000)+100000),
      likes: formatNumber(Math.floor(Math.random()*5000000)+10000),
      comments: formatNumber(Math.floor(Math.random()*200000)+1000),
      thumb: getThumb(id)
    }));
  }

  // Build HTML for a short
  function buildShortHTML(v, index) {
    const avatar = getAvatar(v.channel);
    const shortTitle = v.title.length > 80 ? v.title.slice(0,80)+'...' : v.title;
    return `
      <div class="short" data-id="${v.id}" data-index="${index}">
        <div class="video-wrapper" id="wrapper_${index}"></div>
        <div class="gradient"></div>
        <div class="play-pause-icon" id="playIcon_${index}">
          <svg width="30" height="30" viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg>
        </div>
        
        <div class="right-actions">
          <div class="avatar-wrap">
            <img class="avatar" src="${avatar}" onerror="this.src='${getAvatar(v.channel)}'">
            <div class="follow-dot" data-follow="false" onclick="event.stopPropagation();toggleFollow(this)">+</div>
          </div>
          <div class="action-btn" onclick="event.stopPropagation();likeVideo(this, '${v.id}', '${v.title.replace(/'/g, "\\'")}', '${v.channel.replace(/'/g, "\\'")}', '${v.thumb}')">
            <div class="action-icon">
              <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
                <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
              </svg>
            </div>
            <span class="action-count">${v.likes}</span>
          </div>
          <div class="action-btn" onclick="event.stopPropagation();shareVideo('${v.id}')">
            <div class="action-icon">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
                <path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8M16 6l-4-4-4 4M12 2v13"/>
              </svg>
            </div>
            <span class="action-count">Share</span>
          </div>
          <div class="action-btn" onclick="event.stopPropagation();alert('Comments coming soon')">
            <div class="action-icon">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
                <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
              </svg>
            </div>
            <span class="action-count">${v.comments}</span>
          </div>
          <div class="music-disc">
            <div class="music-inner"></div>
          </div>
        </div>
        
        <div class="bottom-info">
          <div class="user-row">
            <img class="mini-avatar" src="${avatar}" onerror="this.src='${getAvatar(v.channel)}'">
            <div class="username">
              @${v.channel.replace(/\s/g,'').toLowerCase().slice(0,18)}
              <button class="subscribe-btn" onclick="event.stopPropagation();toggleSubscribe(this, '${v.channel.replace(/'/g, "\\'")}')">Subscribe</button>
            </div>
          </div>
          <div class="caption">${shortTitle}</div>
          <div class="music-name">♪ ${v.channel} · ${v.views} views</div>
        </div>
        
        <div class="progress-bar">
          <div class="progress-fill" id="progress_${index}"></div>
        </div>
      </div>
    `;
  }

  // Create YouTube iframe player
  function createPlayer(videoId, wrapperId, index) {
    const wrapper = document.getElementById(wrapperId);
    if (!wrapper) return null;
    wrapper.innerHTML = '';
    const iframe = document.createElement('iframe');
    iframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=0&mute=1&loop=1&playlist=${videoId}&playsinline=1&controls=0&modestbranding=1&rel=0&enablejsapi=1`;
    iframe.allow = 'autoplay; encrypted-media; picture-in-picture';
    iframe.style.width = '100%';
    iframe.style.height = '100%';
    iframe.style.border = 'none';
    iframe.style.pointerEvents = 'none';
    wrapper.appendChild(iframe);
    
    const player = {
      element: iframe,
      play: () => iframe.contentWindow?.postMessage('{"event":"command","func":"playVideo","args":""}', '*'),
      pause: () => iframe.contentWindow?.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*')
    };
    const shortDiv = document.querySelector(`.short[data-index="${index}"]`);
    if (shortDiv) shortDiv.player = player;
    return player;
  }

  // Intersection Observer for autoplay/pause
  function setupObserver() {
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        const short = entry.target;
        const index = short.getAttribute('data-index');
        const wrapperId = `wrapper_${index}`;
        const videoId = short.getAttribute('data-id');
        
        if (entry.isIntersecting) {
          if (!short.player) {
            const player = createPlayer(videoId, wrapperId, index);
            short.player = player;
            setTimeout(() => { if (short.player) short.player.play(); }, 200);
          } else {
            short.player.play();
          }
          const icon = short.querySelector('.play-pause-icon');
          if (icon) icon.classList.remove('show');
        } else {
          if (short.player) short.player.pause();
        }
      });
    }, { threshold: 0.6 });
    
    document.querySelectorAll('.short').forEach(short => observer.observe(short));
  }

  // Tap to pause/play
  function attachTapHandler() {
    document.querySelectorAll('.short').forEach(short => {
      short.addEventListener('click', (e) => {
        if (e.target.closest('.action-btn') || e.target.closest('.follow-dot') || e.target.closest('.subscribe-btn')) return;
        if (!short.player) return;
        const icon = short.querySelector('.play-pause-icon');
        if (!short.isPlaying) {
          short.player.play();
          short.isPlaying = true;
          icon.classList.remove('show');
        } else {
          short.player.pause();
          short.isPlaying = false;
          icon.classList.add('show');
          setTimeout(() => icon.classList.remove('show'), 800);
        }
      });
    });
  }

  // Like functionality
  function likeVideo(btn, videoId, title, channel, thumb) {
    const svgPath = btn.querySelector('svg path');
    const countSpan = btn.querySelector('.action-count');
    let current = parseInt(countSpan.innerText.replace(/[KM]/g, '')) *
      (countSpan.innerText.includes('K') ? 1000 : (countSpan.innerText.includes('M') ? 1000000 : 1));
    const liked = JSON.parse(localStorage.getItem('liked_shorts') || '[]');
    const already = liked.includes(videoId);
    if (!already) {
      svgPath.setAttribute('fill', '#fe2c55');
      svgPath.setAttribute('stroke', '#fe2c55');
      current++;
      countSpan.innerText = formatNumber(current);
      liked.push(videoId);
      localStorage.setItem('liked_shorts', JSON.stringify(liked));
      showToast('❤️ Liked!');
    } else {
      svgPath.setAttribute('fill', 'none');
      svgPath.setAttribute('stroke', 'white');
      current--;
      countSpan.innerText = formatNumber(current);
      const filtered = liked.filter(id => id !== videoId);
      localStorage.setItem('liked_shorts', JSON.stringify(filtered));
      showToast('💔 Removed like');
    }
  }

  function shareVideo(videoId) {
    const url = `https://www.youtube.com/shorts/${videoId}`;
    if (navigator.share) navigator.share({ title: 'Check this Short!', url });
    else {
      navigator.clipboard.writeText(url);
      showToast('🔗 Link copied!');
    }
  }

  function toggleFollow(el) {
    const done = el.classList.contains('done');
    if (!done) {
      el.classList.add('done');
      el.innerHTML = '✓';
      showToast('✅ Following!');
    } else {
      el.classList.remove('done');
      el.innerHTML = '+';
      showToast('❌ Unfollowed');
    }
  }

  function toggleSubscribe(btn, channelName) {
    const sub = btn.classList.contains('subscribed');
    if (!sub) {
      btn.classList.add('subscribed');
      btn.innerText = 'Subscribed';
      showToast(`✅ Subscribed to ${channelName}`);
    } else {
      btn.classList.remove('subscribed');
      btn.innerText = 'Subscribe';
      showToast(`❌ Unsubscribed from ${channelName}`);
    }
  }

  function restoreLikedStates() {
    const liked = JSON.parse(localStorage.getItem('liked_shorts') || '[]');
    document.querySelectorAll('.action-btn').forEach(btn => {
      const svg = btn.querySelector('svg path');
      if (!svg) return;
      const short = btn.closest('.short');
      if (short && liked.includes(short.getAttribute('data-id'))) {
        svg.setAttribute('fill', '#fe2c55');
        svg.setAttribute('stroke', '#fe2c55');
      }
    });
  }

  // Load feed
  async function loadFeed() {
    const container = document.getElementById('feedContainer');
    container.innerHTML = '<div class="loader"><div class="spinner"></div><p>Loading shorts...</p></div>';
    
    let videos = await fetchPipedVideos();
    if (!videos || videos.length === 0) {
      videos = buildFallbackVideos();
    }
    videosData = videos;
    container.innerHTML = videos.map((v, i) => buildShortHTML(v, i)).join('');
    
    setupObserver();
    attachTapHandler();
    restoreLikedStates();
  }

  loadFeed();
</script>
</body>
</html>
