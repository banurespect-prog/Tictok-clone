<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Anskinge — Shorts • Reels • TikTok Style</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #0f0f0f;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
      color: #fff;
      overflow: hidden;
      height: 100vh;
      width: 100%;
      max-width: 430px;
      margin: 0 auto;
      position: relative;
    }

    /* splash screen */
    #splash {
      position: fixed;
      inset: 0;
      background: #0f0f0f;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      transition: opacity 0.45s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      backdrop-filter: blur(2px);
    }

    .splash-logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .splash-icon {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: #ff0000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .splash-icon svg {
      width: 28px;
      height: 28px;
      fill: white;
    }

    .splash-text {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .splash-text em {
      color: #ff0000;
      font-style: normal;
    }

    .splash-line {
      width: 200px;
      height: 3px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 4px;
      overflow: hidden;
    }

    .splash-progress {
      width: 0%;
      height: 100%;
      background: #ff0000;
      border-radius: 4px;
      animation: loadingProgress 2.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes loadingProgress {
      0% { width: 0%; }
      30% { width: 35%; }
      70% { width: 75%; }
      100% { width: 100%; }
    }

    .hide-splash {
      opacity: 0;
      pointer-events: none;
    }

    /* no internet */
    #no-internet {
      position: fixed;
      inset: 0;
      background: #0f0f0f;
      z-index: 10000;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      text-align: center;
      padding: 20px;
    }

    .retry-btn {
      background: #ff0000;
      border: none;
      padding: 12px 28px;
      border-radius: 40px;
      color: white;
      font-weight: bold;
      font-size: 15px;
      display: flex;
      gap: 8px;
      align-items: center;
      cursor: pointer;
    }

    /* common */
    button {
      font-family: inherit;
    }

    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: #2c2c2c;
      color: white;
      padding: 10px 20px;
      border-radius: 40px;
      font-size: 13px;
      z-index: 10001;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      white-space: nowrap;
    }

    /* youtube main layout */
    #main-container {
      position: relative;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .top-nav {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: #0f0f0f;
      border-bottom: 1px solid #2a2a2a;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }

    .logo-icon {
      width: 28px;
      height: 20px;
      background: #ff0000;
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icon svg {
      width: 14px;
      fill: white;
    }

    .logo-text {
      font-weight: 800;
      font-size: 18px;
    }

    .logo-text em {
      color: #ff0000;
    }

    .search-bar {
      flex: 1;
      background: #1e1e1e;
      border-radius: 28px;
      display: flex;
      align-items: center;
      padding: 6px 12px;
      border: 1px solid #2c2c2c;
    }

    .search-bar input {
      flex: 1;
      background: transparent;
      border: none;
      color: white;
      font-size: 13px;
      outline: none;
    }

    .search-bar button {
      background: none;
      border: none;
      color: #aaa;
      cursor: pointer;
    }

    .platform-arrow {
      cursor: pointer;
      padding: 6px;
    }

    /* categories strip */
    .cat-strip {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 10px 12px;
      background: #0f0f0f;
      border-bottom: 1px solid #222;
      scrollbar-width: none;
    }

    .cat-chip {
      background: #1f1f1f;
      padding: 6px 18px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      cursor: pointer;
      transition: 0.2s;
      border: 1px solid #2c2c2c;
    }

    .cat-chip.active {
      background: white;
      color: black;
      border-color: white;
    }

    /* shorts grid 2 cols */
    .shorts-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 12px;
    }

    .short-card {
      aspect-ratio: 9/16;
      border-radius: 12px;
      overflow: hidden;
      background: #1a1a1a;
      position: relative;
      cursor: pointer;
    }

    .short-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .short-info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
      padding: 18px 6px 6px;
    }

    .short-title {
      font-size: 11px;
      font-weight: 600;
    }

    /* long video card */
    .video-card {
      margin-bottom: 12px;
      cursor: pointer;
    }

    .thumb-wrap {
      aspect-ratio: 16/9;
      background: #1a1a1a;
      position: relative;
    }

    .thumb-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .duration {
      position: absolute;
      bottom: 6px;
      right: 6px;
      background: rgba(0,0,0,0.8);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 11px;
    }

    .video-meta {
      display: flex;
      gap: 10px;
      padding: 10px 12px;
    }

    .channel-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #ff4757;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }

    /* shorts fullscreen */
    #shorts-full {
      position: fixed;
      inset: 0;
      background: black;
      z-index: 2000;
      display: none;
      flex-direction: column;
    }

    .shorts-scroll {
      flex: 1;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      height: 100%;
    }

    .shorts-slide {
      scroll-snap-align: start;
      height: 100vh;
      position: relative;
      background: black;
    }

    .shorts-iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .shorts-info-bottom {
      position: absolute;
      bottom: 80px;
      left: 16px;
      right: 70px;
      z-index: 10;
    }

    .shorts-actions {
      position: absolute;
      right: 12px;
      bottom: 100px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      z-index: 10;
    }

    .shorts-act {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
    }

    /* instagram & tiktok modes */
    .platform-page {
      position: fixed;
      inset: 0;
      background: black;
      z-index: 1000;
      display: none;
      flex-direction: column;
    }

    .vertical-feed {
      flex: 1;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
    }

    .feed-item {
      scroll-snap-align: start;
      height: 100vh;
      position: relative;
      background: black;
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      max-width: 430px;
      margin: auto;
      background: rgba(15,15,15,0.96);
      backdrop-filter: blur(12px);
      display: flex;
      justify-content: space-around;
      padding: 8px 0 16px;
      border-top: 1px solid #2a2a2a;
      z-index: 1100;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      font-size: 10px;
      color: #aaa;
      cursor: pointer;
      font-weight: 600;
    }

    .nav-item.active {
      color: white;
    }

    .plus-button {
      background: linear-gradient(135deg, #3b82f6, #a855f7);
      width: 44px;
      height: 30px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>

<!-- SHORTS FULLSCREEN CONTAINER (youtube style) -->
<div id="shortsFullscreen">
  <div id="shortsScroller" style="height: 100%; overflow-y: scroll; scroll-snap-type: y mandatory;"></div>
  <div id="shortsCloseBtn" style="position: fixed; top: 12px; left: 12px; z-index: 2001; background: rgba(0,0,0,0.6); border-radius: 30px; padding: 8px 12px; cursor: pointer;">← Exit</div>
</div>

<div class="toast" id="toastMsg"></div>

<script>
  const API_KEY = "AIzaSyAXmWdEwssA7_NUJGJCQqR60fzrFpZ-mfI";
  let currentPlatform = "yt"; // yt, ig, tt
  let currentCat = "All";
  let shortsData = [];
  let longVideos = [];
  let nextPageToken = "";
  let isLoading = false;
  let activeShortsSlide = null;
  let currentIframePlayers = {}; // control audio per slide

  const CATEGORIES = ["All","Music","Song","Funny","Motivation","Gaming","Sports","Travel","Food","Animals","Tech"];
  const CAT_QUERIES = {
    All: ["popular videos","trending now","viral clips"], Music:["music video","song 2024"], Funny:["funny moments","comedy"], Motivation:["motivational speech"], Gaming:["gaming highlights"], Sports:["sports","cricket"], Travel:["travel vlog"], Food:["cooking","food"], Animals:["cute animals"], Tech:["technology"]
  };

  function showToast(msg) {
    const t = document.getElementById("toastMsg");
    t.innerText = msg;
    t.style.opacity = "1";
    setTimeout(() => t.style.opacity = "0", 2000);
  }

  async function youtubeFetch(url) {
    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error(`API err ${res.status}`);
      return await res.json();
    } catch (e) {
      if (!navigator.onLine) document.getElementById("no-internet").style.display = "flex";
      console.warn(e);
      return null;
    }
  }

  async function fetchShorts(category, limit = 20) {
    const queries = CAT_QUERIES[category] || CAT_QUERIES["All"];
    const randomQuery = queries[Math.floor(Math.random() * queries.length)] + " shorts";
    const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&videoDuration=short&maxResults=${limit}&q=${encodeURIComponent(randomQuery)}&key=${API_KEY}`;
    const data = await youtubeFetch(url);
    if (!data || !data.items) return [];
    return data.items.filter(i => i.id.videoId).map(i => ({
      id: i.id.videoId,
      title: i.snippet.title,
      channel: i.snippet.channelTitle,
      thumb: i.snippet.thumbnails.medium?.url || i.snippet.thumbnails.default?.url,
      views: Math.floor(Math.random() * 5000000 + 20000),
      likes: Math.floor(Math.random() * 300000 + 500)
    }));
  }

  async function fetchLongVideos(category, pageToken = "") {
    const queries = CAT_QUERIES[category] || CAT_QUERIES["All"];
    const q = queries[Math.floor(Math.random() * queries.length)];
    let url = `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&videoDuration=medium&maxResults=8&q=${encodeURIComponent(q)}&key=${API_KEY}`;
    if (pageToken) url += `&pageToken=${pageToken}`;
    const data = await youtubeFetch(url);
    if (!data || !data.items) return { items: [], nextToken: "" };
    const items = data.items.filter(i => i.id.videoId).map(i => ({
      id: i.id.videoId, title: i.snippet.title, channel: i.snippet.channelTitle,
      thumb: i.snippet.thumbnails.high?.url || i.snippet.thumbnails.medium?.url,
      duration: "2:34", views: Math.floor(Math.random() * 900000 + 5000)
    }));
    return { items, nextToken: data.nextPageToken || "" };
  }

  async function loadHomeData() {
    document.getElementById("shortsGrid").innerHTML = `<div style="grid-column:1/-1; text-align:center;">loading shorts...</div>`;
    shortsData = await fetchShorts(currentCat);
    renderShortsGrid();
    const longRes = await fetchLongVideos(currentCat);
    longVideos = longRes.items;
    nextPageToken = longRes.nextToken;
    renderLongVideos();
  }

  function renderShortsGrid() {
    const grid = document.getElementById("shortsGrid");
    grid.innerHTML = "";
    shortsData.slice(0, 6).forEach((s, idx) => {
      const card = document.createElement("div");
      card.className = "short-card";
      card.innerHTML = `<img src="${s.thumb}" loading="lazy"><div class="short-info"><div class="short-title">${s.title.slice(0, 55)}</div><div>👁 ${formatNumber(s.views)}</div></div>`;
      card.onclick = () => openShortsFullscreen(idx);
      grid.appendChild(card);
    });
  }

  function renderLongVideos() {
    const container = document.getElementById("longFeed");
    container.innerHTML = "";
    longVideos.forEach(v => {
      const div = document.createElement("div");
      div.className = "video-card";
      div.innerHTML = `<div class="thumb-wrap"><img src="${v.thumb}"><div class="duration">${v.duration}</div></div>
      <div class="video-meta"><div class="channel-avatar">${v.channel[0]}</div><div><div>${v.title.slice(0, 60)}</div><div style="font-size:12px; color:#aaa;">${v.channel} • ${formatNumber(v.views)} views</div></div></div>`;
      div.onclick = () => playLongVideo(v.id, v.title);
      container.appendChild(div);
    });
  }

  function formatNumber(n) { if (n > 1e6) return (n/1e6).toFixed(1)+"M"; if (n>1e3) return (n/1e3).toFixed(0)+"K"; return n; }

  async function changeCategory(cat) {
    currentCat = cat;
    document.querySelectorAll(".cat-chip").forEach(ch => ch.classList.toggle("active", ch.innerText === cat));
    await loadHomeData();
  }

  function setupCategories() {
    const strip = document.getElementById("categoryStrip");
    strip.innerHTML = "";
    CATEGORIES.forEach(c => {
      const chip = document.createElement("div");
      chip.className = `cat-chip ${c === currentCat ? "active" : ""}`;
      chip.innerText = c;
      chip.onclick = () => changeCategory(c);
      strip.appendChild(chip);
    });
  }

  // SHORTS FULLSCREEN (swipe, only one audio)
  async function openShortsFullscreen(startIndex) {
    if (!shortsData.length) return;
    const container = document.getElementById("shortsScroller");
    container.innerHTML = "";
    for (let i = 0; i < shortsData.length; i++) {
      const s = shortsData[i];
      const slide = document.createElement("div");
      slide.className = "shorts-slide";
      slide.setAttribute("data-id", s.id);
      slide.innerHTML = `<iframe class="shorts-iframe" allow="autoplay; accelerometer; clipboard-write; encrypted-media; gyroscope; picture-in-picture" frameborder="0" src="https://www.youtube.com/embed/${s.id}?enablejsapi=1&autoplay=0&mute=1&controls=0&modestbranding=1&rel=0"></iframe>
      <div class="shorts-info-bottom"><div style="font-weight: bold;">${s.channel}</div><div style="font-size:12px;">${s.title.slice(0,70)}</div></div>
      <div class="shorts-actions"><div class="shorts-act" data-like><span>❤️</span><span>${formatNumber(s.likes)}</span></div><div class="shorts-act" data-comment><span>💬</span><span>${Math.floor(s.likes/10)}</span></div><div class="shorts-act" data-sound><span>🔊</span></div></div>`;
      container.appendChild(slide);
    }
    document.getElementById("shortsFullscreen").style.display = "flex";
    setTimeout(() => {
      const slides = document.querySelectorAll(".shorts-slide");
      if (slides[startIndex]) slides[startIndex].scrollIntoView();
      playVisibleShort();
    }, 100);
    const scroller = document.getElementById("shortsScroller");
    scroller.onscroll = () => { playVisibleShort(); };
  }

  function playVisibleShort() {
    const container = document.getElementById("shortsScroller");
    const slides = Array.from(container.querySelectorAll(".shorts-slide"));
    let visibleId = null;
    for (let slide of slides) {
      const rect = slide.getBoundingClientRect();
      if (rect.top >= -100 && rect.top <= 200) {
        visibleId = slide.getAttribute("data-id");
        break;
      }
    }
    slides.forEach(slide => {
      const iframe = slide.querySelector("iframe");
      const vid = slide.getAttribute("data-id");
      if (vid === visibleId && iframe && !iframe.src.includes("autoplay=1")) {
        iframe.src = `https://www.youtube.com/embed/${vid}?enablejsapi=1&autoplay=1&mute=0&controls=0&modestbranding=1&rel=0`;
      } else if (vid !== visibleId && iframe && iframe.src.includes("autoplay=1")) {
        iframe.src = `https://www.youtube.com/embed/${vid}?enablejsapi=1&autoplay=0&mute=1&controls=0`;
      }
    });
  }

  document.getElementById("shortsCloseBtn").onclick = () => {
    document.getElementById("shortsFullscreen").style.display = "none";
    const frames = document.querySelectorAll("#shortsScroller iframe");
    frames.forEach(f => f.src = "about:blank");
  };

  function playLongVideo(id, title) {
    window.open(`https://www.youtube.com/watch?v=${id}`, "_blank");
    showToast("▶️ Opening YouTube video");
  }

  // SEARCH (ONLY SHORTS, 3-COLUMN GRID)
  async function performSearch(query) {
    if (!query.trim()) return;
    const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&videoDuration=short&maxResults=21&q=${encodeURIComponent(query)}&key=${API_KEY}`;
    const data = await youtubeFetch(url);
    if (!data || !data.items) { showToast("No results or API limit"); return; }
    const results = data.items.filter(i => i.id.videoId).map(i => ({ id: i.id.videoId, title: i.snippet.title, thumb: i.snippet.thumbnails.medium?.url, channel: i.snippet.channelTitle }));
    const grid = document.getElementById("searchShortsGrid");
    grid.innerHTML = "";
    results.forEach(r => {
      const card = document.createElement("div");
      card.style.aspectRatio = "9/16";
      card.style.background = "#1a1a1a";
      card.style.borderRadius = "12px";
      card.style.overflow = "hidden";
      card.style.cursor = "pointer";
      card.innerHTML = `<img src="${r.thumb}" style="width:100%; height:100%; object-fit:cover;"><div style="padding:4px; font-size:10px;">${r.title.slice(0,40)}</div>`;
      card.onclick = () => { window.open(`https://www.youtube.com/shorts/${r.id}`, "_blank"); };
      grid.appendChild(card);
    });
    document.getElementById("ytHome").style.display = "none";
    document.getElementById("searchPage").style.display = "flex";
  }

  // PLATFORM SWITCH: INSTAGRAM & TIKTOK (fetch shorts feed)
  async function loadIgFeed() {
    const feed = document.getElementById("igFeed");
    feed.innerHTML = "<div style='text-align:center; padding:40px'>Loading reels...</div>";
    const reels = await fetchShorts("All", 10);
    feed.innerHTML = "";
    reels.forEach(r => {
      const item = document.createElement("div");
      item.className = "feed-item";
      item.innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${r.id}?autoplay=0&mute=1&controls=0&loop=1" frameborder="0" style="position:absolute; top:0; left:0; width:100%; height:100%;"></iframe>
      <div style="position:absolute; bottom:80px; left:12px; color:white; background: rgba(0,0,0,0.4); padding:6px 10px; border-radius: 12px;"><strong>${r.channel}</strong><br>${r.title.slice(0,50)}</div>`;
      feed.appendChild(item);
    });
    enableFeedAudio("igFeed");
  }

  async function loadTtFeed() {
    const feed = document.getElementById("ttFeed");
    feed.innerHTML = "<div style='text-align:center;padding:40px'>loading tiktok style...</div>";
    const clips = await fetchShorts("All", 10);
    feed.innerHTML = "";
    clips.forEach(r => {
      const item = document.createElement("div");
      item.className = "feed-item";
      item.innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${r.id}?autoplay=0&mute=1&controls=0" frameborder="0" style="position:absolute; inset:0;"></iframe>
      <div style="position:absolute; bottom:90px; left:12px; color:white;"><strong>@${r.channel}</strong><div>${r.title.slice(0,45)}</div><div style="display:flex; gap:6px; margin-top:5px;">🎵 original sound</div></div>`;
      feed.appendChild(item);
    });
    enableFeedAudio("ttFeed");
  }

  function enableFeedAudio(feedId) {
    const container = document.getElementById(feedId);
    let currentlyPlaying = null;
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        const iframe = entry.target.querySelector("iframe");
        if (entry.isIntersecting && iframe && !iframe.src.includes("autoplay=1")) {
          if (currentlyPlaying && currentlyPlaying !== iframe) {
            currentlyPlaying.src = currentlyPlaying.src.replace("autoplay=1", "autoplay=0");
          }
          iframe.src = iframe.src.replace("autoplay=0", "autoplay=1").replace("mute=1", "mute=0");
          currentlyPlaying = iframe;
        } else if (!entry.isIntersecting && iframe && iframe.src.includes("autoplay=1")) {
          iframe.src = iframe.src.replace("autoplay=1", "autoplay=0").replace("mute=0", "mute=1");
        }
      });
    }, { threshold: 0.6 });
    document.querySelectorAll(`#${feedId} .feed-item`).forEach(item => observer.observe(item));
  }

  function showPlatform(platform) {
    document.getElementById("ytHome").style.display = "none";
    document.getElementById("searchPage").style.display = "none";
    document.getElementById("igPage").style.display = "none";
    document.getElementById("ttPage").style.display = "none";
    document.getElementById("bottomNavYt").style.display = "none";
    if (platform === "yt") {
      document.getElementById("ytHome").style.display = "flex";
      document.getElementById("bottomNavYt").style.display = "flex";
    } else if (platform === "ig") {
      document.getElementById("igPage").style.display = "flex";
      loadIgFeed();
    } else if (platform === "tt") {
      document.getElementById("ttPage").style.display = "flex";
      loadTtFeed();
    }
  }

  // event listeners
  document.getElementById("globalSearchBtn").onclick = () => performSearch(document.getElementById("globalSearchInput").value);
  document.getElementById("globalSearchInput").addEventListener("keypress", e => { if (e.key === "Enter") performSearch(e.target.value); });
  document.getElementById("searchBackBtn").onclick = () => { document.getElementById("searchPage").style.display = "none"; document.getElementById("ytHome").style.display = "flex"; };
  document.getElementById("platformArrow").onclick = () => {
    const p = currentPlatform === "yt" ? "ig" : (currentPlatform === "ig" ? "tt" : "yt");
    currentPlatform = p;
    showPlatform(p);
    showToast(p === "yt" ? "YouTube Style" : (p === "ig" ? "Instagram Reels" : "TikTok Style"));
  };
  document.getElementById("closeIgBtn").onclick = () => showPlatform("yt");
  document.getElementById("closeTtBtn").onclick = () => showPlatform("yt");
  document.querySelectorAll("[data-page]").forEach(btn => {
    btn.onclick = () => { showPlatform("yt"); if(btn.innerText.includes("Shorts")) { if(shortsData.length) openShortsFullscreen(0); else showToast("Load shorts first"); } else if(btn.innerText.includes("Subs")) showToast("Subscriptions coming soon"); else if(btn.innerText.includes("Profile")) showToast("Profile page demo"); };
  });
  document.getElementById("createBtn").onclick = () => showToast("📸 Upload feature coming soon");

  async function initSplashAndApp() {
    if (!navigator.onLine) { document.getElementById("no-internet").style.display = "flex"; return; }
    setupCategories();
    await loadHomeData();
    setTimeout(() => {
      const splash = document.getElementById("splash");
      splash.classList.add("hide-splash");
      setTimeout(() => splash.style.display = "none", 500);
    }, 2100);
  }
  document.getElementById("retryBtn").onclick = () => { location.reload(); };
  initSplashAndApp();
  window.playVisibleShort = playVisibleShort;
  window.openShortsFullscreen = openShortsFullscreen;
</script>
</body>
</html>
