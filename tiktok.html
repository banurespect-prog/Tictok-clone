<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Anskinge</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap');
:root{
  --bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#272727;--bg4:#333;
  --text:#f1f1f1;--text2:#aaa;--text3:#666;
  --red:#ff0000;--red2:#cc0000;
  --white:#fff;--border:#2a2a2a;--blue:#3ea6ff;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{color:var(--text);font-family:'Outfit',sans-serif;max-width:430px;margin:0 auto;position:relative;}

/* SPLASH */
#splash{position:fixed;inset:0;z-index:9999;background:#0f0f0f;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;transition:opacity 0.6s ease;}
#splash.hide{opacity:0;pointer-events:none;}
.splash-glow{position:absolute;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(255,0,0,0.15) 0%,transparent 70%);animation:glowPulse 2s ease-in-out infinite;}
@keyframes glowPulse{0%,100%{transform:scale(1);opacity:0.5;}50%{transform:scale(1.2);opacity:1;}}
.splash-logo-row{display:flex;align-items:center;gap:12px;position:relative;z-index:1;}
.splash-logo-box{width:56px;height:40px;background:var(--red);border-radius:12px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 30px rgba(255,0,0,0.5);animation:logoAppear 0.5s ease forwards;}
@keyframes logoAppear{from{transform:scale(0.5);opacity:0;}to{transform:scale(1);opacity:1;}}
.splash-logo-box svg{width:26px;height:26px;fill:#fff;}
.splash-name{font-size:38px;font-weight:800;color:#fff;letter-spacing:-1.5px;animation:nameSlide 0.6s ease 0.2s both;}
@keyframes nameSlide{from{transform:translateX(-20px);opacity:0;}to{transform:translateX(0);opacity:1;}}
.splash-name em{color:var(--red);font-style:normal;}
.splash-tagline{font-size:14px;color:rgba(255,255,255,0.4);font-weight:500;letter-spacing:2px;text-transform:uppercase;position:relative;z-index:1;animation:fadeIn 0.5s ease 0.5s both;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.splash-line-wrap{width:220px;height:3px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;position:relative;z-index:1;}
.splash-line-bar{height:100%;width:0%;background:linear-gradient(90deg,var(--red),#ff6b6b);border-radius:2px;animation:splashLine 2.5s cubic-bezier(.4,0,.2,1) forwards;}
@keyframes splashLine{0%{width:0%;}20%{width:20%;}50%{width:55%;}75%{width:80%;}90%{width:93%;}100%{width:100%;}}
.splash-dots{display:flex;gap:8px;position:relative;z-index:1;animation:fadeIn 0.5s ease 0.8s both;}
.splash-dots span{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.3);animation:dotBlink 1.2s ease-in-out infinite;}
.splash-dots span:nth-child(2){animation-delay:0.2s;}
.splash-dots span:nth-child(3){animation-delay:0.4s;}
@keyframes dotBlink{0%,80%,100%{opacity:0.3;transform:scale(0.8);}40%{opacity:1;transform:scale(1.2);}}

/* TOP NAV */
#topnav{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;z-index:500;background:rgba(15,15,15,0.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 12px;height:52px;display:flex;align-items:center;gap:10px;}
.logo-wrap{display:flex;align-items:center;gap:6px;cursor:pointer;flex-shrink:0;}
.logo-box{width:30px;height:21px;background:var(--red);border-radius:6px;display:flex;align-items:center;justify-content:center;}
.logo-box svg{width:13px;height:13px;fill:#fff;}
.logo-text{font-size:18px;font-weight:800;color:#fff;letter-spacing:-0.5px;}
.logo-text em{color:var(--red);font-style:normal;}
#search-bar{flex:1;display:flex;align-items:center;background:var(--bg3);border:1px solid var(--border);border-radius:22px;overflow:hidden;}
#search-bar input{flex:1;padding:8px 14px;background:transparent;border:none;color:var(--text);font-size:13px;outline:none;font-family:'Outfit',sans-serif;}
#search-bar input::placeholder{color:var(--text3);}
#search-bar button{padding:8px 14px;background:var(--bg4);border:none;border-left:1px solid var(--border);color:var(--text2);cursor:pointer;font-size:15px;line-height:1;}

/* BOTTOM NAV */
#botnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;z-index:500;background:rgba(15,15,15,0.97);backdrop-filter:blur(12px);border-top:1px solid var(--border);display:flex;justify-content:space-around;align-items:center;height:56px;padding-bottom:env(safe-area-inset-bottom,4px);}
.bnav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;color:var(--text3);cursor:pointer;font-size:10px;font-weight:600;padding:4px 10px;font-family:'Outfit',sans-serif;transition:color .2s;min-width:56px;position:relative;}
.bnav-btn.active{color:var(--white);}
.bnav-btn svg{width:22px;height:22px;}
.bnav-plus{width:50px;height:34px;background:none;border:none;cursor:pointer;padding:0;flex-shrink:0;}
.bnav-plus-inner{width:100%;height:100%;border-radius:9px;background:linear-gradient(135deg,#00c6ff,#7b2ff7,#ff0080);display:flex;align-items:center;justify-content:center;}
.bnav-plus-inner svg{width:18px;height:18px;stroke:#fff;stroke-width:2.5;}
.bnav-badge{position:absolute;top:2px;right:8px;background:var(--red);color:#fff;border-radius:50%;width:15px;height:15px;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;}
.shorts-dot{width:5px;height:5px;background:var(--red);border-radius:50%;margin-bottom:1px;}

/* MAIN */
#main{position:fixed;top:52px;bottom:56px;left:50%;transform:translateX(-50%);width:100%;max-width:430px;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
#main::-webkit-scrollbar{width:0;}

/* CATEGORY CHIPS */
.cat-strip{display:flex;gap:8px;padding:10px 12px;overflow-x:auto;flex-shrink:0;position:sticky;top:0;z-index:10;background:var(--bg);border-bottom:1px solid var(--border);}
.cat-strip::-webkit-scrollbar{display:none;}
.cat-chip{padding:6px 14px;border-radius:20px;background:var(--bg2);color:var(--text2);border:1px solid var(--border);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .2s;font-family:'Outfit',sans-serif;}
.cat-chip.active{background:#fff;color:#000;border-color:#fff;}

/* HOME PAGE */
#home-page{display:block;padding-bottom:20px;}
.section-hdr{display:flex;align-items:center;gap:8px;padding:14px 14px 10px;font-size:15px;font-weight:700;}
.red-pill{background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;letter-spacing:.3px;}

/* Shorts grid */
.shorts-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:0 10px;}
.short-card{cursor:pointer;border-radius:10px;overflow:hidden;background:var(--bg2);position:relative;aspect-ratio:9/16;}
.short-card img{width:100%;height:100%;object-fit:cover;display:block;background:var(--bg2);}
.short-card-info{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,0.9));padding:22px 8px 8px;}
.short-card-title{font-size:11px;color:#fff;font-weight:600;line-height:1.3;}
.short-card-views{font-size:10px;color:rgba(255,255,255,.6);margin-top:2px;}
.short-play-icon{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:40px;height:40px;background:rgba(255,0,0,0.85);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(0,0,0,0.5);}
.short-play-icon svg{width:18px;height:18px;fill:white;margin-left:3px;}

/* Long video cards */
.video-card{cursor:pointer;margin-bottom:2px;}
.thumb-wrap{width:100%;aspect-ratio:16/9;background:var(--bg2);position:relative;overflow:hidden;}
.thumb-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
.thumb-dur{position:absolute;bottom:6px;right:8px;background:rgba(0,0,0,0.9);color:#fff;font-size:11px;font-weight:700;padding:2px 5px;border-radius:4px;}
.thumb-play{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:48px;height:48px;background:rgba(0,0,0,0.6);border-radius:50%;display:flex;align-items:center;justify-content:center;}
.thumb-play svg{width:22px;height:22px;fill:white;margin-left:4px;}
.video-row{display:flex;gap:10px;padding:10px 14px 12px;}
.ch-av{width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff;}
.vid-meta{flex:1;}
.vid-title{font-size:13px;font-weight:600;line-height:1.35;margin-bottom:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.vid-sub{font-size:11px;color:var(--text2);}
.vid-sub span+span::before{content:'·';margin:0 3px;}

/* SEARCH PAGE */
#search-page{display:none;padding-bottom:20px;}
.search-topbar{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--border);}
.search-big-input{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:22px;padding:9px 16px;color:var(--text);font-size:14px;outline:none;font-family:'Outfit',sans-serif;}
.back-circle{width:36px;height:36px;border-radius:50%;background:var(--bg2);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
#search-suggestions{padding:12px 14px;}
.search-hint{font-size:13px;color:var(--text2);margin-bottom:12px;font-weight:600;}
.trend-list{display:flex;flex-direction:column;gap:2px;}
.trend-item{display:flex;align-items:center;gap:12px;padding:11px 8px;border-radius:8px;cursor:pointer;}
.trend-item:active{background:var(--bg2);}
.trend-icon{color:var(--text3);font-size:16px;flex-shrink:0;}
.trend-text{font-size:14px;color:var(--text);flex:1;}

/* ===== SHORTS FULLSCREEN ===== */
#shorts-page{display:none;position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;height:100vh;z-index:600;background:#000;overflow:hidden;}
#shorts-scroller{width:100%;height:100%;overflow-y:scroll;scroll-snap-type:y mandatory;-webkit-overflow-scrolling:touch;overscroll-behavior:none;}
#shorts-scroller::-webkit-scrollbar{display:none;}
.s-slide{width:100%;height:100vh;scroll-snap-align:start;scroll-snap-stop:always;position:relative;background:#000;overflow:hidden;flex-shrink:0;}

/* Shorts: YouTube embed inside slide */
.s-player-wrap{position:absolute;inset:0;width:100%;height:100%;background:#000;z-index:2;}
.s-player-wrap iframe{width:100%;height:100%;border:none;display:block;}
/* Loading thumbnail shown before player ready */
.s-thumb-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;transition:opacity .4s;}
.s-thumb-bg.hidden{opacity:0;pointer-events:none;}
.s-gradient{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,0.3) 0%,transparent 30%,transparent 50%,rgba(0,0,0,0.9) 100%);pointer-events:none;z-index:5;}
.s-loading-spin{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:3;width:48px;height:48px;border:3px solid rgba(255,255,255,0.15);border-top-color:#ff0000;border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg);}}
.s-loading-spin.hidden{display:none;}

.s-info{position:absolute;bottom:76px;left:14px;right:76px;z-index:10;}
.s-ch-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.s-avatar{width:40px;height:40px;border-radius:50%;color:#fff;font-weight:700;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:2px solid rgba(255,255,255,.85);overflow:hidden;}
.s-ch-name{font-size:14px;font-weight:700;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.6);}
.s-sub-btn{padding:5px 14px;border-radius:16px;border:1.5px solid rgba(255,255,255,.9);background:transparent;color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;white-space:nowrap;transition:all .2s;}
.s-sub-btn.subbed{background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.4);}
.s-title{font-size:13px;color:rgba(255,255,255,.92);line-height:1.45;text-shadow:0 1px 3px rgba(0,0,0,.5);}
.s-actions{position:absolute;right:10px;bottom:78px;display:flex;flex-direction:column;align-items:center;gap:20px;z-index:10;}
.s-act-btn{display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;color:#fff;cursor:pointer;font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;text-shadow:0 1px 3px rgba(0,0,0,.6);}
.s-act-circle{width:46px;height:46px;border-radius:50%;background:rgba(0,0,0,.45);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,.12);transition:transform .15s;}
.s-act-circle:active{transform:scale(.88);}
.s-act-btn.liked .s-act-circle{background:rgba(255,60,60,.4);}

/* Shorts header */
#shorts-cat-strip{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;z-index:620;background:linear-gradient(180deg,rgba(0,0,0,0.85) 0%,transparent 100%);padding:10px 12px 20px;display:flex;gap:8px;overflow-x:auto;align-items:center;}
#shorts-cat-strip::-webkit-scrollbar{display:none;}
#shorts-cat-chips{display:flex;gap:6px;overflow-x:auto;flex:1;}
#shorts-cat-chips::-webkit-scrollbar{display:none;}
.shorts-header-logo{display:flex;align-items:center;gap:6px;flex-shrink:0;margin-right:4px;cursor:pointer;}
.shl-box{width:26px;height:18px;background:#ff0000;border-radius:4px;display:flex;align-items:center;justify-content:center;}
.shl-box svg{width:11px;height:11px;fill:white;}
.shl-name{font-size:14px;font-weight:800;color:#fff;letter-spacing:-0.3px;}
.shl-name em{color:#ff0000;font-style:normal;}

/* Shorts bottom nav */
#shorts-botnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;z-index:650;background:rgba(0,0,0,0.75);backdrop-filter:blur(16px);border-top:1px solid rgba(255,255,255,.08);display:none;justify-content:space-around;align-items:center;height:56px;padding-bottom:env(safe-area-inset-bottom,4px);}
.sbn-btn{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;color:rgba(255,255,255,.7);cursor:pointer;font-size:10px;font-weight:600;padding:4px 10px;font-family:'Outfit',sans-serif;min-width:56px;position:relative;}
.sbn-btn.active{color:#fff;}
.sbn-btn svg{width:22px;height:22px;}
.sbn-plus{width:50px;height:34px;background:none;border:none;cursor:pointer;padding:0;flex-shrink:0;}
.sbn-plus-inner{width:100%;height:100%;border-radius:9px;background:linear-gradient(135deg,#00c6ff,#7b2ff7,#ff0080);display:flex;align-items:center;justify-content:center;}
.sbn-plus-inner svg{width:18px;height:18px;stroke:#fff;stroke-width:2.5;}
.sbn-badge{position:absolute;top:-3px;right:-3px;background:var(--red);color:#fff;border-radius:50%;width:15px;height:15px;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;}

/* ===== VIDEO PLAYER ===== */
#player-page{display:none;}
.player-topbar{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--border);}
.back-btn{width:36px;height:36px;border-radius:50%;background:var(--bg2);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.back-btn svg{width:20px;height:20px;stroke:var(--text);stroke-width:2;fill:none;}
.player-title{font-size:14px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* YouTube embed in player */
#player-yt-wrap{width:100%;aspect-ratio:16/9;background:#000;position:relative;overflow:hidden;}
#player-yt-wrap iframe{width:100%;height:100%;border:none;display:block;}
.player-loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#000;z-index:2;}
.player-loading-spin{width:52px;height:52px;border:3px solid rgba(255,255,255,0.1);border-top-color:#ff0000;border-radius:50%;animation:spin 0.8s linear infinite;}
.player-loading.hidden{display:none;}

.vid-details{padding:14px;}
.vd-title{font-size:15px;font-weight:700;line-height:1.4;margin-bottom:12px;}
.vd-ch-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.vd-ch-left{display:flex;align-items:center;gap:10px;}
.vd-av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;color:#fff;flex-shrink:0;}
.vd-ch-name{font-size:14px;font-weight:700;}
.vd-subs{font-size:12px;color:var(--text2);}
.sub-btn{padding:8px 18px;border-radius:20px;border:none;cursor:pointer;font-size:13px;font-weight:700;background:#fff;color:#000;font-family:'Outfit',sans-serif;transition:all .2s;}
.sub-btn.subscribed{background:var(--bg3);color:var(--text2);}
.vd-stats{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
.stat-chip{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:5px 12px;font-size:12px;color:var(--text2);}
.vd-actions{display:flex;gap:8px;margin-bottom:0;}
.vd-act{flex:1;padding:10px 6px;border-radius:10px;border:none;cursor:pointer;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:5px;font-family:'Outfit',sans-serif;transition:all .2s;}
.like-act{background:rgba(255,0,0,.15);color:#ff6b6b;border:1px solid rgba(255,0,0,.2);}
.like-act.liked{background:rgba(255,0,0,.3);color:#ff4444;}
.save-act{background:rgba(255,200,0,.1);color:#ffc107;border:1px solid rgba(255,200,0,.2);}
.share-act{background:var(--bg2);color:var(--text2);border:1px solid var(--border);}

/* Comments */
.cmt-section{border-top:1px solid var(--border);}
.cmt-toggle-row{display:flex;align-items:center;justify-content:space-between;padding:14px;cursor:pointer;}
.cmt-toggle-icon{color:var(--text2);font-size:18px;transition:transform .3s;}
.cmt-body-wrap{display:none;padding:0 14px 14px;}
.cmt-input-row{display:flex;gap:10px;align-items:flex-start;margin-bottom:16px;}
.my-av{width:32px;height:32px;border-radius:50%;background:var(--red);color:#fff;font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.cmt-field{flex:1;}
.cmt-textarea{width:100%;background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--text);font-size:13px;padding:6px 0;resize:none;outline:none;font-family:'Outfit',sans-serif;min-height:34px;}
.cmt-textarea::placeholder{color:var(--text3);}
.cmt-textarea:focus{border-bottom-color:var(--blue);}
.cmt-btns{display:none;justify-content:flex-end;gap:8px;margin-top:8px;}
.cmt-cancel{background:none;border:none;color:var(--text2);cursor:pointer;font-size:13px;padding:6px 12px;border-radius:20px;font-family:'Outfit',sans-serif;}
.cmt-submit{background:var(--bg3);border:none;color:var(--text3);cursor:pointer;font-size:13px;font-weight:700;padding:6px 16px;border-radius:20px;font-family:'Outfit',sans-serif;transition:all .2s;}
.cmt-submit.ready{background:var(--blue);color:#000;}
.cmt-item{display:flex;gap:10px;margin-bottom:16px;}
.cmt-av{width:32px;height:32px;border-radius:50%;background:var(--bg3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--text2);overflow:hidden;}
.cmt-av img{width:100%;height:100%;object-fit:cover;}
.cmt-body-inner{flex:1;}
.cmt-author{font-size:12px;font-weight:700;}
.cmt-time{font-size:11px;color:var(--text2);margin-left:6px;}
.cmt-text{font-size:13px;line-height:1.4;margin-top:3px;}
.cmt-likes-btn{background:none;border:none;color:var(--text2);cursor:pointer;font-size:11px;display:flex;align-items:center;gap:3px;margin-top:5px;font-family:'Outfit',sans-serif;}

/* More videos */
.more-videos-section{padding:14px;}
.more-videos-title{font-size:14px;font-weight:700;margin-bottom:12px;}

/* SUBS PAGE */
#subs-page{display:none;padding:16px;}
.page-title{font-size:20px;font-weight:800;margin-bottom:16px;}
.sub-ch-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);}
.sub-ch-av{width:46px;height:46px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;color:#fff;}
.sub-ch-info{flex:1;}
.sub-ch-name{font-size:14px;font-weight:600;}
.sub-ch-count{font-size:12px;color:var(--text2);}

// ============================================================
// API HELPERS
// ============================================================
async function ytSearch(query,maxResults=10,pageToken='',videoDuration=''){
  let url=`${API_BASE}/search?part=snippet&type=video&q=${encodeURIComponent(query)}&maxResults=${maxResults}&key=${API_KEY}`;
  if(pageToken)url+=`&pageToken=${pageToken}`;
  if(videoDuration)url+=`&videoDuration=${videoDuration}`;
  const res=await fetch(url);
  if(!res.ok)throw new Error('API '+res.status);
  return res.json();
}
async function ytVideoDetails(ids){
  if(!ids.length)return[];
  const url=`${API_BASE}/videos?part=snippet,statistics,contentDetails,status&id=${ids.join(',')}&key=${API_KEY}`;
  try{const r=await fetch(url);const d=await r.json();return(d.items||[]).filter(v=>v.status?.embeddable!==false);}
  catch(e){return[];}
}
async function ytComments(videoId){
  const url=`${API_BASE}/commentThreads?part=snippet&videoId=${videoId}&maxResults=20&key=${API_KEY}&order=relevance`;
  const res=await fetch(url);
  if(!res.ok)throw new Error('comments');
  return res.json();
}
function randomFrom(arr){return arr[Math.floor(Math.random()*arr.length)];}
function avatarColor(str){
  const colors=['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#1abc9c','#e67e22','#e91e63'];
  let h=0;for(let i=0;i<str.length;i++)h=(h*31+str.charCodeAt(i))%colors.length;
  return colors[h];
}
function fmtNum(n){n=parseInt(n)||0;if(n>=1000000)return(n/1000000).toFixed(1)+'M';if(n>=1000)return(n/1000).toFixed(1)+'K';return n.toString();}
function fmtDur(iso){
  if(!iso)return'';
  const m=iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  if(!m)return'';
  const h=parseInt(m[1]||0),min=parseInt(m[2]||0),s=parseInt(m[3]||0);
  if(h>0)return`${h}:${String(min).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return`${min}:${String(s).padStart(2,'0')}`;
}
function timeAgo(d){
  if(!d)return'';
  const diff=Date.now()-new Date(d).getTime();
  const s=diff/1000,m=s/60,hr=m/60,dy=hr/24,w=dy/7,mo=dy/30;
  if(mo>=1)return Math.floor(mo)+' mo ago';
  if(w>=1)return Math.floor(w)+'w ago';
  if(dy>=1)return Math.floor(dy)+'d ago';
  if(hr>=1)return Math.floor(hr)+'h ago';
  return Math.floor(m)+'m ago';
}
function thumbUrl(id,q='mqdefault'){return`https://img.youtube.com/vi/${id}/${q}.jpg`;}
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function escAttr(s){return String(s||'').replace(/'/g,'&#39;').replace(/"/g,'&quot;').replace(/\n/g,' ');}

async function loadHomeFeed(reset=false){
  if(reset){
    homeNextToken='';

    document.getElementById('home-long-feed').innerHTML='<div class="loading-dots"><span></span><span></span><span></span></div>';
  }
  // Shorts
  try{
    const q=randomFrom(SHORT_CAT_QUERIES[currentCat]||SHORT_CAT_QUERIES.All);
    const data=await ytSearch(q,10,'','short');
    if(data.items?.length){
      const ids=data.items.map(i=>i.id.videoId).filter(Boolean);
      const details=await ytVideoDetails(ids);
      if(details.length){renderHomeShortsGrid(details);}else{renderFallbackShorts();}
    }else{renderFallbackShorts();}

let scrollDebounce=null;
function handleShortsScroll(){
  clearTimeout(scrollDebounce);
  scrollDebounce=setTimeout(()=>{
    const scroller=document.getElementById('shorts-scroller');
    const idx=Math.round(scroller.scrollTop/window.innerHeight);
    if(idx!==currentShortIndex){
      // Pause previous
      if(shortPlayers[currentShortIndex]){
        try{shortPlayers[currentShortIndex].pauseVideo();}catch(e){}
      }
      currentShortIndex=idx;
      playShortAt(idx);
    }
  },150);
}

function playShortAt(idx){
  currentShortPlaying=idx;
  if(!shortsData[idx])return;
  const s=shortsData[idx];
  // If player already created, just play
  if(shortPlayers[idx]){
    try{shortPlayers[idx].playVideo();}catch(e){}
    return;
  }
  // Create player
  if(!ytReady)return;
  shortPlayerStates[idx]='loading';
  shortPlayers[idx]=new YT.Player(`splayer-${idx}`,{
    videoId:s.id,
    playerVars:{
      autoplay:1,
      playsinline:1,
      rel:0,
      modestbranding:1,
      controls:1,
      loop:1,
      playlist:s.id,
    },
    events:{
      onReady:(e)=>{
        // Hide thumbnail and spinner
        const thumb=document.getElementById(`sthumb-${idx}`);
        const spin=document.getElementById(`sspin-${idx}`);
        if(thumb)thumb.classList.add('hidden');
        if(spin)spin.classList.add('hidden');
        shortPlayerStates[idx]='ready';
        // Only play if this is still the current short
        if(currentShortIndex===idx)e.target.playVideo();
      },
      onStateChange:(e)=>{
        // Ended → replay
        if(e.data===YT.PlayerState.ENDED){
          try{shortPlayers[idx].seekTo(0);shortPlayers[idx].playVideo();}catch(er){}
        }
      },
      onError:()=>{
        const spin=document.getElementById(`sspin-${idx}`);
        if(spin)spin.classList.add('hidden');
        toast('⚠️ This short cannot be played');
      }
    }
  });
}

  else{delete liked[videoId];toast('💔 Removed');}
  saveLiked(liked);
  const btn=document.getElementById('like-btn-main');
  if(btn){btn.classList.toggle('liked',isNow);btn.innerHTML=(isNow?'❤️':'🤍')+' Like';}
  updateProfileLikes();
}
function toggleSaveVideo(videoId,title){
  const saved=getSaved();
  const isNow=!saved[videoId];
  if(isNow){saved[videoId]={title,thumb:thumbUrl(videoId),ts:Date.now()};toast('🔖 Saved!');}
  else{delete saved[videoId];toast('🗑️ Removed');}
  saveSaved(saved);
  const btn=document.getElementById('save-btn-main');
  if(btn){btn.innerHTML=(isNow?'🔖':'🏷️')+(isNow?' Saved':' Save');}
}
function toggleSub(channelName){
  const subs=getSubs();
  const isNow=!subs[channelName];
  if(isNow){subs[channelName]={name:channelName,ts:Date.now()};toast('🔔 Subscribed to '+channelName+'!');}
  else{delete subs[channelName];toast('🔕 Unsubscribed');}
  saveSubs(subs);
  const btn=document.getElementById('sub-btn-main');
  if(btn){btn.classList.toggle('subscribed',isNow);btn.textContent=isNow?'Subscribed ✓':'Subscribe';}
  renderSubsPage();updateProfileFollowing();
}
function shareVideo(videoId){
  const url=`https://www.youtube.com/watch?v=${videoId}`;
  if(navigator.share){navigator.share({url}).catch(()=>{});}
  else{navigator.clipboard?.writeText(url).then(()=>toast('🔗 Link copied!'));}
}

async function loadMoreVideos(){
  const section=document.getElementById('more-videos-section');
  const list=document.getElementById('more-videos-list');
  section.style.display='none';
  try{
    const q=randomFrom(CAT_QUERIES[currentCat]||CAT_QUERIES.All);
    const data=await ytSearch(q,6,'','medium');
    if(data.items?.length){
      const ids=data.items.map(i=>i.id.videoId).filter(Boolean);
      const details=await ytVideoDetails(ids);
      if(details.length){list.innerHTML=details.map(v=>videoCardHtml(v)).join('');section.style.display='block';return;}
    }
  }catch(e){}
  list.innerHTML=FALLBACK_VIDEOS.slice(0,4).map(v=>videoCardHtmlSimple(v)).join('');
  section.style.display='block';
}

// ============================================================
// COMMENTS
// ============================================================
async function loadComments(videoId){
  const section=document.getElementById('cmt-section');
  section.innerHTML=`
    <div class="cmt-toggle-row" onclick="toggleComments(this)">
      <span style="font-size:14px;font-weight:700;">💬 Comments <span id="cmt-count-label">...</span></span>
      <span class="cmt-toggle-icon">▼</span>
    </div>
    <div class="cmt-body-wrap" id="cmt-body-wrap">
      <div class="cmt-input-row">
        <div class="my-av">W</div>
        <div class="cmt-field">
          <textarea class="cmt-textarea" id="cmt-textarea" placeholder="Add a comment..." rows="1"
            onfocus="showCmtBtns()" oninput="checkCmtReady(this)"></textarea>
          <div class="cmt-btns" id="cmt-btns">
            <button class="cmt-cancel" onclick="cancelCmt()">Cancel</button>
            <button class="cmt-submit" id="cmt-submit-btn" onclick="submitCmt('${videoId}')">Comment</button>
          </div>
        </div>
      </div>
      <div id="cmt-list"><div class="loading-dots"><span></span><span></span><span></span></div></div>
    </div>`;
  try{
    const data=await ytComments(videoId);
    const items=data.items||[];
    const localCmts=getLocalCmts(videoId);
    document.getElementById('cmt-count-label').textContent=`(${items.length+localCmts.length})`;
    renderComments(videoId,items,localCmts);
  }catch(e){
    document.getElementById('cmt-count-label').textContent='';
    renderComments(videoId,[],getLocalCmts(videoId));
  }
}

function renderComments(videoId,apiCmts,localCmts){
  const list=document.getElementById('cmt-list');
  if(!list)return;
  let html='';
  [...localCmts].reverse().forEach(c=>{
    html+=`<div class="cmt-item">
      <div class="cmt-av" style="background:var(--red);color:#fff;font-weight:700;">W</div>
      <div class="cmt-body-inner">
        <span class="cmt-author">waseem7227</span><span class="cmt-time">just now</span>
        <div class="cmt-text">${escHtml(c.text)}</div>
      </div>
    </div>`;
  });
  apiCmts.forEach(item=>{
    const sn=item.snippet?.topLevelComment?.snippet||{};
    const author=sn.authorDisplayName||'User';
    const text=sn.textDisplay||'';
    const likes=sn.likeCount||0;
    const pic=sn.authorProfileImageUrl||'';
    const time=timeAgo(sn.publishedAt);
    html+=`<div class="cmt-item">
      <div class="cmt-av">${pic?`<img src="${escHtml(pic)}" alt="">`:'<span>U</span>'}</div>
      <div class="cmt-body-inner">
        <span class="cmt-author">${escHtml(author)}</span><span class="cmt-time">${time}</span>
        <div class="cmt-text">${escHtml(text)}</div>
        ${likes>0?`<button class="cmt-likes-btn">👍 ${fmtNum(likes)}</button>`:''}
      </div>
    </div>`;
  });
  if(!html)html='<div class="empty-msg">No comments yet. Be the first!</div>';
  list.innerHTML=html;
}

function toggleComments(row){
  const body=document.getElementById('cmt-body-wrap');
  const icon=row.querySelector('.cmt-toggle-icon');
  const open=body.style.display==='block';
  body.style.display=open?'none':'block';
  icon.style.transform=open?'':'rotate(180deg)';
}
function showCmtBtns(){document.getElementById('cmt-btns').style.display='flex';}
function checkCmtReady(el){const btn=document.getElementById('cmt-submit-btn');if(btn)btn.classList.toggle('ready',el.value.trim().length>0);}
function cancelCmt(){
  const ta=document.getElementById('cmt-textarea');
  const btns=document.getElementById('cmt-btns');
  if(ta)ta.value='';
  if(btns)btns.style.display='none';
  const btn=document.getElementById('cmt-submit-btn');
  if(btn)btn.classList.remove('ready');
}
function submitCmt(videoId){
  const ta=document.getElementById('cmt-textarea');
  if(!ta||!ta.value.trim())return;
  const text=ta.value.trim();
  const cmts=getLocalCmts(videoId);
  cmts.push({text,ts:Date.now()});
  saveLocalCmts(videoId,cmts);
  cancelCmt();
  toast('💬 Comment posted!');
  // Re-render
  const list=document.getElementById('cmt-list');
  if(list){
    const div=document.createElement('div');
    div.className='cmt-item';
    div.innerHTML=`<div class="cmt-av" style="background:var(--red);color:#fff;font-weight:700;">W</div>
      <div class="cmt-body-inner">
        <span class="cmt-author">waseem7227</span><span class="cmt-time">just now</span>
        <div class="cmt-text">${escHtml(text)}</div>
      </div>`;
    list.prepend(div);
  }
}

function closeSPanel(){

// ============================================================
// SEARCH
// ============================================================
const TRENDS=['Trending Music 2024','Funny Moments Compilation','Best Tech Gadgets','Motivational Speeches','Gaming Highlights','Travel Vlogs','Cricket Highlights','Roblox Funny Moments','Street Food Tour','Science Facts'];
function buildTrendList(){
  document.getElementById('trend-list').innerHTML=TRENDS.map(t=>
    `<div class="trend-item" onclick="searchFor('${escAttr(t)}')">
      <span class="trend-icon">🔥</span>
      <span class="trend-text">${t}</span>
    </div>`
  ).join('');
}
function searchFor(q){
  document.getElementById('search-big-input').value=q;
  doSearch();
}
async function doSearch(){
  const q=(document.getElementById('search-big-input').value||document.getElementById('search-input').value).trim();
  if(!q)return;
  document.getElementById('search-input').value=q;
  document.getElementById('search-big-input').value=q;
  showPage('search');
  document.getElementById('search-suggestions').style.display='none';
  document.getElementById('search-results-wrap').style.display='block';
  document.getElementById('search-shorts-wrap').style.display='none';
  document.getElementById('search-vids-hdr').style.display='none';
  document.getElementById('search-long-feed').innerHTML='<div class="loading-dots"><span></span><span></span><span></span></div>';
  try{
    // Shorts
    const sd=await ytSearch(q+' shorts',8,'','short');
    if(sd.items?.length){
      const ids=sd.items.map(i=>i.id.videoId).filter(Boolean);
      const det=await ytVideoDetails(ids);
      if(det.length){
        const searchShortsData=det.map(v=>({
          id:v.id,title:v.snippet?.title||'',channel:v.snippet?.channelTitle||'',
          views:fmtNum(v.statistics?.viewCount),likes:fmtNum(v.statistics?.likeCount),
        }));
        // Save for shorts page
        shortsData=searchShortsData;
        document.getElementById('search-shorts-grid').innerHTML=searchShortsData.map((s,i)=>
          `<div class="short-card" onclick="openShortsPage(${i})">
            <img src="${thumbUrl(s.id,'hqdefault')}" alt="" loading="lazy">
            <div class="short-play-icon"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
            <div class="short-card-info">
              <div class="short-card-title">${escHtml(s.title)}</div>
              <div class="short-card-views">${escHtml(s.channel)}</div>
            </div>
          </div>`
        ).join('');
        document.getElementById('search-shorts-wrap').style.display='block';
      }
    }
    // Videos
    const vd=await ytSearch(q,10,'','medium');
    document.getElementById('search-vids-hdr').style.display='flex';
    if(vd.items?.length){
      const ids=vd.items.map(i=>i.id.videoId).filter(Boolean);
      const det=await ytVideoDetails(ids);
      if(det.length){document.getElementById('search-long-feed').innerHTML=det.map(v=>videoCardHtml(v)).join('');return;}
    }
    document.getElementById('search-long-feed').innerHTML='<div class="empty-msg"><span class="icon">🔍</span>No results found.</div>';
  }catch(e){
    document.getElementById('search-long-feed').innerHTML='<div class="empty-msg"><span class="icon">⚠️</span>Search failed. Check connection.</div>';
  }
}

// ============================================================
// SUBS PAGE
// ============================================================
function renderSubsPage(){
  const subs=getSubs();
  const keys=Object.keys(subs);
  const list=document.getElementById('subs-list');
  if(!keys.length){
    list.innerHTML='<div class="empty-msg"><span class="icon">🔔</span>No subscriptions yet.<br>Subscribe to channels to see them here.</div>';
    return;
  }
  list.innerHTML=keys.map(ch=>{
    const color=avatarColor(ch);
    const letter=ch.charAt(0).toUpperCase();
    return`<div class="sub-ch-item">
      <div class="sub-ch-av" style="background:${color}">${letter}</div>
      <div class="sub-ch-info">
        <div class="sub-ch-name">${escHtml(ch)}</div>
        <div class="sub-ch-count">Subscribed</div>
      </div>
      <button class="unsub-btn" onclick="unsubChannel('${escAttr(ch)}')">Unsubscribe</button>
    </div>`;
  }).join('');
}
function unsubChannel(ch){
  const subs=getSubs();
  delete subs[ch];
  saveSubs(subs);
  toast('🔕 Unsubscribed from '+ch);
  renderSubsPage();
  updateProfileFollowing();
}

// ============================================================
// PROFILE
// ============================================================
function updateProfileLikes(){const liked=getLiked();const el=document.getElementById('profile-likes');if(el)el.textContent=Object.keys(liked).length;}
function updateProfileFollowing(){const subs=getSubs();const el=document.getElementById('profile-following');if(el)el.textContent=Object.keys(subs).length;}
function renderProfileContent(){
  updateProfileLikes();
  updateProfileFollowing();
  switchProfileTab('videos');
}
function switchProfileTab(tab){
  document.getElementById('ptab-videos').classList.toggle('active',tab==='videos');
  document.getElementById('ptab-liked').classList.toggle('active',tab==='liked');
  const c=document.getElementById('profile-content');
  if(tab==='videos'){
    c.innerHTML=`<div class="profile-videos-grid">${shortsData.slice(0,9).map(s=>
      `<div class="profile-vid-thumb" onclick="openShortsPage(0)">
        <img src="${thumbUrl(s.id,'hqdefault')}" alt="" loading="lazy">
        <div class="profile-vid-views">${s.views||'0'}</div>
      </div>`
    ).join('')||'<div class="empty-msg" style="grid-column:1/-1">No videos yet</div>'}</div>`;
  }else{
    const liked=getLiked();
    const keys=Object.keys(liked);
    if(!keys.length){c.innerHTML='<div class="empty-msg"><span class="icon">🤍</span>No liked videos yet.</div>';return;}
    c.innerHTML=`<div class="profile-videos-grid">${keys.slice(0,9).map(id=>{
      const v=liked[id];
      return`<div class="profile-vid-thumb" onclick="openPlayer('${id}','${escAttr(v.title||'')}')">
        <img src="${v.thumb||thumbUrl(id)}" alt="" loading="lazy">
        <div class="profile-vid-views">❤️</div>
      </div>`;
    }).join('')}</div>`;
  }
}
function shareProfile(){
  if(navigator.share){navigator.share({title:'Anskinge',url:window.location.href}).catch(()=>{});}
  else{navigator.clipboard?.writeText(window.location.href).then(()=>toast('🔗 Profile link copied!'));}
}
